    window.NOAH_NEWS_DATA = [
      {
        id: 9,
        date: '2026.02.28',
        category: '新機能',
        title: 'SIGNAL CAST（ライブ配信機能）を公開しました！',
        content: `リアルタイムで繋がり、同じ時間を共有する生配信機能「SIGNAL CAST」をついにリリースしました！

### SIGNAL CASTとは？
コミュニティ内で手軽に音声ライブ配信を行い、リスナーとチャットや登壇（スピーカー参加）を通じて深く交流できる機能です。透明感のあるラグジュアリーな専用ルームで、没入感のある対話をお楽しみいただけます。

### 権限について
- **配信の主催（ホスト）**: GUARDIAN以上のメンバーが可能です。
- **登壇申請（スピーカー参加）**: BUILDER以上のメンバーが可能です。
- **リスナー参加・コメント**: SETTLER以上のメンバーが可能です。

### 使い方
1. **配信の開始**: MEDIA LOG画面から「SIGNAL CASTを配信する」を選択し、ルームを作成します。
2. **参加**: CAST一覧のトップにある「配信中のSIGNAL CAST」セクションから、ワンタップでルームに入室できます。
3. **登壇**: BUILDER以上のメンバーは「登壇をリクエスト」を送信でき、ホストが承認するとスピーカーとしてマイクで話すことができます。
4. **アーカイブ**: 配信設定で「録音して残す」を選択すると、配信終了後に自動で「NOAH CAST」の枠が作成されます。（※音声の自動録音機能はないため、ご自身で録音したファイルを後からアップロードしてください）
5. **ミニプレーヤー**: 配信を聴きながら他のページを閲覧したり、作業したりすることが可能です。

ライブ配信を通じて、よりリアルな共鳴を生み出していきましょう。`
      },
      {
        id: 8,
        date: '2026.02.27',
        category: '新機能',
        title: 'MEDIA LOG（発信記録）ページを追加しました',
        content: `各ユーザーのマイページから、その人が過去に発信したコンテンツを一覧で確認できる「MEDIA LOG」ページを追加しました。

### MEDIA LOGへのアクセス
マイページ（プロフィール画面）のプロフィール名の下にある「MEDIA LOG (発信記録)」ボタンからアクセスできます。

### できること
- そのユーザーが投稿した「動画（NOAH THEATER）」と「音声（NOAH CAST）」をタブで切り替えて一覧表示できます。
- ご自身のMEDIA LOGページを見る場合は、過去に「お気に入り（いいね）」した動画や音声のリストも確認することが可能です。

他のメンバーがどのような想いを発信しているか、ぜひ深く知るきっかけにしてください。`
      },
      {
        id: 7,
        date: '2026.02.26',
        category: '新機能',
        title: 'NOAH CAST（音声配信機能）を公開しました',
        content: `声だからこそ伝わる温度、思考のプロセスを共有する音声プラットフォーム「NOAH CAST」をリリースしました。

### NOAH CASTとは？
対談やひとり語りを通して、メンバーの深い価値観に触れることができる場所です。

### 利用ガイド
- **視聴・いいね・コメント**: 全てのメンバーが可能です。
- **音声の投稿**: SETTLER以上のメンバーが可能です。
- **投稿方法**: ナビゲーションの「メディア」からCASTページへ移動し、「音声を配信する」ボタンから投稿できます。
- **対応フォーマット**: mp3等の音声ファイルの直接アップロードのほか、SpotifyやApple Podcasts、Google DriveのURLリンクによる埋め込みプレイヤーにも対応しています。
- **note連携**: noteの記事URLを「関連記事」として指定すると、概要欄に美しく埋め込まれて表示されます。`
      },
      {
        id: 6,
        date: '2026.02.25',
        category: 'アップデート',
        title: 'プライベートメモ（鍵メモ）機能をリリースしました',
        content: `平素よりNOAHをご利用いただきありがとうございます。

この度、他のユーザーのプロフィールページに、自分だけが見られる「鍵メモ」を残せる機能を追加しました。

### 機能の概要
- 相手のプロフィール名横の「鍵メモ」ボタンから起動できます。
- 出会ったきっかけや、会話の内容などをログ形式で記録できます。
- 記録したメモは自分専用の領域に保存されるため、相手や他のユーザーからは絶対に見えません。

今後とも、より良い航海ができるようアップデートを続けてまいります。`
      },
      {
        id: 5,
        date: '2026.02.24',
        category: '新機能',
        title: 'NOAH THEATER（動画投稿機能）を公開しました',
        content: `想い、ビジョン、活動の軌跡を動画で共有できる専用プラットフォーム「NOAH THEATER」をリリースしました。

### NOAH THEATERとは？
文字だけでは伝わらない「あなたの温度」や熱量を、動画でダイレクトに届ける機能です。ピッチ動画で支援を募ったり、日々の活動をログとして残すことができます。

### 利用ガイド
- **視聴・いいね・コメント**: 全てのメンバーが可能です。
- **動画の投稿**: SETTLER以上のメンバーが可能です。
- **投稿方法**: THEATERページの「動画を投稿」ボタンから投稿できます。YouTubeやVimeoのURLを指定するか、直接動画ファイル(最大100MB)をアップロードすることが可能です。

動画を通じて、新たな共鳴を見つけてください。`
      },
      {
        id: 4,
        date: '2026.02.23',
        category: 'アップデート',
        title: '招待リンク発行時の案内文をアップデートしました',
        content: `HOME画面から「招待リンクをコピー」した際にクリップボードにコピーされる案内文を、より親切で分かりやすい内容に更新しました。

新しい案内文には、ご自身の名前が自動で入り、NOAHの登録リンクだけでなく、公式LINEやオープンチャットへの参加手順も含まれるようになっています。

新しくメンバーを迎え入れる際に、そのままSNSやメッセージアプリに貼り付けてご活用ください。`
      },
      {
        id: 3,
        date: '2026.02.22',
        category: 'アップデート',
        title: 'イベントおよび仕事・依頼の掲載機能をリリースしました',
        content: `メンバー同士の交流や協業を促進するため、「イベント」と「さがす（仕事・依頼）」の掲載機能を追加しました。

### イベント掲載
ご自身が主催するイベントや、参加してほしい集まりを告知できます。
- **対象**: SETTLER以上のメンバーが企画可能（参加は全メンバー可能）

### 仕事・依頼の掲載
プロジェクトのメンバー募集や、お仕事の依頼をコミュニティ内に向けて発信できます。
- **対象**: GUARDIAN以上のメンバーが掲載可能

**使い方:**
各ページの「＋」ボタンまたは「企画する/掲載する」ボタンからフォームを開き、詳細を入力して投稿してください。誰が主催・募集しているかも一目でわかるようになっています。`
      },
      {
        id: 2,
        date: '2026.02.21',
        category: 'お知らせ',
        title: '【ガイド】プロフィール充実度を100%にするための条件',
        content: `プロフィールの充実度は、ご自身の魅力を伝え、他のメンバーとの共鳴を生むための重要な指標です。
また、COVENANT等の「共鳴価格（特別優遇）」の適用条件にもなっております。

以下のすべての項目を満たすことで、充実度が100%になります。

- **基本情報**: 全項目（氏名、職業、拠点、出身地、性別、生年月日）の入力（計32点）
- **プロフィール画像**: アイコン画像の設定（8点）
- **自己紹介 (Bio)**: 150文字以上（10点）
- **想い・メッセージ**: 150文字以上（10点）
- **目標・ビジョン**: 150文字以上（10点）
- **マッチング情報**: 「提供できること」「求めていること」を各1つ以上（計10点）
- **スキル・趣味**: 各3つ以上選択・入力（計10点）
- **経歴**: 1つ以上（5点）
- **SNS・外部リンク**: 1つ以上（5点）

ぜひ、ご自身の「航海録」を充実させてみてください。`
      },
      {
        id: 1,
        date: '2026.02.20',
        category: 'お知らせ',
        title: 'NOAH コミュニティサイトを公開しました',
        content: `完全紹介制のクローズドコミュニティ「NOAH」の公式プラットフォームを公開いたしました。

「ここでは誰も一人にならない」をコンセプトに、参加者の皆様が安心して交流・発展できる場を提供してまいります。

皆様のご乗船を心よりお待ちしております。`
      }
    ];

</head>
<body class="min-h-screen py-12 px-4 sm:px-6 lg:px-8 bg-texture relative">

  <!-- トップページに戻るリンク -->
  <div class="absolute top-4 left-4 sm:top-8 sm:left-8 z-10">
    <a href="index.html" class="inline-flex items-center text-xs font-bold text-[#8b6a4f] hover:text-[#5c4a3d] transition-colors tracking-widest">
      <i data-lucide="arrow-left" class="mr-2 w-4 h-4"></i>
      NOAHについて
    </a>
  </div>

  <div class="max-w-4xl mx-auto pt-10">
    <!-- Header -->
    <div class="text-center mb-16">
      <i data-lucide="bell" class="w-10 h-10 text-[#8b6a4f] mx-auto mb-4" stroke-width="1.5"></i>
      <h1 class="text-3xl font-bold text-[#3e2723] sm:text-4xl font-serif tracking-widest">News & Updates</h1>
      <p class="mt-4 text-sm text-[#725b3f] tracking-widest uppercase">お知らせ・アップデート</p>
      <div class="w-16 h-[1px] bg-[#8b6a4f] mt-6 mx-auto"></div>
    </div>

    <!-- コンテンツ表示エリア -->
    <div id="content-area" class="bg-[#fffdf9] shadow-md border border-[#e8dfd1] p-6 sm:p-10 relative">
      <!-- JSで描画 -->
    </div>
  </div>

  <!-- Footer -->
  <footer class="mt-24 pb-12 text-center text-sm text-[#725b3f]">
    <p class="mb-1 font-serif tracking-widest">NOAH - No One Alone, Here</p>
    <p>&copy; <span id="year"></span> NOAH Community. All rights reserved.</p>
  </footer>

  <script>
    lucide.createIcons();
    document.getElementById('year').textContent = new Date().getFullYear();

    function formatText(text) {
      if (!text) return '';
      let rawHtml = '';
      try {
        if (window.marked && typeof window.marked.parse === 'function') {
          rawHtml = window.marked.parse(text, { breaks: true, gfm: true });
        } else {
          rawHtml = text.replace(/\n/g, '<br>');
        }
      } catch (e) {
        rawHtml = text.replace(/\n/g, '<br>');
      }
      return window.DOMPurify.sanitize(rawHtml);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const articleId = urlParams.get('id');
      const contentArea = document.getElementById('content-area');
      const newsData = window.NOAH_NEWS_DATA || [];

      if (articleId) {
        // --- 詳細ページの表示 ---
        const article = newsData.find(item => item.id == articleId);
        
        if (article) {
          contentArea.innerHTML = `
            <div class="mb-8 border-b border-[#e8dfd1] pb-6">
              <div class="flex items-center gap-4 mb-4">
                <span class="text-sm text-[#a09080] font-mono">${article.date}</span>
                <span class="text-[10px] bg-[#f7f5f0] text-[#725b3f] border border-[#e8dfd1] px-2 py-0.5 rounded-sm tracking-widest font-bold">${article.category}</span>
              </div>
              <h1 class="text-2xl font-bold text-[#3e2723] leading-relaxed">${article.title}</h1>
            </div>
            
            <div class="prose max-w-none text-[#5c4a3d] leading-relaxed">
              ${formatText(article.content)}
            </div>

            <div class="mt-16 pt-8 border-t border-[#e8dfd1] text-center">
              <a href="news.html" class="inline-flex items-center justify-center px-6 py-3 bg-[#f7f5f0] text-[#725b3f] font-bold text-sm tracking-widest border border-[#c8b9a6] hover:bg-[#e8dfd1] transition-colors">
                お知らせ一覧に戻る
              </a>
            </div>
          `;
        } else {
          contentArea.innerHTML = `
            <div class="text-center py-10">
              <p class="text-[#8b6a4f] mb-6 font-bold tracking-widest">お探しの記事は見つかりませんでした。</p>
              <a href="news.html" class="inline-flex items-center justify-center px-6 py-3 bg-[#f7f5f0] text-[#725b3f] font-bold text-sm tracking-widest border border-[#c8b9a6] hover:bg-[#e8dfd1] transition-colors">
                お知らせ一覧に戻る
              </a>
            </div>
          `;
        }
      } else {
        // --- 一覧ページの表示 ---
        if (newsData.length === 0) {
          contentArea.innerHTML = `<p class="text-center text-[#a09080] py-10">現在お知らせはありません。</p>`;
          return;
        }

        let listHtml = '<ul class="divide-y divide-[#e8dfd1]">';
        newsData.forEach(item => {
          listHtml += `
            <li class="py-5 flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4 group">
              <span class="text-sm text-[#a09080] font-mono w-28 shrink-0">${item.date}</span>
              <span class="text-[10px] bg-[#f7f5f0] text-[#725b3f] border border-[#e8dfd1] px-2 py-0.5 rounded-sm tracking-widest w-fit font-bold">${item.category}</span>
              <a href="news.html?id=${item.id}" class="text-base text-[#4a3b32] group-hover:text-[#8b6a4f] transition-colors leading-relaxed flex-1 font-medium mt-1 sm:mt-0">
                ${item.title}
              </a>
            </li>
          `;
        });
        listHtml += '</ul>';
        contentArea.innerHTML = listHtml;
      }
    });
  </script>
</body>
</html>
