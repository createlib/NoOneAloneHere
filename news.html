<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お知らせ・ニュース | NOAH</title>
  <link rel="icon" href="img/icon.png">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Marked.js & DOMPurify (Markdown用) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&display=swap');
    
    body {
      font-family: 'Noto Serif JP', serif;
      background-color: #f7f5f0;
      color: #4a3b32;
    }
    
    .bg-texture {
      background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
    }

    /* Markdownの装飾スタイル */
    .prose h1, .prose h2, .prose h3 { color: #3e2723; font-weight: 700; margin-top: 1.5em; margin-bottom: 0.5em; border-bottom: 1px solid #e8dfd1; padding-bottom: 0.3em; }
    .prose h3 { font-size: 1.1rem; border: none; padding: 0; }
    .prose p { margin-top: 0.5em; margin-bottom: 1em; line-height: 1.8; }
    .prose ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1em; }
    .prose li { margin-bottom: 0.5em; }
    .prose a { color: #8b6a4f; text-decoration: underline; }
  </style>

  <script id="news-data-source">
    // ==========================================
    // 【記事の管理エリア】
    // 今後ニュースを追加する際は、この中に { } で囲ったデータを追加してください。
    // ※「content」にはMarkdown記法が使えます。バッククォート（`）で囲んでください。
    // ==========================================
    window.NOAH_NEWS_DATA = [
      {
        id: 2,
        date: '2026.02.25',
        category: 'アップデート',
        title: 'プライベートメモ（鍵メモ）機能をリリースしました',
        content: `平素よりNOAHをご利用いただきありがとうございます。

この度、他のユーザーのプロフィールページに、自分だけが見られる「鍵メモ」を残せる機能を追加しました。

### 機能の概要
- 相手のプロフィール名横の「鍵メモ」ボタンから起動できます。
- 出会ったきっかけや、会話の内容などをログ形式で記録できます。
- 記録したメモは自分専用の領域に保存されるため、相手や他のユーザーからは絶対に見えません。

今後とも、より良い航海ができるようアップデートを続けてまいります。`
      },
      {
        id: 1,
        date: '2026.02.20',
        category: 'お知らせ',
        title: 'NOAH コミュニティサイトを公開しました',
        content: `完全紹介制のクローズドコミュニティ「NOAH」の公式プラットフォームを公開いたしました。

「ここでは誰も一人にならない」をコンセプトに、参加者の皆様が安心して交流・発展できる場を提供してまいります。

皆様のご乗船を心よりお待ちしております。`
      }
    ];
  </script>
</head>
<body class="min-h-screen py-12 px-4 sm:px-6 lg:px-8 bg-texture relative">

  <!-- トップページに戻るリンク -->
  <div class="absolute top-4 left-4 sm:top-8 sm:left-8 z-10">
    <a href="index.html" class="inline-flex items-center text-xs font-bold text-[#8b6a4f] hover:text-[#5c4a3d] transition-colors tracking-widest">
      <i data-lucide="arrow-left" class="mr-2 w-4 h-4"></i>
      NOAHについて
    </a>
  </div>

  <div class="max-w-4xl mx-auto pt-10">
    <!-- Header -->
    <div class="text-center mb-16">
      <i data-lucide="bell" class="w-10 h-10 text-[#8b6a4f] mx-auto mb-4" stroke-width="1.5"></i>
      <h1 class="text-3xl font-bold text-[#3e2723] sm:text-4xl font-serif tracking-widest">News & Updates</h1>
      <p class="mt-4 text-sm text-[#725b3f] tracking-widest uppercase">お知らせ・アップデート</p>
      <div class="w-16 h-[1px] bg-[#8b6a4f] mt-6 mx-auto"></div>
    </div>

    <!-- コンテンツ表示エリア -->
    <div id="content-area" class="bg-[#fffdf9] shadow-md border border-[#e8dfd1] p-6 sm:p-10 relative">
      <!-- JSで描画 -->
    </div>
  </div>

  <!-- Footer -->
  <footer class="mt-24 pb-12 text-center text-sm text-[#725b3f]">
    <p class="mb-1 font-serif tracking-widest">NOAH - No One Alone, Here</p>
    <p>&copy; <span id="year"></span> NOAH Community. All rights reserved.</p>
  </footer>

  <script>
    lucide.createIcons();
    document.getElementById('year').textContent = new Date().getFullYear();

    // 記事のパース（改行やMarkdownをHTMLに）
    function formatText(text) {
      if (!text) return '';
      let rawHtml = '';
      try {
        if (window.marked && typeof window.marked.parse === 'function') {
          rawHtml = window.marked.parse(text, { breaks: true, gfm: true });
        } else {
          rawHtml = text.replace(/\n/g, '<br>');
        }
      } catch (e) {
        rawHtml = text.replace(/\n/g, '<br>');
      }
      return window.DOMPurify.sanitize(rawHtml);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const articleId = urlParams.get('id');
      const contentArea = document.getElementById('content-area');
      const newsData = window.NOAH_NEWS_DATA || [];

      if (articleId) {
        // --- 詳細ページの表示 ---
        const article = newsData.find(item => item.id == articleId);
        
        if (article) {
          contentArea.innerHTML = `
            <div class="mb-8 border-b border-[#e8dfd1] pb-6">
              <div class="flex items-center gap-4 mb-4">
                <span class="text-sm text-[#a09080] font-mono">${article.date}</span>
                <span class="text-[10px] bg-[#f7f5f0] text-[#725b3f] border border-[#e8dfd1] px-2 py-0.5 rounded-sm tracking-widest font-bold">${article.category}</span>
              </div>
              <h1 class="text-2xl font-bold text-[#3e2723] leading-relaxed">${article.title}</h1>
            </div>
            
            <div class="prose max-w-none text-[#5c4a3d] leading-relaxed">
              ${formatText(article.content)}
            </div>

            <div class="mt-16 pt-8 border-t border-[#e8dfd1] text-center">
              <a href="news.html" class="inline-flex items-center justify-center px-6 py-3 bg-[#f7f5f0] text-[#725b3f] font-bold text-sm tracking-widest border border-[#c8b9a6] hover:bg-[#e8dfd1] transition-colors">
                お知らせ一覧に戻る
              </a>
            </div>
          `;
        } else {
          contentArea.innerHTML = `
            <div class="text-center py-10">
              <p class="text-[#8b6a4f] mb-6 font-bold tracking-widest">お探しの記事は見つかりませんでした。</p>
              <a href="news.html" class="inline-flex items-center justify-center px-6 py-3 bg-[#f7f5f0] text-[#725b3f] font-bold text-sm tracking-widest border border-[#c8b9a6] hover:bg-[#e8dfd1] transition-colors">
                お知らせ一覧に戻る
              </a>
            </div>
          `;
        }
      } else {
        // --- 一覧ページの表示 ---
        if (newsData.length === 0) {
          contentArea.innerHTML = `<p class="text-center text-[#a09080] py-10">現在お知らせはありません。</p>`;
          return;
        }

        let listHtml = '<ul class="divide-y divide-[#e8dfd1]">';
        newsData.forEach(item => {
          listHtml += `
            <li class="py-5 flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4 group">
              <span class="text-sm text-[#a09080] font-mono w-28 shrink-0">${item.date}</span>
              <span class="text-[10px] bg-[#f7f5f0] text-[#725b3f] border border-[#e8dfd1] px-2 py-0.5 rounded-sm tracking-widest w-fit font-bold">${item.category}</span>
              <a href="news.html?id=${item.id}" class="text-base text-[#4a3b32] group-hover:text-[#8b6a4f] transition-colors leading-relaxed flex-1 font-medium mt-1 sm:mt-0">
                ${item.title}
              </a>
            </li>
          `;
        });
        listHtml += '</ul>';
        contentArea.innerHTML = listHtml;
      }
    });
  </script>
</body>
</html>
