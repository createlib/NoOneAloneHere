<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>イベント・仕事 | NOAH</title>
    <link rel="icon" href="img/icon.png">
    
    <!-- Google Fonts: Noto Serif JP -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { serif: ['Noto Serif JP', 'serif'] },
                    colors: { 
                        brand: { 
                            50: '#f7f5f0',   
                            100: '#e8dfd1',  
                            200: '#dcd4c6',  
                            300: '#c8b9a6',  
                            400: '#a09080',  
                            500: '#8b6a4f',  
                            600: '#725b3f',  
                            700: '#5c4a3d',  
                            800: '#4a3b32',  
                            900: '#3e2723'   
                        } 
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            font-family: 'Noto Serif JP', serif;
            background-color: #f7f5f0; 
            color: #4a3b32;
        }
        .bg-texture {
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
        }
        /* 横スクロールバー非表示 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .tag-btn.active {
            background-color: #3e2723;
            color: #f7f5f0;
            border-color: #3e2723;
        }
        
        /* Slide Sheet */
        .sheet-closed { transform: translateX(100%); }
        .sheet-open { transform: translateX(0); }
        .sheet-transition { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        /* ボトムナビの高さ固定設定 */
        .bottom-nav-fixed {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #fffdf9;
            border-top: 1px solid #e8dfd1;
            z-index: 50;
            height: 4rem;
            height: calc(4rem + env(safe-area-inset-bottom));
            padding-bottom: env(safe-area-inset-bottom);
        }
        .bottom-nav-content {
            height: 4rem;
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
        }
        .body-pb-nav {
            padding-bottom: calc(5rem + env(safe-area-inset-bottom));
        }
    </style>
</head>
<body class="antialiased overflow-x-hidden body-pb-nav lg:pb-0 bg-texture">

    <!-- Navbar -->
    <nav class="bg-[#fffdf9] bg-texture border-b border-brand-200 fixed w-full z-50 top-0 h-16 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full flex justify-between items-center relative z-10">
            <div class="flex items-center gap-4">
                <a href="home.html" class="text-xl font-black text-brand-900 tracking-widest flex items-center gap-2 font-serif">
                    <span class="bg-brand-900 text-brand-50 w-8 h-8 flex items-center justify-center rounded-sm text-sm"><i class="fa-solid fa-hourglass-half"></i></span>
                    <span class="hidden sm:inline">EVENTS</span>
                </a>
            </div>
            <div class="flex items-center gap-3">
                <!-- PC Navigation Links -->
                <div class="hidden lg:flex items-center gap-6 mr-4">
                    <a href="home.html" class="text-brand-400 hover:text-brand-600 transition-colors flex items-center gap-2 font-bold text-sm tracking-wide"><i class="fa-solid fa-ship"></i> 航海</a>
                    <a href="events.html" class="text-brand-600 transition-colors flex items-center gap-2 font-bold text-sm tracking-wide"><i class="fa-solid fa-hourglass-half"></i> イベント</a>
                    <a href="search.html" class="text-brand-400 hover:text-brand-600 transition-colors flex items-center gap-2 font-bold text-sm tracking-wide"><i class="fa-solid fa-compass"></i> さがす</a>
                    <a href="videos.html" class="text-brand-400 hover:text-brand-600 transition-colors flex items-center gap-2 font-bold text-sm tracking-wide"><i class="fa-solid fa-video"></i> シアター</a>
                    <a href="user.html" class="text-brand-400 hover:text-brand-600 transition-colors flex items-center gap-2 font-bold text-sm tracking-wide"><i class="fa-solid fa-user"></i> マイページ</a>
                </div>

                <button onclick="goToEventPost()" id="btn-post" class="hidden items-center px-4 py-1.5 bg-[#3e2723] text-[#d4af37] text-xs font-bold rounded-sm shadow-md hover:bg-[#2a1a17] transition-colors tracking-widest border border-[#b8860b]">
                    <i class="fa-solid fa-plus mr-1"></i> イベント作成
                </button>
            </div>
        </div>
    </nav>

    <!-- Bottom Navigation -->
    <nav class="lg:hidden bottom-nav-fixed shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <div class="bottom-nav-content">
            <a href="home.html" class="flex flex-col items-center justify-center w-full h-full text-brand-400 hover:text-brand-600 transition-colors">
                <i class="fa-solid fa-ship text-xl mb-1"></i>
                <span class="text-[10px] font-medium tracking-widest">航海</span>
            </a>
            <a href="events.html" class="flex flex-col items-center justify-center w-full h-full text-brand-600 border-t-2 border-brand-500 pt-[2px]">
                <i class="fa-solid fa-hourglass-half text-xl mb-1"></i>
                <span class="text-[10px] font-bold tracking-widest">イベント</span>
            </a>
            <a href="search.html" class="flex flex-col items-center justify-center w-full h-full text-brand-400 hover:text-brand-600 transition-colors">
                <i class="fa-solid fa-compass text-xl mb-1"></i>
                <span class="text-[10px] font-medium tracking-widest">さがす</span>
            </a>
            <a href="videos.html" class="flex flex-col items-center justify-center w-full h-full text-brand-400 hover:text-brand-600 transition-colors">
                <i class="fa-solid fa-video text-xl mb-1"></i>
                <span class="text-[10px] font-medium tracking-widest">シアター</span>
            </a>
            <a href="user.html" class="flex flex-col items-center justify-center w-full h-full text-brand-400 hover:text-brand-600 transition-colors">
                <i class="fa-solid fa-user text-xl mb-1"></i>
                <span class="text-[10px] font-medium tracking-widest">マイページ</span>
            </a>
        </div>
    </nav>

    <!-- Main Layout -->
    <div class="pt-16 flex min-h-screen relative overflow-hidden">
        
        <!-- Main Content Area -->
        <main class="flex-1 w-full lg:w-[60%] lg:pr-[400px] xl:pr-[500px] transition-all duration-300 px-4 sm:px-6 lg:px-8 py-6">
            
            <!-- Filters & Search -->
            <div class="mb-6 sticky top-16 z-30 bg-[#f7f5f0] bg-texture pt-4 pb-2">
                <div class="flex flex-wrap gap-2 mb-3 items-center">
                    <div class="relative flex-1 min-w-[200px]">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-brand-400"></i>
                        <input type="text" id="search-input" placeholder="イベント名、場所で検索..." class="w-full pl-10 pr-4 py-2.5 rounded-sm border border-brand-200 shadow-sm text-sm focus:ring-brand-500 focus:border-brand-500 bg-[#fffdf9]">
                    </div>
                    <select id="sort-select" class="border border-brand-200 rounded-sm py-2.5 px-3 text-sm bg-[#fffdf9] text-brand-700 shadow-sm focus:ring-brand-500" onchange="renderEvents()">
                        <option value="upcoming">開催が近い順</option>
                        <option value="newest">新着順</option>
                    </select>
                </div>
                
                <div class="flex gap-2 overflow-x-auto no-scrollbar py-1" id="tag-filters">
                    <button onclick="filterByTag('')" class="tag-btn active whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold transition-colors bg-[#3e2723] text-[#f7f5f0] border border-[#3e2723]">すべて</button>
                    <button onclick="filterByTag('ミートアップ')" class="tag-btn whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold transition-colors bg-[#fffdf9] text-brand-600 border border-brand-200 hover:bg-brand-50">ミートアップ</button>
                    <button onclick="filterByTag('セミナー・勉強会')" class="tag-btn whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold transition-colors bg-[#fffdf9] text-brand-600 border border-brand-200 hover:bg-brand-50">セミナー・勉強会</button>
                    <button onclick="filterByTag('オンライン')" class="tag-btn whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold transition-colors bg-[#fffdf9] text-brand-600 border border-brand-200 hover:bg-brand-50">オンライン</button>
                    <button onclick="filterByTag('プロジェクト募集')" class="tag-btn whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold transition-colors bg-[#fffdf9] text-brand-600 border border-brand-200 hover:bg-brand-50">仕事・募集</button>
                </div>
            </div>

            <!-- Event List -->
            <div id="event-list" class="space-y-4 pb-20">
                <div class="text-center py-10 text-brand-400"><i class="fa-solid fa-spinner fa-spin mr-2"></i>読み込み中...</div>
            </div>
            
        </main>

        <!-- Right Side Sheet (Detail View) -->
        <aside id="detail-sheet" class="fixed inset-y-0 right-0 w-full lg:w-[400px] xl:w-[500px] bg-[#f7f5f0] bg-texture border-l border-brand-300 shadow-2xl z-40 lg:z-30 pt-16 flex flex-col sheet-closed sheet-transition overflow-hidden">
            
            <!-- Sheet Header (Mobile Only Close Btn) -->
            <div class="p-3 border-b border-brand-200 flex justify-between items-center bg-[#fffdf9]">
                <h3 class="font-bold text-brand-900 font-serif tracking-widest"><i class="fa-solid fa-compass mr-2 text-brand-500"></i>詳細</h3>
                <button onclick="closeSheet()" class="lg:hidden text-brand-500 hover:text-brand-800 p-2 rounded-sm bg-brand-50 border border-brand-200"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <!-- Sheet Content -->
            <div id="sheet-content" class="flex-1 overflow-y-auto p-4 sm:p-6 custom-scrollbar relative">
                <!-- Select an event message -->
                <div class="absolute inset-0 flex flex-col items-center justify-center text-brand-400 p-6 text-center">
                    <i class="fa-solid fa-hourglass-half text-4xl mb-4 text-brand-200"></i>
                    <p class="font-bold tracking-widest font-serif">航海記録を選択してください</p>
                    <p class="text-xs mt-2">リストからイベントを選ぶと、ここに詳細が表示されます。</p>
                </div>
            </div>
            
            <!-- Sticky Action Bar (Bottom of Sheet) -->
            <div id="sheet-actions" class="p-4 bg-[#fffdf9] border-t border-brand-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] hidden">
                <!-- Actions inserted via JS -->
            </div>
        </aside>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, getDoc, setDoc, deleteDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";

        // ▼▼▼▼ Firebase Config ▼▼▼▼
        const firebaseConfig = {
            apiKey: "AIzaSyBVDZJhL9sMzVknD5tNomLWF-0z0jPU3i0",
            authDomain: "brainbridge-4b8ac.firebaseapp.com",
            projectId: "brainbridge-4b8ac",
            storageBucket: "brainbridge-4b8ac.firebasestorage.app",
            messagingSenderId: "803209683213",
            appId: "1:803209683213:web:b62d13784fa2bbbb9f5044"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'default-app-id';

        let currentUser = null;
        let isAdmin = false;
        let myRank = 'arrival';
        let allEvents = [];
        let currentTag = '';
        let currentEvent = null;

        const isAdminMock = localStorage.getItem('isAdminMock') === 'true';

        onAuthStateChanged(auth, async (user) => {
            if (isAdminMock) {
                currentUser = { uid: 'test_admin_uid' };
                isAdmin = true;
                myRank = 'covenant';
                document.getElementById('btn-post').classList.remove('hidden');
                document.getElementById('btn-post').classList.add('inline-flex');
                fetchEvents();
                return;
            }

            if (user && !user.isAnonymous) {
                currentUser = user;
                try {
                    const mySnap = await getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data'));
                    if (mySnap.exists()) {
                        myRank = mySnap.data().membershipRank || 'arrival';
                        if (mySnap.data().userId === 'admin') isAdmin = true;
                        
                        // SETTLER以上でイベント作成ボタン表示
                        if (myRank !== 'arrival' || isAdmin) {
                            const btnPost = document.getElementById('btn-post');
                            btnPost.classList.remove('hidden');
                            btnPost.classList.add('inline-flex');
                        }
                    }
                } catch(e) { console.error(e); }
                fetchEvents();
            } else {
                window.location.href = 'login.html';
            }
        });

        window.goToEventPost = () => {
            window.location.href = 'event_post.html';
        };

        async function fetchEvents() {
            try {
                const eventsRef = collection(db, 'artifacts', appId, 'public', 'data', 'events');
                // ソートはメモリで行うため全件取得
                const snap = await getDocs(eventsRef);
                
                allEvents = [];
                snap.forEach(doc => {
                    allEvents.push({ id: doc.id, ...doc.data() });
                });
                renderEvents();
                
                // URLから特定のイベントを開く
                const urlParams = new URLSearchParams(window.location.search);
                const openEventId = urlParams.get('eventId');
                if (openEventId) {
                    const target = allEvents.find(e => e.id === openEventId);
                    if (target) openSheet(target);
                }
            } catch (error) {
                console.error("Error fetching events:", error);
                document.getElementById('event-list').innerHTML = '<div class="text-center text-red-500 py-10">イベントの取得に失敗しました</div>';
            }
        }

        window.filterByTag = (tag) => {
            currentTag = tag;
            document.querySelectorAll('.tag-btn').forEach(btn => {
                if ((tag === '' && btn.textContent === 'すべて') || btn.textContent.includes(tag) && tag !== '') {
                    btn.className = 'tag-btn active whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold transition-colors bg-[#3e2723] text-[#f7f5f0] border border-[#3e2723]';
                } else {
                    btn.className = 'tag-btn whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold transition-colors bg-[#fffdf9] text-brand-600 border border-brand-200 hover:bg-brand-50';
                }
            });
            renderEvents();
        };

        document.getElementById('search-input').addEventListener('input', renderEvents);

        window.renderEvents = () => {
            const list = document.getElementById('event-list');
            const searchQ = document.getElementById('search-input').value.toLowerCase();
            const sortMode = document.getElementById('sort-select').value;
            
            let filtered = allEvents.filter(e => {
                const matchTag = currentTag === '' || (e.tags && e.tags.includes(currentTag));
                const matchSearch = searchQ === '' || 
                                    (e.title && e.title.toLowerCase().includes(searchQ)) || 
                                    (e.locationName && e.locationName.toLowerCase().includes(searchQ)) ||
                                    (e.organizerName && e.organizerName.toLowerCase().includes(searchQ));
                return matchTag && matchSearch;
            });

            // Past events filter (optional: keep past events but dim them)
            const now = new Date();
            now.setHours(0,0,0,0);

            if (sortMode === 'upcoming') {
                // Remove strictly past events for 'upcoming' view
                filtered = filtered.filter(e => new Date(e.startDate) >= now);
                filtered.sort((a, b) => new Date(a.startDate) - new Date(b.startDate));
            } else {
                filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            }

            if (filtered.length === 0) {
                list.innerHTML = '<div class="text-center text-brand-400 py-12">該当するイベントがありません。</div>';
                return;
            }

            let html = '';
            filtered.forEach(e => {
                const dateObj = new Date(e.startDate);
                const isPast = dateObj < now;
                const dateStr = (e.startDate === e.endDate) 
                    ? `${e.startDate || ''} ${e.startTime || ''}`
                    : `${e.startDate || ''} 〜 ${e.endDate || ''}`;
                
                const tagsHtml = (e.tags || []).slice(0,3).map(t => `<span class="bg-[#f7f5f0] border border-brand-200 text-brand-600 px-2 py-0.5 rounded-sm text-[10px] font-bold tracking-widest">#${t}</span>`).join('');
                
                const cardClass = isPast 
                    ? "bg-[#f7f5f0] rounded-sm p-4 sm:p-5 flex flex-col sm:flex-row gap-4 sm:gap-6 cursor-pointer border border-brand-200 shadow-sm opacity-60 grayscale"
                    : "bg-[#fffdf9] rounded-sm p-4 sm:p-5 flex flex-col sm:flex-row gap-4 sm:gap-6 cursor-pointer border border-brand-200 shadow-sm hover:shadow-md transition-shadow hover:border-brand-400 group";

                html += `
                <div class="${cardClass}" onclick='openSheet(${JSON.stringify(e).replace(/'/g, "&#39;")})'>
                    <!-- Date Box -->
                    <div class="flex-shrink-0 flex flex-row sm:flex-col sm:w-24 gap-3 sm:gap-1 items-center sm:justify-center border-b sm:border-b-0 sm:border-r border-brand-200 pb-3 sm:pb-0 sm:pr-4">
                        <div class="text-center">
                            <p class="text-xs text-brand-500 font-bold uppercase tracking-widest">${dateObj.toLocaleDateString('en-US', {month: 'short'})}</p>
                            <p class="text-2xl font-black text-brand-900 font-serif leading-none">${String(dateObj.getDate()).padStart(2,'0')}</p>
                        </div>
                        <div class="flex-1 sm:w-full text-right sm:text-center mt-0 sm:mt-2">
                            <span class="inline-block bg-[#3e2723] text-[#d4af37] text-[10px] px-2 py-1 font-bold rounded-sm tracking-widest border border-[#b8860b] whitespace-nowrap">${e.price || '無料'}</span>
                        </div>
                    </div>
                    
                    <!-- Content -->
                    <div class="flex-1 min-w-0 flex flex-col justify-center">
                        <div class="flex flex-wrap gap-1.5 mb-2">${tagsHtml}</div>
                        <h3 class="text-base sm:text-lg font-bold text-brand-900 leading-tight mb-2 font-serif group-hover:text-brand-600 transition-colors">${e.title || '名称未設定'}</h3>
                        <div class="flex flex-col sm:flex-row gap-2 sm:gap-4 text-xs text-brand-600">
                            <span class="flex items-center truncate"><i class="fa-solid fa-map-pin text-brand-400 mr-1.5 w-4 text-center"></i>${e.locationName || '場所未設定'}</span>
                            <span class="flex items-center truncate"><i class="fa-solid fa-user text-brand-400 mr-1.5 w-4 text-center"></i>${e.organizerName || '不明'}</span>
                        </div>
                    </div>
                </div>
                `;
            });
            list.innerHTML = html;
        };

        // --- Slide Sheet Logic ---
        window.openSheet = async (evt) => {
            currentEvent = evt;
            const sheet = document.getElementById('detail-sheet');
            const content = document.getElementById('sheet-content');
            const actions = document.getElementById('sheet-actions');
            
            const isPast = new Date(evt.startDate) < new Date(new Date().setHours(0,0,0,0));
            const thumb = evt.thumbnailUrl || 'https://via.placeholder.com/600x300?text=NOAH';
            const priceText = evt.price || '無料';
            const dateStr = (evt.startDate === evt.endDate) 
                    ? `${evt.startDate || ''} ${evt.startTime || ''} 〜 ${evt.endTime || ''}`
                    : `${evt.startDate || ''} ${evt.startTime || ''} 〜 ${evt.endDate || ''} ${evt.endTime || ''}`;
            const tags = (evt.tags || []).map(t => `<span class="bg-brand-50 border border-brand-200 text-brand-600 px-2.5 py-1 rounded-sm text-[10px] font-bold tracking-widest">#${t}</span>`).join('');
            
            let locHtml = `<div class="flex items-start gap-3"><i class="fa-solid fa-map-pin text-brand-400 mt-0.5 w-4 text-center"></i><span class="tracking-widest">${evt.locationName || '未設定'}</span></div>`;
            if (evt.locationUrl) {
                locHtml = `<div class="flex items-start gap-3"><i class="fa-solid fa-map-pin text-brand-400 mt-0.5 w-4 text-center"></i><a href="${evt.locationUrl}" target="_blank" class="text-brand-600 underline hover:text-brand-800 tracking-widest break-all">${evt.locationName || 'リンクを開く'}</a></div>`;
            }

            const shareUrl = `${window.location.origin}${window.location.pathname}?eventId=${evt.id}`;
            const shareBtn = `<button onclick="navigator.clipboard.writeText('${shareUrl}').then(()=>alert('リンクをコピーしました')).catch(()=>alert('コピーに失敗しました'))" class="absolute top-2 left-2 bg-[#fffdf9]/90 backdrop-blur text-brand-700 px-3 py-1.5 rounded-sm text-[10px] font-bold shadow-sm border border-brand-200 hover:bg-brand-50 transition-colors tracking-widest flex items-center gap-1.5"><i class="fa-solid fa-share-nodes"></i> シェア</button>`;

            // 主催者リンクの保護（未ログイン時はloginへ）
            const organizerLinkAction = currentUser 
                ? `window.location.href='user.html?uid=${evt.organizerId}'` 
                : `if(confirm('プロフィールを見るにはログインが必要です。ログイン画面へ移動しますか？')) window.location.href='login.html'`;

            // Basic UI Loading State
            content.innerHTML = `
                <div class="relative h-48 w-full rounded-sm overflow-hidden mb-4 shadow-sm border border-brand-200">
                    <img src="${thumb}" class="w-full h-full object-cover">
                    <div class="absolute top-2 right-2 bg-[#3e2723]/80 backdrop-blur text-[#d4af37] px-3 py-1 rounded-sm text-xs font-bold tracking-widest border border-[#b8860b] shadow-sm">${priceText}</div>
                </div>
                ${shareBtn}
                <h2 class="text-xl font-bold text-brand-900 leading-tight mb-3 font-serif tracking-widest">${evt.title || '名称未設定'}</h2>
                <div class="flex flex-wrap gap-2 mb-5">${tags}</div>
                <div class="space-y-3 text-xs text-brand-800 bg-[#fffdf9] p-4 rounded-sm mb-5 border border-brand-200 shadow-sm relative">
                    <div class="absolute top-0 right-0 w-6 h-6 border-t border-r border-brand-300 m-1"></div>
                    <div class="flex items-center gap-3"><i class="fa-regular fa-clock text-brand-400 w-4 text-center"></i><span class="tracking-widest">${dateStr}</span></div>
                    ${locHtml}
                    <div class="flex items-center gap-3 pt-2 border-t border-brand-100 cursor-pointer group" onclick="${organizerLinkAction}">
                        <i class="fa-solid fa-user text-brand-400 w-4 text-center"></i>
                        <span class="tracking-widest text-brand-600 font-bold group-hover:underline">主催: ${evt.organizerName || '不明'}</span>
                    </div>
                </div>
                <div class="mb-6"><h3 class="font-bold text-brand-900 mb-2 text-xs font-serif tracking-widest border-b border-brand-200 pb-1">詳細</h3><p class="text-xs text-brand-700 leading-relaxed whitespace-pre-wrap tracking-wide">${evt.description || '詳細はありません'}</p></div>
                <div id="event-dynamic-area"><div class="text-center text-brand-400 py-4"><i class="fa-solid fa-spinner fa-spin mr-2"></i> 情報を読み込み中...</div></div>
            `;
            sheet.classList.remove('hidden', 'sheet-closed');
            sheet.classList.add('sheet-open');

            // Async Fetch Participants & Join Status
            let isJoined = false;
            let partsHtml = '';
            let participants = [];
            
            if (isAdminMock) {
                participants = ['user1', 'user2']; // Dummy
            } else {
                try {
                    const partsRef = collection(db, 'artifacts', appId, 'public', 'data', 'events', evt.id, 'participants');
                    const partsSnap = await getDocs(partsRef);
                    partsSnap.forEach(d => participants.push(d.id));
                    
                    if (currentUser) {
                        isJoined = participants.includes(currentUser.uid);
                    }
                } catch(e) {
                    console.error("Parts fetch error:", e);
                }
            }

            const isOrganizer = currentUser && currentUser.uid === evt.organizerId;
            const dynArea = document.getElementById('event-dynamic-area');
            if(!dynArea) return;

            if (evt.isParticipantsPublic || isOrganizer || isAdmin) {
                if (participants.length === 0) {
                    partsHtml = '<div class="text-[10px] text-brand-500">まだ参加者はいません</div>';
                } else {
                    partsHtml = '<div class="flex -space-x-2 overflow-hidden py-1 pl-1">';
                    
                    // 各参加者の公開情報を取得し、アイコン表示可能か判定する
                    const participantDataPromises = participants.map(async (uid) => {
                        let avatarUrl = 'https://via.placeholder.com/32?text=U';
                        let isVisible = true;
                        
                        if (!isAdminMock) {
                            try {
                                const uDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', uid));
                                if(uDoc.exists()) {
                                    const data = uDoc.data();
                                    if(data.photoURL) avatarUrl = data.photoURL;
                                    
                                    // 主催者と管理者は常に表示
                                    if (uid === evt.organizerId || isAdmin) {
                                        isVisible = true;
                                    } else {
                                        // 検索非公開（無料会員含む）のユーザーはアイコン非表示
                                        if (data.isHidden === true) {
                                            isVisible = false;
                                        }
                                    }
                                } else {
                                    isVisible = false;
                                }
                            } catch(e){
                                isVisible = false;
                            }
                        }
                        return { uid, avatarUrl, isVisible };
                    });

                    const resolvedParticipants = await Promise.all(participantDataPromises);
                    const visibleList = resolvedParticipants.filter(p => p.isVisible);

                    let count = 0;
                    for (const p of visibleList) {
                        if (count >= 6) break;
                        const userLinkAction = currentUser ? `window.location.href='user.html?uid=${p.uid}'` : `if(confirm('プロフィールを見るにはログインが必要です。ログイン画面へ移動しますか？')) window.location.href='login.html'`;
                        partsHtml += `<div onclick="${userLinkAction}" class="cursor-pointer inline-block h-8 w-8 rounded-full ring-2 ring-[#fffdf9] bg-brand-100 border border-brand-300 flex items-center justify-center overflow-hidden hover:scale-110 transition-transform"><img src="${p.avatarUrl}" class="w-full h-full object-cover"></div>`;
                        count++;
                    }
                    
                    // 全参加者数から、表示したアイコンの数を引いたものを「+〇〇名」として表示
                    const remainingCount = participants.length - count;
                    if (remainingCount > 0) {
                        partsHtml += `<div class="flex items-center justify-center h-8 w-8 rounded-full ring-2 ring-[#fffdf9] bg-brand-50 text-[10px] font-bold text-brand-600 border border-brand-200">+${remainingCount}</div>`;
                    }
                    partsHtml += '</div>';
                }
            } else {
                partsHtml = '<div class="text-[10px] text-brand-500 bg-brand-50 px-2 py-1.5 rounded-sm border border-brand-200"><i class="fa-solid fa-lock mr-1"></i>参加者は主催者のみ確認できます</div>';
            }

            const btnHtml = `
                <div class="mb-4">
                    <h4 class="text-[10px] font-bold text-brand-500 uppercase mb-2 tracking-widest border-b border-brand-200 pb-1">参加者 (<span id="parts-count">${participants.length}</span>名)</h4>
                    ${partsHtml}
                </div>
            `;
            dynArea.innerHTML = btnHtml;

            // Action Bar Update
            actions.classList.remove('hidden');
            let actionHtml = '';

            if (!currentUser) {
                actionHtml = `<button onclick="window.location.href='login.html'" class="w-full py-3.5 bg-brand-600 text-white font-bold text-sm rounded-sm hover:bg-brand-700 transition-colors shadow-md tracking-widest">ログインして参加する</button>`;
            } else if (isOrganizer || isAdmin) {
                actionHtml = `
                    <div class="flex gap-2">
                        <button onclick="window.location.href='event_post.html?eventId=${evt.id}'" class="flex-1 py-3.5 bg-brand-100 text-brand-700 font-bold text-xs rounded-sm hover:bg-brand-200 transition-colors border border-brand-300 tracking-widest"><i class="fa-solid fa-pen mr-1"></i> 編集</button>
                        <button onclick="deleteEvent('${evt.id}')" class="flex-1 py-3.5 bg-red-100 text-red-700 font-bold text-xs rounded-sm hover:bg-red-200 transition-colors border border-red-300 tracking-widest"><i class="fa-solid fa-trash mr-1"></i> 削除</button>
                    </div>
                `;
            } else if (isPast) {
                actionHtml = `<button disabled class="w-full py-3.5 bg-brand-200 text-brand-500 font-bold text-sm rounded-sm cursor-not-allowed tracking-widest">受付終了</button>`;
            } else if (isJoined) {
                actionHtml = `<button onclick="toggleJoin('${evt.id}', true)" id="btn-join" class="w-full py-3.5 bg-[#f7f5f0] text-brand-700 border border-brand-400 font-bold text-sm rounded-sm hover:bg-brand-50 transition-colors shadow-sm tracking-widest"><i class="fa-solid fa-check mr-2 text-green-600"></i>参加予定（キャンセルする）</button>`;
            } else {
                if(evt.limit && participants.length >= evt.limit) {
                    actionHtml = `<button disabled class="w-full py-3.5 bg-brand-200 text-brand-500 font-bold text-sm rounded-sm cursor-not-allowed tracking-widest">満員</button>`;
                } else {
                    actionHtml = `<button onclick="toggleJoin('${evt.id}', false)" id="btn-join" class="w-full py-3.5 bg-[#3e2723] text-[#d4af37] font-bold text-sm rounded-sm hover:bg-[#2a1a17] transition-colors shadow-md tracking-widest border border-[#b8860b]">参加を申し込む</button>`;
                }
            }
            actions.innerHTML = actionHtml;
        };

        window.closeSheet = () => {
            const sheet = document.getElementById('detail-sheet');
            sheet.classList.remove('sheet-open');
            sheet.classList.add('sheet-closed');
        };

        window.toggleJoin = async (eventId, isLeave) => {
            if (isAdminMock) {
                alert(isLeave ? '参加をキャンセルしました(テスト)' : '参加を申し込みました(テスト)');
                closeSheet();
                return;
            }
            if (!currentUser) return;
            
            const btn = document.getElementById('btn-join');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 処理中...';
            btn.disabled = true;

            try {
                const partRef = doc(db, 'artifacts', appId, 'public', 'data', 'events', eventId, 'participants', currentUser.uid);
                const myEventRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'participating_events', eventId);
                const evtRef = doc(db, 'artifacts', appId, 'public', 'data', 'events', eventId);
                const notificationColl = collection(db, 'artifacts', appId, 'users', currentEvent.organizerId, 'notifications');

                if (isLeave) {
                    if(!confirm('本当に参加をキャンセルしますか？')) {
                        btn.innerHTML = '<i class="fa-solid fa-check mr-2 text-green-600"></i>参加予定（キャンセルする）';
                        btn.disabled = false;
                        return;
                    }
                    await deleteDoc(partRef);
                    await deleteDoc(myEventRef);
                    alert("参加をキャンセルしました。");
                } else {
                    const timestamp = serverTimestamp();
                    await setDoc(partRef, { joinedAt: timestamp });
                    await setDoc(myEventRef, { joinedAt: timestamp });
                    
                    try {
                        await addDoc(notificationColl, {
                            type: 'event_join',
                            fromUid: currentUser.uid,
                            eventId: eventId,
                            eventTitle: currentEvent.title,
                            createdAt: timestamp,
                            isRead: false
                        });
                    } catch(e){ console.warn("Notif fail", e); }
                    
                    alert("参加申し込みが完了しました！");
                }
                closeSheet();
                // 再描画のためリロードか再fetch（簡単のため再fetch）
                fetchEvents();
            } catch (e) {
                console.error("Join error:", e);
                alert("処理に失敗しました");
                closeSheet();
            }
        };

        window.deleteEvent = async (eventId) => {
            if(!confirm('本当にこのイベントを削除しますか？\n※復元できません')) return;
            if(isAdminMock) { alert('削除しました(テスト)'); closeSheet(); return; }
            
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', eventId));
                alert('イベントを削除しました');
                closeSheet();
                fetchEvents();
            } catch(e) {
                console.error(e);
                alert('削除に失敗しました');
            }
        };
    </script>
</body>
</html>
