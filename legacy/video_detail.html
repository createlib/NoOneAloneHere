<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THEATER 再生 | NOAH</title>
    <link rel="icon" href="img/icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    
    <script src="js/tailwind-config.js"></script>
    

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="img/NOAH.png">
    <meta name="theme-color" content="#1a110f">
    <script src="js/pwa-setup.js"></script>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/page-video_detail.css">
</head>
<body class="antialiased min-h-screen bg-texture body-pb-nav lg:pb-0">

    <!-- Navbar -->
    <nav class="bg-[rgba(255,253,249,0.95)] backdrop-blur border-b border-brand-200 fixed w-full z-50 top-0 h-16 shadow-sm">
        <div class="max-w-[1600px] w-full mx-auto px-4 sm:px-6 lg:px-8 h-full flex justify-between items-center">
            
            <div class="flex items-center gap-4">
                <a href="javascript:void(0)" onclick="history.back();" class="text-brand-500 hover:text-brand-800 transition-colors flex items-center gap-2 text-sm font-bold tracking-widest group">
                    <div class="w-8 h-8 rounded-full bg-brand-50 border border-brand-200 flex items-center justify-center group-hover:bg-brand-100 transition-colors">
                        <i class="fa-solid fa-arrow-left"></i>
                    </div>
                    <span class="hidden sm:inline">戻る</span>
                </a>
            </div>

            <div class="flex items-center gap-3 h-full">
                <!-- PC Navigation Links -->
                <div class="hidden lg:flex items-center gap-6 mr-4 h-full">
                    <a href="home.html" class="text-brand-400 hover:text-brand-600 transition-colors flex items-center gap-2 font-bold text-sm tracking-wide"><i class="fa-solid fa-ship"></i> 航海</a>
                    <a href="events.html" class="text-brand-400 hover:text-brand-600 transition-colors flex items-center gap-2 font-bold text-sm tracking-wide"><i class="fa-solid fa-hourglass-half"></i> イベント</a>
                    <a href="search.html" class="text-brand-400 hover:text-brand-600 transition-colors flex items-center gap-2 font-bold text-sm tracking-wide"><i class="fa-solid fa-compass"></i> さがす</a>
                    
                    <div class="relative group h-full flex items-center">
                        <button class="text-brand-600 transition-colors flex items-center gap-2 font-bold text-sm tracking-wide focus:outline-none">
                            <i class="fa-solid fa-photo-film"></i> メディア
                        </button>
                        <div class="absolute top-[calc(100%-0.5rem)] left-1/2 transform -translate-x-1/2 w-48 bg-[#fffdf9] border border-brand-200 shadow-xl rounded-sm hidden group-hover:block transition-opacity overflow-hidden">
                            <a href="videos.html" class="flex items-center px-4 py-3 text-sm font-bold text-brand-800 bg-brand-50 border-b border-brand-100 transition-colors tracking-widest group/item">
                                <i class="fa-solid fa-film text-brand-500 mr-2 w-5 text-center transition-colors"></i> THEATER
                            </a>
                            <a href="podcasts.html" class="flex items-center px-4 py-3 text-sm font-bold text-brand-800 hover:bg-brand-50 transition-colors tracking-widest group/item">
                                <i class="fa-solid fa-podcast text-[#b8860b] mr-2 w-5 text-center group-hover/item:scale-110 transition-transform"></i> CAST
                            </a>
                        </div>
                    </div>

                    <a href="user.html" class="text-brand-400 hover:text-brand-600 transition-colors flex items-center gap-2 font-bold text-sm tracking-wide"><i class="fa-solid fa-user"></i> マイページ</a>
                </div>

                <div id="admin-actions" class="hidden gap-2 border-l border-brand-200 pl-4 ml-2">
                    <button onclick="editVideo()" class="text-xs bg-[#fffdf9] text-brand-700 px-3 py-1.5 border border-brand-300 rounded-sm font-bold hover:bg-brand-50 transition-colors shadow-sm tracking-widest"><i class="fa-solid fa-pen mr-1"></i>編集</button>
                    <button onclick="deleteVideo()" class="text-xs bg-red-50 text-red-600 px-3 py-1.5 border border-red-200 rounded-sm font-bold hover:bg-red-100 transition-colors shadow-sm tracking-widest"><i class="fa-solid fa-trash mr-1"></i>削除</button>
                </div>

                <div class="h-6 w-px bg-brand-200 mx-1 hidden lg:block"></div>
                <button onclick="handleAuthAction()" class="hidden lg:flex text-sm font-bold text-brand-400 hover:text-brand-800 transition-colors flex items-center gap-2">
                    <span class="hidden sm:inline tracking-widest" id="nav-auth-text">下船する</span>
                    <i class="fa-solid fa-right-from-bracket text-lg" id="nav-auth-icon"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Bottom Navigation (Mobile Only) -->
    <nav class="lg:hidden bottom-nav-fixed shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <div class="bottom-nav-content">
            <a href="home.html" class="flex flex-col items-center justify-center w-full h-full text-brand-400 hover:text-brand-600 transition-colors">
                <i class="fa-solid fa-ship text-xl mb-1"></i>
                <span class="text-[10px] font-medium tracking-widest">航海</span>
            </a>
            <a href="events.html" class="flex flex-col items-center justify-center w-full h-full text-brand-400 hover:text-brand-600 transition-colors">
                <i class="fa-solid fa-hourglass-half text-xl mb-1"></i>
                <span class="text-[10px] font-medium tracking-widest">イベント</span>
            </a>
            <a href="search.html" class="flex flex-col items-center justify-center w-full h-full text-brand-400 hover:text-brand-600 transition-colors">
                <i class="fa-solid fa-compass text-xl mb-1"></i>
                <span class="text-[10px] font-medium tracking-widest">さがす</span>
            </a>
            <a href="javascript:void(0)" onclick="toggleTheaterMenu()" class="flex flex-col items-center justify-center w-full h-full text-brand-600 border-t-2 border-brand-500 pt-[2px] transition-colors">
                <i class="fa-solid fa-photo-film text-xl mb-1"></i>
                <span class="text-[10px] font-bold tracking-widest">メディア</span>
            </a>
            <a href="user.html" class="flex flex-col items-center justify-center w-full h-full text-brand-400 hover:text-brand-600 transition-colors">
                <i class="fa-solid fa-user text-xl mb-1"></i>
                <span class="text-[10px] font-medium tracking-widest">マイページ</span>
            </a>
        </div>
    </nav>

    <main class="w-full max-w-[1600px] mx-auto pt-24 px-4 sm:px-6 lg:px-8 flex flex-col lg:flex-row gap-8 lg:gap-10 xl:gap-12">
        
        <div class="flex-1 min-w-0">
            
            <div id="player-container" class="w-full aspect-video bg-black sm:rounded-sm overflow-hidden shadow-xl border border-brand-300 relative group">
                <div class="absolute inset-0 flex items-center justify-center text-white"><i class="fa-solid fa-spinner fa-spin text-4xl opacity-50"></i></div>
            </div>

            <div class="pt-6">
                <div id="video-tags" class="flex flex-wrap gap-2 mb-3"></div>
                
                <h1 id="video-title" class="text-2xl sm:text-3xl font-bold text-brand-900 leading-tight mb-4 font-serif tracking-wide">読み込み中...</h1>
                
                <div class="flex flex-row justify-between items-center gap-2 sm:gap-6 pb-4 sm:pb-6 mb-4 sm:mb-6 border-b border-brand-200">
                    <a id="author-link" href="#" class="flex items-center gap-2 sm:gap-4 group cursor-pointer bg-[#fffdf9] pl-1 pr-3 sm:pl-2 sm:pr-6 py-1 sm:py-2 rounded-full border border-brand-100 shadow-sm hover:shadow-md transition-all hover:border-brand-300 min-w-0">
                        <img id="author-icon" src="https://via.placeholder.com/48" class="w-9 h-9 sm:w-12 sm:h-12 rounded-full border-2 border-[#fffdf9] shadow-sm object-cover group-hover:scale-105 transition-transform flex-shrink-0 ml-0.5">
                        <div class="min-w-0">
                            <p id="author-name" class="font-bold text-brand-900 group-hover:text-brand-600 transition-colors text-xs sm:text-base flex items-center gap-1 truncate">
                                名無し <i class="fa-solid fa-circle-check text-[10px] sm:text-xs text-[#d4af37]"></i>
                            </p>
                            <p id="video-date" class="text-[9px] sm:text-[10px] text-brand-400 font-mono tracking-wider truncate"></p>
                        </div>
                    </a>

                    <div class="flex items-center gap-2 flex-shrink-0">
                        <button onclick="toggleLike()" id="btn-like" class="action-btn flex items-center gap-1.5 sm:gap-2 bg-[#fffdf9] border border-brand-200 px-3 py-1.5 sm:px-5 sm:py-2.5 rounded-full text-xs sm:text-sm font-bold text-brand-700 hover:bg-brand-50 hover:border-brand-400 shadow-sm">
                            <i class="fa-regular fa-thumbs-up text-base sm:text-lg" id="icon-like"></i> <span id="like-count" class="min-w-[1rem] text-center">0</span>
                        </button>
                        <button onclick="shareVideo()" class="action-btn flex items-center gap-1.5 sm:gap-2 bg-[#fffdf9] border border-brand-200 px-3 py-1.5 sm:px-5 sm:py-2.5 rounded-full text-xs sm:text-sm font-bold text-brand-700 hover:bg-brand-50 hover:border-brand-400 shadow-sm">
                            <i class="fa-solid fa-share text-base sm:text-lg"></i> <span class="hidden sm:inline">シェア</span>
                        </button>
                    </div>
                </div>

                <!-- Description -->
                <div class="mb-12 bg-[#fffdf9] border border-brand-200 rounded-sm p-6 sm:p-8 shadow-sm relative">
                    <h3 class="text-lg font-bold text-brand-900 mb-6 flex items-center font-serif tracking-widest border-b border-brand-100 pb-4">
                        <div class="w-8 h-8 rounded-full bg-brand-50 flex items-center justify-center border border-brand-200 text-brand-400 shadow-inner mr-3 flex-shrink-0">
                            <i class="fa-solid fa-align-left text-xs"></i>
                        </div>
                        概要
                    </h3>
                    <div id="video-desc" class="prose prose-stone max-w-none text-brand-700 leading-relaxed text-sm sm:text-base"></div>
                </div>

                <div id="comments-section" class="mb-12 bg-[#fffdf9] border border-brand-200 rounded-sm p-6 sm:p-8 shadow-sm">
                    <h3 class="text-xl font-bold text-brand-900 mb-8 flex items-center font-serif tracking-widest border-b border-brand-100 pb-4">
                        <i class="fa-regular fa-comments mr-3 text-brand-400 text-2xl"></i>コメント <span id="comment-count" class="text-base font-normal text-brand-500 ml-2">(0)</span>
                    </h3>
                    
                    <div id="comment-form-area" class="flex gap-4 mb-10 items-start">
                        <img id="my-icon" src="https://via.placeholder.com/40" class="w-10 h-10 sm:w-12 sm:h-12 rounded-full border border-brand-200 shadow-sm object-cover">
                        <div class="flex-1 bg-brand-50 p-1 rounded-sm border border-brand-200 focus-within:border-brand-500 focus-within:ring-1 focus-within:ring-brand-500 transition-all shadow-inner">
                            <textarea id="comment-input" rows="2" class="w-full bg-transparent resize-none text-sm p-3 outline-none transition-colors text-brand-800 placeholder-brand-400" placeholder="感想や質問をコメントしてみましょう..."></textarea>
                            <div class="flex justify-between items-center p-2 border-t border-brand-200/50 bg-[#fffdf9]">
                                <label class="flex items-center gap-2 text-xs font-bold text-brand-600 cursor-pointer group px-2 py-1 hover:bg-brand-50 rounded-sm transition-colors">
                                    <input type="checkbox" id="comment-private" class="rounded border-brand-300 text-brand-600 focus:ring-brand-500">
                                    <i class="fa-solid fa-lock text-brand-400 group-hover:text-brand-600 transition-colors"></i> 投稿者にのみ公開する
                                </label>
                                <button onclick="postComment()" id="btn-submit-comment" class="bg-[#3e2723] hover:bg-[#2a1a17] text-[#d4af37] px-6 py-2 rounded-sm text-xs font-bold transition-colors shadow-md disabled:opacity-50 tracking-widest border border-[#b8860b]">コメント送信</button>
                            </div>
                        </div>
                    </div>

                    <div id="comments-list" class="space-y-6">
                        <div class="text-center text-brand-400 text-sm py-8"><i class="fa-solid fa-spinner fa-spin mr-2"></i>読み込み中...</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full lg:w-[320px] xl:w-[400px] flex-shrink-0">
            <h3 class="font-bold text-brand-800 mb-5 tracking-widest text-sm border-b border-brand-200 pb-2 flex items-center"><i class="fa-solid fa-film mr-2 text-brand-400"></i>新着の動画</h3>
            <div id="related-videos" class="flex flex-col gap-4">
                <!-- JSで挿入 -->
            </div>
        </div>

    </main>

    <!-- Notification -->
    <div id="notification" class="fixed top-24 left-1/2 transform -translate-x-1/2 z-[3000] hidden transition-all duration-300 translate-y-20">
        <div class="bg-[#3e2723] text-[#f7f5f0] px-6 py-3 rounded-sm shadow-2xl flex items-center gap-3 backdrop-blur-md bg-opacity-95 border border-[#8b6a4f]"><i class="fa-solid fa-check text-[#d4af37] text-lg"></i><span id="notif-message" class="text-sm font-bold tracking-widest font-serif"></span></div>
    </div>

    <!-- SP用 メディア選択ポップアップ -->
    <div id="sp-theater-menu" class="hidden fixed inset-0 z-[6000] bg-[#2a1a17]/60 backdrop-blur-sm flex items-end justify-center">
        <div class="absolute inset-0" onclick="toggleTheaterMenu()"></div>
        <div class="bg-[#fffdf9] bg-texture w-full rounded-t-xl p-6 transform transition-transform translate-y-full relative shadow-[0_-10px_40px_rgba(0,0,0,0.1)]" id="sp-theater-menu-content">
            <div class="flex justify-between items-center mb-4 border-b border-brand-200 pb-3">
                <h3 class="font-bold text-brand-900 font-serif tracking-widest flex items-center"><i class="fa-solid fa-photo-film text-brand-500 mr-2"></i>メディアを選択</h3>
                <button onclick="toggleTheaterMenu()" class="text-brand-400 hover:text-brand-700 bg-brand-50 rounded-sm w-8 h-8 flex items-center justify-center transition-colors"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="space-y-3">
                <a href="videos.html" class="flex items-center gap-4 p-4 border border-brand-400 bg-brand-50 rounded-sm shadow-sm">
                    <div class="w-12 h-12 bg-[#3e2723] text-[#f7f5f0] rounded-full flex items-center justify-center text-lg"><i class="fa-solid fa-film"></i></div>
                    <div>
                        <h4 class="font-bold text-brand-900 tracking-widest text-base font-serif">NOAH THEATER</h4>
                        <p class="text-[10px] text-brand-600 mt-1 font-bold">動画で想いや活動の軌跡を共有</p>
                    </div>
                </a>
                <a href="podcasts.html" class="flex items-center gap-4 p-4 border border-brand-200 rounded-sm hover:bg-brand-50 transition-colors shadow-sm bg-white">
                    <div class="w-12 h-12 bg-brand-100 text-[#b8860b] rounded-full flex items-center justify-center text-lg"><i class="fa-solid fa-podcast"></i></div>
                    <div>
                        <h4 class="font-bold text-brand-900 tracking-widest text-base font-serif">NOAH CAST</h4>
                        <p class="text-[10px] text-brand-500 mt-1 font-bold">音声で深い考えや対話を配信</p>
                    </div>
                </a>
            </div>
        </div>
    </div>

    
    <script type="module" src="js/page-video_detail.js"></script>
</body>
</html>
