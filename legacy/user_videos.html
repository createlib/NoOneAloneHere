<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ユーザーのシアター | NOAH</title>
    <link rel="icon" href="img/icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="js/tailwind-config.js"></script>
    

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="img/NOAH.png">
    <meta name="theme-color" content="#1a110f">
    <script src="js/pwa-setup.js"></script>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/page-user_videos.css">
</head>
<body class="antialiased min-h-screen bg-texture body-pb-nav lg:pb-0">

    <!-- Navbar -->
    <nav class="bg-[#fffdf9] bg-texture border-b border-brand-200 fixed w-full z-50 top-0 h-16 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full flex justify-between items-center relative z-10">
            <div class="flex items-center gap-4">
                <a href="videos.html" class="text-brand-500 hover:text-brand-800 transition-colors flex items-center gap-2 text-sm font-bold tracking-widest mr-2">
                    <i class="fa-solid fa-arrow-left"></i> <span class="hidden sm:inline">シアターへ戻る</span>
                </a>
                <a href="home.html" class="text-xl font-black text-brand-900 tracking-widest flex items-center gap-2 font-serif">
                    <span class="bg-brand-900 text-brand-50 w-8 h-8 flex items-center justify-center rounded-sm text-sm"><i class="fa-solid fa-play"></i></span>
                    <span class="hidden sm:inline">THEATER</span>
                </a>
            </div>
            
            <div class="flex items-center gap-3">
                <div class="hidden lg:flex items-center gap-6 mr-4">
                    <a href="home.html" class="text-brand-400 hover:text-brand-600 transition-colors flex items-center gap-2 font-bold text-sm tracking-wide"><i class="fa-solid fa-ship"></i> 航海</a>
                    <a href="events.html" class="text-brand-400 hover:text-brand-600 transition-colors flex items-center gap-2 font-bold text-sm tracking-wide"><i class="fa-solid fa-hourglass-half"></i> イベント</a>
                    <a href="search.html" class="text-brand-400 hover:text-brand-600 transition-colors flex items-center gap-2 font-bold text-sm tracking-wide"><i class="fa-solid fa-compass"></i> さがす</a>
                    <a href="videos.html" class="text-brand-600 transition-colors flex items-center gap-2 font-bold text-sm tracking-wide"><i class="fa-solid fa-video"></i> シアター</a>
                    <a href="user.html" class="auth-required text-brand-400 hover:text-brand-600 transition-colors flex items-center gap-2 font-bold text-sm tracking-wide"><i class="fa-solid fa-user"></i> マイページ</a>
                </div>
                <a href="notifications.html" class="auth-required p-2 text-brand-300 hover:text-brand-600 transition-colors relative" title="通知">
                    <i class="fa-regular fa-bell text-xl"></i>
                </a>
                <button onclick="location.reload()" class="p-2 text-brand-300 hover:text-brand-600 transition-colors" title="更新"><i class="fa-solid fa-rotate-right"></i></button>
                <div class="h-6 w-px bg-brand-200 mx-1 hidden lg:block"></div>
                <button onclick="handleAuthAction()" class="hidden lg:flex text-sm font-bold text-brand-400 hover:text-brand-800 transition-colors flex items-center gap-2">
                    <span class="hidden sm:inline tracking-widest" id="nav-auth-text">下船する</span>
                    <i class="fa-solid fa-right-from-bracket text-lg" id="nav-auth-icon"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Bottom Nav (SP) -->
    <nav class="lg:hidden bottom-nav-fixed shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <div class="bottom-nav-content">
            <a href="home.html" class="flex flex-col items-center justify-center w-full h-full text-brand-400 hover:text-brand-600 transition-colors">
                <i class="fa-solid fa-ship text-xl mb-1"></i>
                <span class="text-[10px] font-medium tracking-widest">航海</span>
            </a>
            <a href="events.html" class="flex flex-col items-center justify-center w-full h-full text-brand-400 hover:text-brand-600 transition-colors">
                <i class="fa-solid fa-hourglass-half text-xl mb-1"></i>
                <span class="text-[10px] font-medium tracking-widest">イベント</span>
            </a>
            <a href="search.html" class="flex flex-col items-center justify-center w-full h-full text-brand-400 hover:text-brand-600 transition-colors">
                <i class="fa-solid fa-compass text-xl mb-1"></i>
                <span class="text-[10px] font-medium tracking-widest">さがす</span>
            </a>
            <a href="videos.html" class="flex flex-col items-center justify-center w-full h-full text-brand-600 border-t-2 border-brand-500 pt-[2px] transition-colors">
                <i class="fa-solid fa-video text-xl mb-1"></i>
                <span class="text-[10px] font-bold tracking-widest">シアター</span>
            </a>
            <a href="user.html" class="auth-required flex flex-col items-center justify-center w-full h-full text-brand-400 hover:text-brand-600 transition-colors">
                <i class="fa-solid fa-user text-xl mb-1"></i>
                <span class="text-[10px] font-medium tracking-widest">マイページ</span>
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto pt-20 px-4 sm:px-6 lg:px-8">
        
        <!-- User Info Header (Channel Header) -->
        <div class="py-10 flex flex-col items-center text-center relative bg-[#fffdf9] shadow-sm border border-brand-200 rounded-sm mb-8 overflow-hidden mt-6">
            <div class="absolute top-0 left-0 w-8 h-8 border-t border-l border-brand-500 z-10 m-2"></div>
            <div class="absolute bottom-0 right-0 w-8 h-8 border-b border-r border-brand-500 z-10 m-2"></div>
            <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,rgba(139,106,79,0.05)_0%,transparent_70%)] pointer-events-none"></div>
            
            <a id="author-profile-link" href="#" class="w-24 h-24 sm:w-32 sm:h-32 rounded-full border-4 border-[#fffdf9] shadow-md bg-brand-100 flex items-center justify-center overflow-hidden mb-4 group cursor-pointer hover:border-brand-300 transition-colors relative z-10">
                <img id="header-icon" src="https://via.placeholder.com/150" class="w-full h-full object-cover group-hover:scale-105 transition-transform" onerror="this.src='https://via.placeholder.com/150?text=U'">
            </a>
            <h1 id="header-name" class="text-2xl md:text-3xl font-bold font-serif text-brand-900 tracking-widest mb-1 relative z-10 flex items-center gap-2">
                <span id="user-name"><i class="fa-solid fa-spinner fa-spin"></i></span>
                <i class="fa-solid fa-circle-check text-sm text-[#d4af37]" title="NOAH認証"></i>
            </h1>
            <p class="text-sm text-brand-500 tracking-widest relative z-10 font-mono mb-2" id="user-id">@...</p>
            <p class="text-xs text-brand-600 tracking-widest relative z-10 mb-5 font-bold" id="user-job"></p>
            
            <div class="mt-2 flex gap-4 relative z-10">
                <a id="btn-profile" href="#" class="px-6 py-2.5 bg-[#3e2723] text-[#d4af37] border border-[#b8860b] rounded-sm text-xs font-bold hover:bg-[#2a1a17] transition-all shadow-md tracking-widest flex items-center gap-2">
                    <i class="fa-solid fa-user"></i> 航海録(プロフィール)を見る
                </a>
            </div>
        </div>

        <div class="flex items-center justify-between mb-6 border-b border-brand-200 pb-2">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-film text-brand-400 text-xl"></i>
                <h2 class="font-bold text-brand-900 text-lg font-serif tracking-widest">投稿した動画</h2>
            </div>
            <span id="video-count" class="text-xs bg-brand-100 text-brand-700 px-2 py-0.5 rounded-sm font-bold tracking-widest">0件</span>
        </div>

        <!-- Video Grid -->
        <div id="video-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 sm:gap-8 pb-12">
            <div class="col-span-full text-center py-12 text-brand-400"><i class="fa-solid fa-spinner fa-spin mr-2"></i>動画を探しています...</div>
        </div>

    </main>

    
    <script type="module" src="js/page-user_videos.js"></script>
</body>
</html>
