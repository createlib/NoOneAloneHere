<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>さがす | NOAH</title>
    <link rel="icon" href="img/icon.png">
    
    <!-- Google Fonts: Noto Serif JP -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="js/tailwind-config.js"></script>
    

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="img/NOAH.png">
    <meta name="theme-color" content="#1a110f">
    <script src="js/pwa-setup.js"></script>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/page-search.css">
</head>
<body class="antialiased overflow-x-hidden body-pb-nav lg:pb-0 bg-texture">

    <!-- Navbar -->
    <nav class="bg-[#fffdf9] bg-texture border-b border-brand-200 fixed w-full z-50 top-0 h-16 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full flex justify-between items-center relative z-10">
            <div class="flex items-center gap-4">
                <a href="home.html" class="text-xl font-black text-brand-900 tracking-widest flex items-center gap-2 font-serif">
                    <span class="bg-brand-900 text-brand-50 w-8 h-8 flex items-center justify-center rounded-sm text-sm"><i class="fa-solid fa-compass"></i></span>
                    <span class="hidden sm:inline">SEARCH</span>
                </a>
            </div>
            <div class="flex items-center gap-3">
                <!-- PC Navigation Links -->
                <div class="hidden lg:flex items-center gap-6 mr-4">
                    <a href="home.html" class="text-brand-400 hover:text-brand-600 transition-colors flex items-center gap-2 font-bold text-sm tracking-wide"><i class="fa-solid fa-ship"></i> 航海</a>
                    <a href="events.html" class="text-brand-400 hover:text-brand-600 transition-colors flex items-center gap-2 font-bold text-sm tracking-wide"><i class="fa-solid fa-hourglass-half"></i> イベント</a>
                    <a href="search.html" class="text-brand-600 transition-colors flex items-center gap-2 font-bold text-sm tracking-wide"><i class="fa-solid fa-compass"></i> さがす</a>
                    
                    <div class="relative group h-full flex items-center">
                        <button class="text-brand-400 hover:text-brand-600 transition-colors flex items-center gap-2 font-bold text-sm tracking-wide focus:outline-none">
                            <i class="fa-solid fa-photo-film"></i> メディア
                        </button>
                        <div class="absolute top-[calc(100%-0.5rem)] left-1/2 transform -translate-x-1/2 w-48 bg-[#fffdf9] border border-brand-200 shadow-xl rounded-sm hidden group-hover:block transition-opacity overflow-hidden">
                            <a href="videos.html" class="flex items-center px-4 py-3 text-sm font-bold text-brand-800 hover:bg-brand-50 border-b border-brand-100 transition-colors tracking-widest group/item">
                                <i class="fa-solid fa-film text-brand-400 group-hover/item:text-brand-600 mr-2 w-5 text-center transition-colors"></i> THEATER
                            </a>
                            <a href="podcasts.html" class="flex items-center px-4 py-3 text-sm font-bold text-brand-800 hover:bg-brand-50 transition-colors tracking-widest group/item">
                                <i class="fa-solid fa-podcast text-[#b8860b] mr-2 w-5 text-center group-hover/item:scale-110 transition-transform"></i> CAST
                            </a>
                        </div>
                    </div>

                    <a href="user.html" class="text-brand-400 hover:text-brand-600 transition-colors flex items-center gap-2 font-bold text-sm tracking-wide"><i class="fa-solid fa-user"></i> マイページ</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Bottom Navigation -->
    <nav class="lg:hidden bottom-nav-fixed shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <div class="bottom-nav-content">
            <a href="home.html" class="flex flex-col items-center justify-center w-full h-full text-brand-400 hover:text-brand-600 transition-colors">
                <i class="fa-solid fa-ship text-xl mb-1"></i>
                <span class="text-[10px] font-medium tracking-widest">航海</span>
            </a>
            <a href="events.html" class="flex flex-col items-center justify-center w-full h-full text-brand-400 hover:text-brand-600 transition-colors">
                <i class="fa-solid fa-hourglass-half text-xl mb-1"></i>
                <span class="text-[10px] font-medium tracking-widest">イベント</span>
            </a>
            <a href="search.html" class="flex flex-col items-center justify-center w-full h-full text-brand-600 border-t-2 border-brand-500 pt-[2px]">
                <i class="fa-solid fa-compass text-xl mb-1"></i>
                <span class="text-[10px] font-bold tracking-widest">さがす</span>
            </a>
            <a href="javascript:void(0)" onclick="toggleTheaterMenu()" class="flex flex-col items-center justify-center w-full h-full text-brand-400 hover:text-brand-600 transition-colors">
                <i class="fa-solid fa-photo-film text-xl mb-1"></i>
                <span class="text-[10px] font-medium tracking-widest">メディア</span>
            </a>
            <a href="user.html" class="flex flex-col items-center justify-center w-full h-full text-brand-400 hover:text-brand-600 transition-colors">
                <i class="fa-solid fa-user text-xl mb-1"></i>
                <span class="text-[10px] font-medium tracking-widest">マイページ</span>
            </a>
        </div>
    </nav>

    <!-- SP用 メディア選択ポップアップ -->
    <div id="sp-theater-menu" class="hidden fixed inset-0 z-[2000] bg-[#2a1a17]/60 backdrop-blur-sm flex items-end justify-center">
        <div class="absolute inset-0" onclick="toggleTheaterMenu()"></div>
        <div class="bg-[#fffdf9] bg-texture w-full rounded-t-xl p-6 transform transition-transform translate-y-full relative shadow-[0_-10px_40px_rgba(0,0,0,0.1)]" id="sp-theater-menu-content">
            <div class="flex justify-between items-center mb-4 border-b border-brand-200 pb-3">
                <h3 class="font-bold text-brand-900 font-serif tracking-widest flex items-center"><i class="fa-solid fa-photo-film text-brand-500 mr-2"></i>メディアを選択</h3>
                <button onclick="toggleTheaterMenu()" class="text-brand-400 hover:text-brand-700 bg-brand-50 rounded-sm w-8 h-8 flex items-center justify-center transition-colors"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="space-y-3">
                <a href="videos.html" class="flex items-center gap-4 p-4 border border-brand-400 bg-brand-50 rounded-sm shadow-sm">
                    <div class="w-12 h-12 bg-[#3e2723] text-[#f7f5f0] rounded-full flex items-center justify-center text-lg"><i class="fa-solid fa-film"></i></div>
                    <div>
                        <h4 class="font-bold text-brand-900 tracking-widest text-base font-serif">NOAH THEATER</h4>
                        <p class="text-[10px] text-brand-600 mt-1 font-bold">動画で想いや活動の軌跡を共有</p>
                    </div>
                </a>
                <a href="podcasts.html" class="flex items-center gap-4 p-4 border border-brand-200 rounded-sm hover:bg-brand-50 transition-colors shadow-sm bg-white">
                    <div class="w-12 h-12 bg-brand-100 text-[#b8860b] rounded-full flex items-center justify-center text-lg"><i class="fa-solid fa-podcast"></i></div>
                    <div>
                        <h4 class="font-bold text-brand-900 tracking-widest text-base font-serif">NOAH CAST</h4>
                        <p class="text-[10px] text-brand-500 mt-1 font-bold">音声で深い考えや対話を配信</p>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <!-- Main Content Area -->
    <main class="max-w-7xl mx-auto pt-20 px-4 sm:px-6 lg:px-8 pb-10">
        
        <!-- ★追加: 権限不足時のロック画面 -->
        <div id="locked-view" class="hidden text-center py-24 px-6 bg-[#fffdf9] rounded-sm border border-brand-200 shadow-md mb-12 max-w-2xl mx-auto relative overflow-hidden">
            <div class="absolute top-0 left-1/2 transform -translate-x-1/2 w-full h-1 bg-[#8b6a4f]"></div>
            <div class="w-20 h-20 bg-brand-50 rounded-full border border-brand-200 flex items-center justify-center mx-auto mb-6 text-brand-300 shadow-inner">
                <i class="fa-solid fa-lock text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-brand-900 mb-4 font-serif tracking-widest">検索機能の利用制限</h2>
            <p class="text-sm text-brand-600 mb-8 tracking-widest leading-relaxed">
                他の乗客を探す機能は、<br class="sm:hidden"><span class="font-bold text-[#8b6a4f]">SETTLER（またはそれ以上）</span>の会員限定です。<br>
                コミュニティの仲間を探すには、契約のアップグレードをご検討ください。
            </p>
            <a href="upgrade.html" class="inline-flex items-center justify-center px-8 py-4 bg-[#3e2723] text-[#d4af37] font-bold rounded-sm shadow-md hover:bg-[#2a1a17] transition-colors border border-[#b8860b] tracking-widest text-sm transform hover:-translate-y-0.5">
                <i class="fa-solid fa-shield-halved mr-2"></i> 契約を確認・変更する
            </a>
        </div>

        <!-- 検索コンテンツ (権限がある場合のみ表示) -->
        <div id="search-content" class="hidden">
            <!-- Search & Filter Header -->
            <div class="mb-8 bg-[#fffdf9] p-4 sm:p-6 rounded-sm shadow-md border border-brand-200 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-8 h-8 border-t border-r border-brand-500 z-10 m-2"></div>
                
                <div class="flex flex-col lg:flex-row gap-4 relative z-10">
                    <!-- Free Word Search -->
                    <div class="flex-1 relative">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-brand-400"></i>
                        <input type="text" id="search-input" placeholder="名前、職業、スキルで検索..." class="w-full pl-10 pr-4 py-3 rounded-sm border border-brand-200 shadow-sm text-sm focus:ring-brand-500 focus:border-brand-500 bg-[#f7f5f0]" oninput="filterUsers()">
                    </div>
                    
                    <!-- Filters -->
                    <div class="flex flex-wrap sm:flex-nowrap gap-2">
                        <!-- ★変更: OSナンバー用の数値入力フィールド -->
                        <div class="relative flex-1 sm:w-36">
                            <i class="fa-solid fa-dna absolute left-3 top-1/2 transform -translate-y-1/2 text-brand-400 text-xs"></i>
                            <input type="number" id="filter-os-number" placeholder="OS No." min="1" max="60" class="w-full border border-brand-200 rounded-sm py-3 pl-8 pr-3 text-sm bg-[#f7f5f0] text-brand-700 shadow-sm focus:ring-brand-500 focus:border-brand-500 font-medium tracking-widest" oninput="filterUsers()">
                        </div>
                        
                        <select id="filter-area" class="filter-select flex-1 sm:w-40 border border-brand-200 rounded-sm py-3 px-3 text-sm bg-[#f7f5f0] text-brand-700 shadow-sm focus:ring-brand-500 font-medium tracking-widest" onchange="filterUsers()">
                            <option value="">全てのエリア</option>
                            <!-- JSで挿入 -->
                        </select>
                    </div>
                </div>
                
                <div class="mt-4 pt-4 border-t border-brand-100 flex justify-between items-center text-xs text-brand-500">
                    <span class="tracking-widest"><i class="fa-solid fa-users mr-1"></i> <span id="result-count">0</span> 名の乗客</span>
                    <span class="tracking-widest">※非公開設定のユーザーは表示されません</span>
                </div>
            </div>

            <!-- Users Grid -->
            <div id="users-grid" class="grid grid-cols-3 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 sm:gap-6">
                <div class="col-span-full text-center py-10 text-brand-400"><i class="fa-solid fa-spinner fa-spin mr-2"></i>探索中...</div>
            </div>
        </div>

    </main>

    
    <script type="module" src="js/page-search.js"></script>
</body>
</html>
