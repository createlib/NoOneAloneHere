            if(!confirm("1〜60までの全データをFirestoreに自動構築します。\nよろしいですか？")) return;

            btn.disabled = true;
            logContainer.classList.remove('hidden');
            logBox.innerHTML = "";
            log("🚀 データベースの構築を開始します...", "text-emerald-400 font-bold");

            let skipCount = 0;
            let successCount = 0;

            try {
                for (let i = 1; i <= 60; i++) {
                    const docRef = doc(db, "artifacts", appId, "os_blueprints", String(i));
                    
                    const snap = await getDoc(docRef);
                    // ★ `completedData[i]` にデータが存在するかどうかで、上書き対象かを自動判定
                    const isCompleted = !!completedData[i];

                    // 「すでに中身があって」かつ「今回新しく用意した完成データではない」場合はスキップ
                    if (snap.exists() && snap.data().kanji !== "解析待" && !isCompleted) {
                        log(`[SKIP] No.${i} は既に執筆済みのため上書きをスキップしました。`, "text-yellow-400");
                        skipCount++;
                    } else {
                        // completedDataにあればそれを使用、なければダミーを生成
                        const dataToSave = isCompleted ? completedData[i] : getDummyData(i);

                        // Firestoreへ送信
                        await setDoc(docRef, dataToSave);
                        
                        if (isCompleted) {
                            log(`[UPDATE] No.${i} (${dataToSave.kanji}) を完全データで上書きしました。`, "text-white font-bold");
                        } else {
                            log(`[SUCCESS] No.${i} をダミー枠で生成しました。`, "text-gray-400");
                        }
                        
                        successCount++;
                    }

                    // プログレスバーの更新
                    const percent = Math.round((i / 60) * 100);
                    progressBar.style.width = `${percent}%`;
                    progressText.textContent = `${i} / 60`;
                }
                
                log("🎉 すべてのデータ構築処理が完了しました！", "text-[#c5a880] font-bold mt-4 text-lg");
                log(`> 更新・生成: ${successCount} 件 / スキップ: ${skipCount} 件`, "text-white");
                btn.textContent = "データベース構築完了";
                
            } catch (error) {
                console.error(error);
                log("❌ エラーが発生しました: " + error.message, "text-red-500 font-bold");
                btn.textContent = "エラーが発生しました";
            }
        });
    </script>
</body>
</html>
