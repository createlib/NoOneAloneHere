<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キャスト | NOAH</title>
    <link rel="icon" href="img/icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { serif: ['Noto Serif JP', 'serif'] },
                    colors: { brand: { 50: '#f7f5f0', 100: '#e8dfd1', 200: '#dcd4c6', 300: '#c8b9a6', 400: '#a09080', 500: '#8b6a4f', 600: '#725b3f', 700: '#5c4a3d', 800: '#4a3b32', 900: '#3e2723' } }
                }

    <style>
        body { font-family: 'Noto Serif JP', serif; background-color: #f7f5f0; color: #4a3b32; }
        .bg-texture { background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E"); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .podcast-card { transition: all 0.3s ease; }
        .podcast-card:hover { transform: translateY(-4px); }
        .podcast-card:hover .play-icon { transform: scale(1.1); background-color: #b8860b; color: #fffdf9; border-color: #b8860b; }
        
        .glass-bar {
            background: rgba(247, 245, 240, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(220, 212, 198, 0.5);
        }

        .bottom-nav-fixed {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background-color: #fffdf9; border-top: 1px solid #e8dfd1;
            z-index: 50; height: 4rem; height: calc(4rem + env(safe-area-inset-bottom));
            padding-bottom: env(safe-area-inset-bottom);
        }
        .bottom-nav-content { height: 4rem; display: flex; justify-content: space-around; align-items: center; width: 100%; }
        .body-pb-nav { padding-bottom: calc(5rem + env(safe-area-inset-bottom)); }
    </style>
</head>
<body class="antialiased min-h-screen bg-texture body-pb-nav lg:pb-0">

    <!-- Navbar -->
    <nav class="bg-[#fffdf9] bg-texture border-b border-brand-200 fixed w-full z-50 top-0 h-16 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full flex justify-between items-center relative z-10">
            <div class="flex items-center gap-4">
                <a href="home.html" class="text-xl font-black text-brand-900 tracking-widest flex items-center gap-2 font-serif">
                    <span class="bg-brand-900 text-brand-50 w-8 h-8 flex items-center justify-center rounded-sm text-sm"><i class="fa-solid fa-podcast text-[#d4af37]"></i></span>
                    <span class="hidden sm:inline">CAST</span>
                </a>
            </div>
            
            <div class="flex items-center gap-3 h-full">
                <!-- PC Navigation Links -->
                <div class="hidden lg:flex items-center gap-6 mr-4 h-full">
                    <a href="home.html" class="text-brand-400 hover:text-brand-600 transition-colors flex items-center gap-2 font-bold text-sm tracking-wide"><i class="fa-solid fa-ship"></i> 航海</a>
                    <a href="events.html" class="text-brand-400 hover:text-brand-600 transition-colors flex items-center gap-2 font-bold text-sm tracking-wide"><i class="fa-solid fa-hourglass-half"></i> イベント</a>
                    <a href="search.html" class="text-brand-400 hover:text-brand-600 transition-colors flex items-center gap-2 font-bold text-sm tracking-wide"><i class="fa-solid fa-compass"></i> さがす</a>
                    
                    <!-- メディア ドロップダウン (PC) -->
                    <div class="relative group h-full flex items-center">
                        <button class="text-[#b8860b] transition-colors flex items-center gap-2 font-bold text-sm tracking-wide focus:outline-none">
                            <i class="fa-solid fa-photo-film"></i> メディア
                        </button>
                        <div class="absolute top-[calc(100%-0.5rem)] left-1/2 transform -translate-x-1/2 w-48 bg-[#fffdf9] border border-brand-200 shadow-xl rounded-sm hidden group-hover:block transition-opacity">
                            <a href="videos.html" class="block px-4 py-3 text-sm font-bold text-brand-400 hover:bg-brand-50 hover:text-brand-700 border-b border-brand-100 transition-colors tracking-widest"><i class="fa-solid fa-film mr-2 text-brand-500"></i>THEATER</a>

                        </div>
                    </div>

                    <a href="user.html" class="auth-required text-brand-400 hover:text-brand-600 transition-colors flex items-center gap-2 font-bold text-sm tracking-wide"><i class="fa-solid fa-user"></i> マイページ</a>
                </div>

                <!-- ★修正: リンク先を podcast_post.html に変更 -->
                <button id="btn-post" onclick="window.location.href='podcast_post.html'" class="hidden items-center px-4 py-1.5 bg-[#b8860b] text-[#fffdf9] text-xs font-bold rounded-sm shadow-md hover:bg-[#996515] transition-colors tracking-widest">
                    <i class="fa-solid fa-microphone mr-1"></i> 音声を配信
                </button>

                <!-- PC用 UPGRADEボタン -->
                <a href="upgrade.html" class="auth-required hidden lg:inline-flex items-center px-4 py-1.5 bg-gradient-to-r from-[#d4af37] to-[#b8860b] text-[#2a1a17] text-xs font-bold rounded-sm shadow-md hover:shadow-lg transition-all transform hover:-translate-y-0.5 border border-[#996515]">
                    <i class="fa-solid fa-shield-halved mr-1"></i> 契約変更
                </a>

                <a href="notifications.html" class="auth-required p-2 text-brand-300 hover:text-brand-600 transition-colors relative" title="通知">
                    <i class="fa-regular fa-bell text-xl"></i>
                    <span class="hidden absolute top-1.5 right-1.5 h-2.5 w-2.5 bg-[#8b6a4f] rounded-full border-2 border-[#fffdf9]" id="nav-badge"></span>
                </a>
                
                <button onclick="location.reload()" class="p-2 text-brand-300 hover:text-brand-600 transition-colors" title="更新"><i class="fa-solid fa-rotate-right"></i></button>

                <div class="h-6 w-px bg-brand-200 mx-1 hidden lg:block"></div>
                <button onclick="handleAuthAction()" class="hidden lg:flex text-sm font-bold text-brand-400 hover:text-brand-800 transition-colors flex items-center gap-2">
                    <span class="hidden sm:inline tracking-widest" id="nav-auth-text">下船する</span>
                    <i class="fa-solid fa-right-from-bracket text-lg" id="nav-auth-icon"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Bottom Nav (SP) -->
    <nav class="lg:hidden bottom-nav-fixed shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <div class="bottom-nav-content">
            <a href="home.html" class="flex flex-col items-center justify-center w-full h-full text-brand-400 hover:text-brand-600 transition-colors">
                <i class="fa-solid fa-ship text-xl mb-1"></i>
                <span class="text-[10px] font-medium tracking-widest">航海</span>
            </a>
            <a href="events.html" class="flex flex-col items-center justify-center w-full h-full text-brand-400 hover:text-brand-600 transition-colors">
                <i class="fa-solid fa-hourglass-half text-xl mb-1"></i>
                <span class="text-[10px] font-medium tracking-widest">イベント</span>
            </a>
            <a href="search.html" class="flex flex-col items-center justify-center w-full h-full text-brand-400 hover:text-brand-600 transition-colors">
                <i class="fa-solid fa-compass text-xl mb-1"></i>
                <span class="text-[10px] font-medium tracking-widest">さがす</span>
            </a>
            <a href="javascript:void(0)" onclick="toggleTheaterMenu()" class="flex flex-col items-center justify-center w-full h-full text-[#b8860b] border-t-2 border-[#b8860b] pt-[2px] transition-colors">
                <i class="fa-solid fa-photo-film text-xl mb-1"></i>
                <span class="text-[10px] font-bold tracking-widest">メディア</span>
            </a>
            <a href="user.html" class="auth-required flex flex-col items-center justify-center w-full h-full text-brand-400 hover:text-brand-600 transition-colors">
                <i class="fa-solid fa-user text-xl mb-1"></i>
                <span class="text-[10px] font-medium tracking-widest">マイページ</span>
            </a>
        </div>
    </nav>

    <!-- SP用 メディア選択ポップアップ -->
    <div id="sp-theater-menu" class="hidden fixed inset-0 z-[2000] bg-[#2a1a17]/60 backdrop-blur-sm flex items-end justify-center">
        <div class="absolute inset-0" onclick="toggleTheaterMenu()"></div>
        <div class="bg-[#fffdf9] bg-texture w-full rounded-t-xl p-6 transform transition-transform translate-y-full relative shadow-[0_-10px_40px_rgba(0,0,0,0.1)]" id="sp-theater-menu-content">
            <div class="flex justify-between items-center mb-4 border-b border-brand-200 pb-3">
                <h3 class="font-bold text-brand-900 font-serif tracking-widest flex items-center"><i class="fa-solid fa-photo-film text-brand-500 mr-2"></i>メディアを選択</h3>
                <button onclick="toggleTheaterMenu()" class="text-brand-400 hover:text-brand-700 bg-brand-50 rounded-sm w-8 h-8 flex items-center justify-center transition-colors"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="space-y-3">
                <a href="videos.html" class="flex items-center gap-4 p-4 border border-brand-200 rounded-sm hover:bg-brand-50 transition-colors shadow-sm bg-white">
                    <div class="w-12 h-12 bg-brand-100 text-brand-600 rounded-full flex items-center justify-center text-lg"><i class="fa-solid fa-film"></i></div>
                    <div>
                        <h4 class="font-bold text-brand-900 tracking-widest text-base font-serif">NOAH THEATER</h4>
                        <p class="text-[10px] text-brand-500 mt-1 font-bold">動画で想いや活動の軌跡を共有</p>
                    </div>
                </a>
                <a href="podcasts.html" class="flex items-center gap-4 p-4 border border-[#b8860b] bg-brand-50 rounded-sm shadow-sm">
                    <div class="w-12 h-12 bg-[#3e2723] text-[#d4af37] rounded-full flex items-center justify-center text-lg"><i class="fa-solid fa-podcast"></i></div>
                    <div>
                        <h4 class="font-bold text-brand-900 tracking-widest text-base font-serif">NOAH CAST</h4>
                        <p class="text-[10px] text-[#b8860b] mt-1 font-bold">音声で深い考えや対話を配信</p>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto pt-20 px-4 sm:px-6 lg:px-8">
        
        <!-- Podcast Hero Header -->
        <div class="py-8 md:py-12 flex flex-col items-center text-center relative">
            <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,rgba(212,175,55,0.05)_0%,transparent_70%)] pointer-events-none"></div>
            <i class="fa-solid fa-podcast text-3xl text-[#d4af37] mb-3"></i>
            <h1 class="text-3xl md:text-5xl font-bold font-serif text-brand-900 tracking-widest mb-3">NOAH CAST</h1>
            <p class="text-sm text-brand-500 tracking-widest max-w-2xl mx-auto leading-relaxed">
                声だからこそ伝わる温度、思考のプロセス。<br class="hidden sm:block">対談やひとり語りを通して、メンバーの深い価値観に触れる場所。
            </p>
        </div>

        <!-- Search & Tags -->
        <div class="mb-8 sticky top-16 z-30 glass-bar py-4 -mx-4 px-4 sm:mx-0 sm:px-0 sm:bg-transparent sm:backdrop-blur-none sm:border-none">
            <div class="flex flex-col md:flex-row gap-4 mb-4 items-center justify-between">
                <div class="relative w-full md:w-96 group">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 transform -translate-y-1/2 text-brand-400 group-focus-within:text-brand-600 transition-colors"></i>
                    <input type="text" id="search-input" placeholder="タイトルやゲストで検索..." class="w-full pl-11 pr-4 py-3 rounded-full border border-brand-200 shadow-sm text-sm focus:ring-brand-500 focus:border-brand-500 bg-[#fffdf9] transition-shadow hover:shadow-md">
                </div>
                
                <div class="flex gap-2 overflow-x-auto no-scrollbar py-1 w-full md:w-auto pb-2" id="tag-filters">
                    <button onclick="filterByTag('')" class="tag-btn active whitespace-nowrap px-5 py-2 rounded-full text-xs font-bold transition-all shadow-sm bg-[#3e2723] text-[#d4af37] border border-[#b8860b] transform hover:scale-105">すべて</button>
                    <button onclick="filterByTag('対談・インタビュー')" class="tag-btn whitespace-nowrap px-5 py-2 rounded-full text-xs font-bold transition-all shadow-sm bg-[#fffdf9] text-brand-600 border border-brand-200 hover:bg-brand-50 hover:border-[#b8860b] transform hover:scale-105">対談・インタビュー</button>
                    <button onclick="filterByTag('ひとり語り')" class="tag-btn whitespace-nowrap px-5 py-2 rounded-full text-xs font-bold transition-all shadow-sm bg-[#fffdf9] text-brand-600 border border-brand-200 hover:bg-brand-50 hover:border-[#b8860b] transform hover:scale-105">ひとり語り</button>
                    <button onclick="filterByTag('ノウハウ共有')" class="tag-btn whitespace-nowrap px-5 py-2 rounded-full text-xs font-bold transition-all shadow-sm bg-[#fffdf9] text-brand-600 border border-brand-200 hover:bg-brand-50 hover:border-[#b8860b] transform hover:scale-105">ノウハウ共有</button>
                    <button onclick="filterByTag('活動報告')" class="tag-btn whitespace-nowrap px-5 py-2 rounded-full text-xs font-bold transition-all shadow-sm bg-[#fffdf9] text-brand-600 border border-brand-200 hover:bg-brand-50 hover:border-[#b8860b] transform hover:scale-105">活動報告</button>
                </div>
            </div>
        </div>

        <!-- Podcast Grid -->
        <div id="podcast-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 sm:gap-8 pb-12">
            <div class="col-span-full text-center py-12 text-brand-400"><i class="fa-solid fa-spinner fa-spin mr-2"></i>音声を読み込み中...</div>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, getDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBVDZJhL9sMzVknD5tNomLWF-0z0jPU3i0", authDomain: "brainbridge-4b8ac.firebaseapp.com", projectId: "brainbridge-4b8ac", storageBucket: "brainbridge-4b8ac.firebasestorage.app", messagingSenderId: "803209683213", appId: "1:803209683213:web:b62d13784fa2bbbb9f5044" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'default-app-id';

        let currentUser = null;
        let isAdmin = false;
        let myRank = 'arrival';
        let allPodcasts = [];
        let currentTag = '';

        const isAdminMock = localStorage.getItem('isAdminMock') === 'true';

        onAuthStateChanged(auth, async (user) => {
            if (isAdminMock) {
                currentUser = { uid: 'test_admin_uid' };
                isAdmin = true;
                document.getElementById('btn-post').classList.remove('hidden');
                document.getElementById('btn-post').classList.add('inline-flex');
                updateNavForAuth(true);
                fetchPodcasts();
                return;
            }

            if (user && !user.isAnonymous) {
                currentUser = user;
                try {
                    const mySnap = await getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data'));
                    if (mySnap.exists()) {
                        const rank = mySnap.data().membershipRank || 'arrival';
                        if (mySnap.data().userId === 'admin') isAdmin = true;
                        
                        if (rank !== 'arrival' || isAdmin) {
                            const btnPost = document.getElementById('btn-post');
                            btnPost.classList.remove('hidden');
                            btnPost.classList.add('inline-flex');
                        }
                    }
                } catch(e) {}
                updateNavForAuth(true);
                fetchPodcasts();
            } else {
                updateNavForAuth(false);
                fetchPodcasts();
            }
        });

        // SP用 メディアメニューのトグル
        window.toggleTheaterMenu = () => {
            const menu = document.getElementById('sp-theater-menu');
            const content = document.getElementById('sp-theater-menu-content');
            if (menu.classList.contains('hidden')) {
                menu.classList.remove('hidden');
                setTimeout(() => content.classList.remove('translate-y-full'), 10);
            } else {
                content.classList.add('translate-y-full');
                setTimeout(() => menu.classList.add('hidden'), 300);
            }
        };

        function updateNavForAuth(isLoggedIn) {
            document.querySelectorAll('.auth-required').forEach(el => {
                el.style.display = isLoggedIn ? '' : 'none';
            });
            const authText = document.getElementById('nav-auth-text');
            const authIcon = document.getElementById('nav-auth-icon');
            if (authText && authIcon) {
                if (isLoggedIn) {
                    authText.textContent = '下船する';
                    authIcon.className = 'fa-solid fa-right-from-bracket text-lg';
                } else {
                    authText.textContent = '乗船する';
                    authIcon.className = 'fa-solid fa-right-to-bracket text-lg';
                }
            }
        }

        window.handleAuthAction = () => {
            if (currentUser || isAdminMock) {
                if (isAdminMock) localStorage.removeItem('isAdminMock');
                signOut(auth);
                window.location.reload(); 
            } else {
                window.location.href = 'login.html';
            }
        };

        async function fetchPodcasts() {
            try {
                const podRef = collection(db, 'artifacts', appId, 'public', 'data', 'podcasts');
                const snap = await getDocs(podRef);
                
                allPodcasts = [];
                snap.forEach(doc => {
                    allPodcasts.push({ id: doc.id, ...doc.data() });
                });
                
                allPodcasts.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                renderPodcasts();
            } catch (error) {
                console.error("Error fetching podcasts:", error);
                document.getElementById('podcast-grid').innerHTML = '<div class="col-span-full text-center text-red-500 py-10">音声の取得に失敗しました</div>';
            }
        }

        window.filterByTag = (tag) => {
            currentTag = tag;
            
            document.querySelectorAll('.tag-btn').forEach(btn => {
                if ((tag === '' && btn.textContent === 'すべて') || btn.textContent.includes(tag) && tag !== '') {
                    btn.className = 'tag-btn active whitespace-nowrap px-5 py-2 rounded-full text-xs font-bold transition-all shadow-sm bg-[#3e2723] text-[#d4af37] border border-[#b8860b] transform scale-105';
                } else {
                    btn.className = 'tag-btn whitespace-nowrap px-5 py-2 rounded-full text-xs font-bold transition-all shadow-sm bg-[#fffdf9] text-brand-600 border border-brand-200 hover:bg-brand-50 hover:border-[#b8860b] transform hover:scale-105';
                }
            });
            renderPodcasts();
        };

        document.getElementById('search-input').addEventListener('input', renderPodcasts);

        function renderPodcasts() {
            const grid = document.getElementById('podcast-grid');
            const searchQ = document.getElementById('search-input').value.toLowerCase();
            
            let filtered = allPodcasts.filter(p => {
                const matchTag = currentTag === '' || (p.tags && p.tags.includes(currentTag));
                const matchSearch = searchQ === '' || 
                                    (p.title && p.title.toLowerCase().includes(searchQ)) || 
                                    (p.guests && p.guests.join(',').toLowerCase().includes(searchQ));
                return matchTag && matchSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="col-span-full flex flex-col items-center justify-center text-brand-400 py-20 bg-[#fffdf9] rounded-sm border border-dashed border-brand-200"><i class="fa-solid fa-microphone-slash text-4xl mb-3 text-brand-200"></i><p>該当する配信がありません。</p></div>';
                return;
            }

            let html = '';
            filtered.forEach(p => {
                const date = new Date(p.createdAt);
                const dateStr = `${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()}`;
                const thumbUrl = p.thumbnailUrl || 'https://images.unsplash.com/photo-1590602847861-f357a9332bbc?q=80&w=640&auto=format&fit=crop';
                
                html += `
                <a href="javascript:alert('CASTの再生画面は準備中です (ID: ${p.id})')" class="podcast-card flex items-stretch bg-[#fffdf9] rounded-sm overflow-hidden border border-brand-200 shadow-sm hover:shadow-md cursor-pointer group h-32">
                    <div class="w-32 h-full flex-shrink-0 relative bg-[#1a110f] border-r border-brand-100">
                        <img src="${thumbUrl}" class="w-full h-full object-cover opacity-60 group-hover:opacity-80 transition-opacity">
                        <div class="absolute inset-0 flex items-center justify-center">
                            <div class="play-icon w-10 h-10 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center border border-white/50 transition-all duration-300">
                                <i class="fa-solid fa-play text-white text-sm ml-0.5"></i>
                            </div>
                        </div>
                    </div>
                    <div class="p-4 flex flex-col justify-between flex-1 min-w-0">
                        <div>
                            <div class="flex flex-wrap gap-1 mb-1 h-4 overflow-hidden">
                                ${(p.tags || []).slice(0,2).map(t => `<span class="text-[8px] bg-brand-50 border border-brand-200 text-[#b8860b] px-1.5 py-0.5 rounded-sm font-bold tracking-widest truncate">#${t}</span>`).join('')}
                            </div>
                            <h3 class="text-sm font-bold text-brand-900 leading-snug line-clamp-2 font-serif tracking-wide group-hover:text-[#b8860b] transition-colors">${p.title}</h3>
                        </div>
                        <div class="flex items-center justify-between mt-2">
                            <div class="flex items-center gap-2 min-w-0">
                                <img src="${p.authorIcon || 'https://via.placeholder.com/24'}" class="w-5 h-5 rounded-full border border-brand-200 object-cover flex-shrink-0" onerror="this.src='https://via.placeholder.com/24?text=U'">
                                <span class="text-[10px] text-brand-600 truncate font-bold">${p.authorName || '名無し'}</span>
                            </div>
                            <span class="text-[9px] text-brand-400 font-mono flex-shrink-0">${dateStr}</span>
                        </div>
                    </div>
                </a>
                `;
            });
            grid.innerHTML = html;
        }
    </script>
</body>
</html>
