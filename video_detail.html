<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>動画視聴 | NOAH</title>
    <link rel="icon" href="img/icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Markdown Parsers -->
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { serif: ['Noto Serif JP', 'serif'] },
                    colors: { brand: { 50: '#f7f5f0', 100: '#e8dfd1', 200: '#dcd4c6', 300: '#c8b9a6', 400: '#a09080', 500: '#8b6a4f', 600: '#725b3f', 700: '#5c4a3d', 800: '#4a3b32', 900: '#3e2723' } }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Serif JP', serif; background-color: #f7f5f0; color: #4a3b32; }
        .bg-texture { background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E"); }
        
        .prose h1, .prose h2, .prose h3 { color: #3e2723; font-weight: 700; margin-top: 1.5em; margin-bottom: 0.5em; border-bottom: 1px solid #e8dfd1; padding-bottom: 0.3em; font-family: 'Noto Serif JP', serif; letter-spacing: 0.05em; }
        .prose h3 { font-size: 1.25rem; border: none; padding: 0; }
        .prose p { margin-top: 0.5em; margin-bottom: 1em; line-height: 1.8; }
        .prose a { color: #8b6a4f; text-decoration: underline; transition: color 0.2s; }
        .prose a:hover { color: #5c4a3d; }
        .prose ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1em; }
        .prose li { margin-bottom: 0.5em; }
        .prose blockquote { border-left: 3px solid #c8b9a6; padding-left: 1em; color: #725b3f; font-style: italic; margin-top: 1em; margin-bottom: 1em; }
        
        .action-btn { transition: all 0.2s ease; }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        .action-btn:active { transform: translateY(0); }
    </style>
</head>
<body class="antialiased min-h-screen bg-texture pb-20">

    <!-- Navbar -->
    <nav class="bg-[rgba(255,253,249,0.95)] backdrop-blur border-b border-brand-200 fixed w-full z-50 top-0 h-16 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full flex justify-between items-center">
            <a href="videos.html" class="text-brand-500 hover:text-brand-800 transition-colors flex items-center gap-2 text-sm font-bold tracking-widest group">
                <div class="w-8 h-8 rounded-full bg-brand-50 border border-brand-200 flex items-center justify-center group-hover:bg-brand-100 transition-colors">
                    <i class="fa-solid fa-arrow-left"></i>
                </div>
                <span class="hidden sm:inline">シアターへ戻る</span>
            </a>
            <div id="admin-actions" class="hidden gap-2">
                <button onclick="editVideo()" class="text-xs bg-[#fffdf9] text-brand-700 px-4 py-2 border border-brand-300 rounded-sm font-bold hover:bg-brand-50 transition-colors shadow-sm"><i class="fa-solid fa-pen mr-1.5"></i>編集</button>
                <button onclick="deleteVideo()" class="text-xs bg-[#fffdf9] text-red-600 px-4 py-2 border border-red-200 rounded-sm font-bold hover:bg-red-50 transition-colors shadow-sm"><i class="fa-solid fa-trash mr-1.5"></i>削除</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto pt-20 px-0 sm:px-4 lg:px-8 flex flex-col lg:flex-row gap-8">
        
        <!-- Left: Video & Info -->
        <div class="w-full lg:w-[70%]">
            
            <!-- Video Player -->
            <div id="player-container" class="w-full aspect-video bg-black sm:rounded-sm overflow-hidden shadow-xl border border-brand-300 relative group">
                <div class="absolute inset-0 flex items-center justify-center text-white"><i class="fa-solid fa-spinner fa-spin text-4xl opacity-50"></i></div>
            </div>

            <div class="p-5 sm:p-0 sm:pt-6">
                <!-- Tags (Above Title) -->
                <div id="video-tags" class="flex flex-wrap gap-2 mb-3"></div>
                
                <h1 id="video-title" class="text-2xl sm:text-3xl font-bold text-brand-900 leading-tight mb-4 font-serif tracking-wide">読み込み中...</h1>
                
                <!-- ★ 修正: スマホ時でも1列に収まるように flex-row 固定にし、サイズと折り返しを調整 -->
                <div class="flex flex-row justify-between items-center gap-2 sm:gap-6 pb-4 sm:pb-6 mb-4 sm:mb-6">
                    <!-- Author -->
                    <a id="author-link" href="#" class="flex items-center gap-2 sm:gap-4 group cursor-pointer bg-[#fffdf9] pl-1 pr-3 sm:pl-2 sm:pr-6 py-1 sm:py-2 rounded-full border border-brand-100 shadow-sm hover:shadow-md transition-all hover:border-brand-300 min-w-0">
                        <img id="author-icon" src="https://via.placeholder.com/48" class="w-9 h-9 sm:w-14 sm:h-14 rounded-full border-2 border-[#fffdf9] shadow-sm object-cover group-hover:scale-105 transition-transform flex-shrink-0">
                        <div class="min-w-0">
                            <p id="author-name" class="font-bold text-brand-900 group-hover:text-brand-600 transition-colors text-xs sm:text-lg flex items-center gap-1 truncate">
                                名無し <i class="fa-solid fa-circle-check text-[10px] sm:text-xs text-[#d4af37]"></i>
                            </p>
                            <p id="video-date" class="text-[9px] sm:text-xs text-brand-400 font-mono tracking-wider truncate"></p>
                        </div>
                    </a>

                    <!-- Actions -->
                    <div class="flex items-center gap-2 flex-shrink-0">
                        <button onclick="toggleLike()" id="btn-like" class="action-btn flex items-center gap-1.5 sm:gap-2 bg-[#fffdf9] border border-brand-200 px-3 py-1.5 sm:px-5 sm:py-2.5 rounded-full text-xs sm:text-sm font-bold text-brand-700 hover:bg-brand-50 hover:border-brand-400 shadow-sm">
                            <i class="fa-regular fa-thumbs-up text-base sm:text-lg" id="icon-like"></i> <span id="like-count" class="min-w-[1rem] text-center">0</span>
                        </button>
                        <button onclick="shareVideo()" class="action-btn flex items-center gap-1.5 sm:gap-2 bg-[#fffdf9] border border-brand-200 px-3 py-1.5 sm:px-5 sm:py-2.5 rounded-full text-xs sm:text-sm font-bold text-brand-700 hover:bg-brand-50 hover:border-brand-400 shadow-sm">
                            <i class="fa-solid fa-share text-base sm:text-lg"></i> <span class="hidden sm:inline">シェア</span>
                        </button>
                    </div>
                </div>

                <!-- Description -->
                <div class="bg-[#fffdf9] border border-brand-200 rounded-sm p-6 sm:p-8 shadow-sm mb-12 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1 h-full bg-brand-300"></div>
                    <h3 class="text-sm font-bold text-brand-500 mb-4 tracking-widest font-serif uppercase"><i class="fa-solid fa-align-left mr-2"></i>概要</h3>
                    <div id="video-desc" class="prose prose-stone max-w-none text-brand-700 leading-relaxed text-sm sm:text-base"></div>
                </div>

                <!-- Comments Section -->
                <div id="comments-section" class="mb-12 bg-[#fffdf9] border border-brand-200 rounded-sm p-6 sm:p-8 shadow-sm">
                    <h3 class="text-xl font-bold text-brand-900 mb-8 flex items-center font-serif tracking-widest border-b border-brand-100 pb-4">
                        <i class="fa-regular fa-comments mr-3 text-brand-400 text-2xl"></i>コメント <span id="comment-count" class="text-base font-normal text-brand-500 ml-2">(0)</span>
                    </h3>
                    
                    <div id="comment-form-area" class="flex gap-4 mb-10 items-start">
                        <img id="my-icon" src="https://via.placeholder.com/40" class="w-10 h-10 sm:w-12 sm:h-12 rounded-full border border-brand-200 shadow-sm object-cover">
                        <div class="flex-1 bg-brand-50 p-1 rounded-sm border border-brand-200 focus-within:border-brand-500 focus-within:ring-1 focus-within:ring-brand-500 transition-all shadow-inner">
                            <textarea id="comment-input" rows="2" class="w-full bg-transparent resize-none text-sm p-3 outline-none transition-colors text-brand-800 placeholder-brand-400" placeholder="感想や質問をコメントしてみましょう..."></textarea>
                            <div class="flex justify-between items-center p-2 border-t border-brand-200/50 bg-[#fffdf9]">
                                <label class="flex items-center gap-2 text-xs font-bold text-brand-600 cursor-pointer group px-2 py-1 hover:bg-brand-50 rounded-sm transition-colors">
                                    <input type="checkbox" id="comment-private" class="rounded border-brand-300 text-brand-600 focus:ring-brand-500">
                                    <i class="fa-solid fa-lock text-brand-400 group-hover:text-brand-600 transition-colors"></i> 投稿者にのみ公開する
                                </label>
                                <button onclick="postComment()" id="btn-submit-comment" class="bg-[#3e2723] hover:bg-[#2a1a17] text-[#d4af37] px-6 py-2 rounded-sm text-xs font-bold transition-colors shadow-md disabled:opacity-50 tracking-widest border border-[#b8860b]">コメント送信</button>
                            </div>
                        </div>
                    </div>

                    <div id="comments-list" class="space-y-6">
                        <div class="text-center text-brand-400 text-sm py-8"><i class="fa-solid fa-spinner fa-spin mr-2"></i>読み込み中...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right: Other Videos -->
        <div class="w-full lg:w-[30%] px-4 lg:px-0">
            <h3 class="font-bold text-brand-800 mb-5 tracking-widest text-sm border-b border-brand-200 pb-2 flex items-center"><i class="fa-solid fa-film mr-2 text-brand-400"></i>新着の動画</h3>
            <div id="related-videos" class="flex flex-col gap-4">
                <!-- JSで挿入 -->
            </div>
        </div>

    </main>

    <!-- Notification -->
    <div id="notification" class="fixed top-20 left-1/2 transform -translate-x-1/2 z-[3000] hidden bg-[#3e2723] text-white px-6 py-3 rounded-sm shadow-xl text-sm font-bold tracking-widest border border-[#b8860b]"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, getDocs, deleteDoc, setDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBVDZJhL9sMzVknD5tNomLWF-0z0jPU3i0", authDomain: "brainbridge-4b8ac.firebaseapp.com", projectId: "brainbridge-4b8ac", storageBucket: "brainbridge-4b8ac.firebasestorage.app", messagingSenderId: "803209683213", appId: "1:803209683213:web:b62d13784fa2bbbb9f5044" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'default-app-id';

        let currentUser = null;
        let myData = null;
        let isAdmin = false;
        let videoData = null;
        let videoId = new URLSearchParams(window.location.search).get('vid');
        let isLiked = false;

        const isAdminMock = localStorage.getItem('isAdminMock') === 'true';

        function showNotif(msg) {
            const n = document.getElementById('notification');
            n.textContent = msg;
            n.classList.remove('hidden');
            setTimeout(() => n.classList.add('hidden'), 3000);
        }

        onAuthStateChanged(auth, async (user) => {
            if (isAdminMock) {
                currentUser = { uid: 'test_admin_uid' };
                isAdmin = true;
                myData = { name: '管理者', photoURL: 'https://via.placeholder.com/40' };
                init();
                return;
            }
            if (user && !user.isAnonymous) {
                currentUser = user;
                try {
                    const snap = await getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data'));
                    if(snap.exists()) {
                        myData = snap.data();
                        if(myData.userId === 'admin') isAdmin = true;
                    }
                    if(myData && myData.photoURL) document.getElementById('my-icon').src = myData.photoURL;
                } catch(e){}
                init();
            } else {
                window.location.href = 'login.html';
            }
        });

        async function init() {
            if (!videoId) { alert('動画が見つかりません'); window.location.href='videos.html'; return; }
            await loadVideo();
            loadRelated();
            checkLike();
            loadComments();
        }

        async function loadVideo() {
            try {
                if(isAdminMock) {
                    // ダミーデータ
                    videoData = { id: videoId, title: 'テスト動画', authorId: 'test1', authorName: 'ユーザーA', authorIcon: '', embedUrl: 'https://www.youtube.com/embed/dQw4w9WgXcQ', description: 'テスト概要', createdAt: new Date().toISOString(), tags: ['テスト'] };
                } else {
                    const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'videos', videoId));
                    if (!snap.exists()) throw new Error('Not found');
                    videoData = snap.data();
                }

                // 編集・削除ボタンの表示制御
                if (isAdmin || (currentUser && currentUser.uid === videoData.authorId)) {
                    document.getElementById('admin-actions').classList.remove('hidden');
                    document.getElementById('admin-actions').classList.add('flex');
                }

                // 描画
                document.getElementById('player-container').innerHTML = `<iframe src="${videoData.embedUrl}" class="w-full h-full absolute inset-0" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
                document.getElementById('video-title').textContent = videoData.title;
                // Author info
document.getElementById('author-name').innerHTML = `${videoData.authorName || '名無し'} <i class="fa-solid fa-circle-check text-[10px] sm:text-xs text-[#d4af37]"></i>`;
if (videoData.authorIcon) document.getElementById('author-icon').src = videoData.authorIcon;

// ★ここを変更: hrefを user_videos.html へ向ける
document.getElementById('author-link').href = `user_videos.html?uid=${videoData.authorId}`;
※ `author-link` の `href` 属性を `user_videos.html?uid=...` に設定するだけで機能します。
                
                const d = new Date(videoData.createdAt);
                document.getElementById('video-date').textContent = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} 公開`;

                // Tags
                const tagsEl = document.getElementById('video-tags');
                tagsEl.innerHTML = (videoData.tags || []).map(t => `<a href="videos.html?tag=${encodeURIComponent(t)}" class="text-xs bg-[#e8dfd1] text-brand-700 hover:bg-brand-500 hover:text-white transition-colors border border-brand-200 px-2.5 py-1 rounded-sm font-bold tracking-widest shadow-sm">#${t}</a>`).join('');

                // Description
                let parsedDesc = '';
                if(window.marked && typeof window.marked.parse === 'function') {
                    parsedDesc = window.marked.parse(videoData.description || '');
                } else {
                    parsedDesc = (videoData.description||'').replace(/\n/g, '<br>');
                }
                document.getElementById('video-desc').innerHTML = window.DOMPurify.sanitize(parsedDesc);

                if(videoData.allowComments === false) {
                    document.getElementById('comment-form-area').innerHTML = '<div class="w-full bg-brand-50 border border-brand-200 p-4 text-center rounded-sm"><p class="text-sm font-bold text-brand-500 tracking-widest"><i class="fa-solid fa-comment-slash mr-2"></i>この動画はコメントがオフになっています。</p></div>';
                }

            } catch (e) {
                console.error(e);
                alert('動画の読み込みに失敗しました');
                window.location.href = 'videos.html';
            }
        }

        async function checkLike() {
            if(isAdminMock) return;
            try {
                const likesRef = collection(db, 'artifacts', appId, 'public', 'data', 'videos', videoId, 'likes');
                const snap = await getDocs(likesRef);
                document.getElementById('like-count').textContent = snap.size;
                
                snap.forEach(doc => {
                    if(doc.id === currentUser.uid) {
                        isLiked = true;
                        const icon = document.getElementById('icon-like');
                        icon.classList.remove('fa-regular');
                        icon.classList.add('fa-solid', 'text-[#b8860b]');
                    }
                });
            } catch(e){}
        }

        window.toggleLike = async () => {
            if(isAdminMock) { showNotif('いいねしました(テスト)'); return; }
            try {
                const likeRef = doc(db, 'artifacts', appId, 'public', 'data', 'videos', videoId, 'likes', currentUser.uid);
                if (isLiked) {
                    await deleteDoc(likeRef);
                    isLiked = false;
                } else {
                    await setDoc(likeRef, { createdAt: serverTimestamp() });
                    isLiked = true;
                }
                
                const icon = document.getElementById('icon-like');
                let count = parseInt(document.getElementById('like-count').textContent);
                if(isLiked) {
                    icon.classList.remove('fa-regular');
                    icon.classList.add('fa-solid', 'text-[#b8860b]');
                    document.getElementById('like-count').textContent = count + 1;
                } else {
                    icon.classList.remove('fa-solid', 'text-[#b8860b]');
                    icon.classList.add('fa-regular');
                    document.getElementById('like-count').textContent = count - 1;
                }
            } catch(e){ console.error(e); }
        };

        window.shareVideo = () => {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                showNotif('URLをクリップボードにコピーしました');
            }).catch(err => {
                // fallback
                const textArea = document.createElement("textarea");
                textArea.value = url;
                document.body.appendChild(textArea);
                textArea.select();
                try { document.execCommand('copy'); showNotif('コピーしました'); } catch (err) { alert('コピーに失敗しました'); }
                document.body.removeChild(textArea);
            });
        };

        // Comments
        async function loadComments() {
            if(videoData.allowComments === false) {
                document.getElementById('comments-list').innerHTML = '';
                return;
            }
            try {
                const commentsRef = collection(db, 'artifacts', appId, 'public', 'data', 'videos', videoId, 'comments');
                const snap = await getDocs(commentsRef); // ソートはフロントで
                const comments = [];
                snap.forEach(d => comments.push({ id: d.id, ...d.data() }));
                comments.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

                document.getElementById('comment-count').textContent = `(${comments.length})`;

                let html = '';
                comments.forEach(c => {
                    // プライベートコメントのフィルタリング
                    const canSee = !c.isPrivate || isAdmin || (currentUser && (currentUser.uid === c.userId || currentUser.uid === videoData.authorId));
                    const canDelete = isAdmin || (currentUser && (currentUser.uid === c.userId || currentUser.uid === videoData.authorId));
                    
                    const dateStr = new Date(c.createdAt).toLocaleDateString();
                    
                    const privateBadge = c.isPrivate 
                        ? '<span class="text-[10px] bg-[#3e2723] text-[#d4af37] px-2 py-0.5 rounded-sm border border-[#b8860b] ml-2 font-bold tracking-widest"><i class="fa-solid fa-lock mr-1"></i>投稿者のみ</span>' 
                        : '';

                    html += `
                    <div class="flex gap-4 text-sm group">
                        <a href="user.html?uid=${c.userId}" class="flex-shrink-0">
                            <img src="${c.userIcon||'https://via.placeholder.com/40'}" class="w-10 h-10 sm:w-12 sm:h-12 rounded-full border border-brand-200 object-cover shadow-sm hover:border-brand-500 transition-colors">
                        </a>
                        <div class="flex-1 bg-[#f7f5f0] p-4 rounded-sm border border-brand-200 shadow-sm relative">
                            <div class="absolute -left-2 top-4 w-3 h-3 bg-[#f7f5f0] border-l border-t border-brand-200 transform -rotate-45"></div>
                            <div class="flex items-baseline flex-wrap gap-2 mb-2 pb-2 border-b border-brand-200/50">
                                <a href="user.html?uid=${c.userId}" class="font-bold text-brand-900 hover:text-brand-600 transition-colors">${c.userName||'名無し'}</a>
                                <span class="text-[10px] text-brand-400 font-mono">${dateStr}</span>
                                ${privateBadge}
                            </div>
                            <div class="text-brand-800 leading-relaxed whitespace-pre-wrap ${canSee ? '' : 'italic text-brand-400'}">
                                ${canSee ? (window.DOMPurify.sanitize(c.text)) : '<i class="fa-solid fa-eye-slash mr-2"></i>このコメントは投稿者にのみ公開されています。'}
                            </div>
                            ${canDelete ? `<button onclick="deleteComment('${c.id}')" class="absolute top-3 right-3 text-brand-300 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100"><i class="fa-solid fa-trash"></i></button>` : ''}
                        </div>
                    </div>
                    `;
                });
                
                if(comments.length === 0) html = '<div class="text-center py-8 bg-[#f7f5f0] border border-dashed border-brand-200 rounded-sm"><p class="text-sm text-brand-400 font-bold tracking-widest">最初のコメントを書いてみましょう</p></div>';
                document.getElementById('comments-list').innerHTML = html;

            } catch(e) {
                console.error(e);
            }
        }

        window.postComment = async () => {
            const input = document.getElementById('comment-input');
            const text = input.value.trim();
            const isPrivate = document.getElementById('comment-private').checked;
            if(!text) return;

            const btn = document.getElementById('btn-submit-comment');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

            if(isAdminMock) {
                showNotif('コメントしました(テスト)');
                input.value = '';
                btn.disabled = false;
                btn.innerHTML = 'コメント送信';
                return;
            }

            try {
                const commentsRef = collection(db, 'artifacts', appId, 'public', 'data', 'videos', videoId, 'comments');
                await addDoc(commentsRef, {
                    userId: currentUser.uid,
                    userName: myData.name || '名無し',
                    userIcon: myData.photoURL || null,
                    text: text,
                    isPrivate: isPrivate,
                    createdAt: new Date().toISOString()
                });
                input.value = '';
                document.getElementById('comment-private').checked = false;
                loadComments();
                showNotif('コメントを投稿しました');
            } catch(e) {
                console.error(e);
                alert('投稿に失敗しました');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'コメント送信';
            }
        };

        window.deleteComment = async (cid) => {
            if(!confirm('コメントを削除しますか？')) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'videos', videoId, 'comments', cid));
                loadComments();
                showNotif('削除しました');
            } catch(e) { console.error(e); alert('削除失敗'); }
        };

        window.editVideo = () => { window.location.href = `video_post.html?vid=${videoId}`; };
        window.deleteVideo = async () => {
            if(!confirm('本当にこの動画を削除しますか？')) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'videos', videoId));
                alert('削除しました');
                window.location.href = 'videos.html';
            } catch(e){ alert('削除失敗'); }
        };

        // Right Column: Related Videos
        async function loadRelated() {
            try {
                const vRef = collection(db, 'artifacts', appId, 'public', 'data', 'videos');
                const snap = await getDocs(vRef);
                const vids = [];
                snap.forEach(d => { if(d.id !== videoId) vids.push({id:d.id, ...d.data()}); });
                vids.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
                
                let html = '';
                vids.slice(0, 5).forEach(v => {
                    const date = new Date(v.createdAt);
                    html += `
                    <a href="video_detail.html?vid=${v.id}" class="flex gap-3 group cursor-pointer bg-[#fffdf9] p-2 rounded-sm border border-transparent hover:border-brand-200 hover:shadow-md transition-all">
                        <div class="w-32 aspect-video bg-black rounded-sm overflow-hidden flex-shrink-0 relative border border-brand-200">
                            <img src="${v.thumbnailUrl||'https://via.placeholder.com/120x68?text=NOAH'}" class="w-full h-full object-cover transition-transform group-hover:scale-110 duration-500">
                            <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center"><i class="fa-solid fa-play text-white text-xl"></i></div>
                        </div>
                        <div class="flex-1 min-w-0 flex flex-col justify-center py-1">
                            <h4 class="text-xs font-bold text-brand-900 leading-snug line-clamp-2 mb-1 group-hover:text-brand-600 transition-colors font-serif">${v.title}</h4>
                            <p class="text-[10px] text-brand-500 truncate mb-0.5">${v.authorName||'名無し'}</p>
                            <p class="text-[9px] text-brand-400 font-mono">${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()}</p>
                        </div>
                    </a>
                    `;
                });
                document.getElementById('related-videos').innerHTML = html;
            } catch(e){}
        }

    </script>
</body>
</html>
