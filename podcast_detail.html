<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAST 再生 | NOAH</title>
    <link rel="icon" href="img/icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { serif: ['Noto Serif JP', 'serif'] },
                    colors: { brand: { 50: '#f7f5f0', 100: '#e8dfd1', 200: '#dcd4c6', 300: '#c8b9a6', 400: '#a09080', 500: '#8b6a4f', 600: '#725b3f', 700: '#5c4a3d', 800: '#4a3b32', 900: '#3e2723' } }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Serif JP', serif; background-color: #f7f5f0; color: #4a3b32; }
        .bg-texture { background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E"); }
        
        .prose h1, .prose h2, .prose h3 { color: #3e2723; font-weight: 700; margin-top: 1.5em; margin-bottom: 0.5em; border-bottom: 1px solid #e8dfd1; padding-bottom: 0.3em; font-family: 'Noto Serif JP', serif; letter-spacing: 0.05em; }
        .prose h3 { font-size: 1.25rem; border: none; padding: 0; }
        .prose p { margin-top: 0.5em; margin-bottom: 1em; line-height: 1.8; }
        .prose a { color: #8b6a4f; text-decoration: underline; transition: color 0.2s; }
        .prose a:hover { color: #5c4a3d; }
        .prose ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1em; }
        .prose li { margin-bottom: 0.5em; }
        .prose blockquote { border-left: 3px solid #c8b9a6; padding-left: 1em; color: #725b3f; font-style: italic; margin-top: 1em; margin-bottom: 1em; }
        
        .action-btn { transition: all 0.2s ease; }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        .action-btn:active { transform: translateY(0); }

        .bottom-nav-fixed {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background-color: #fffdf9; border-top: 1px solid #e8dfd1;
            z-index: 50; height: 4rem; height: calc(4rem + env(safe-area-inset-bottom));
            padding-bottom: env(safe-area-inset-bottom);
        }
        .bottom-nav-content { height: 4rem; display: flex; justify-content: space-around; align-items: center; width: 100%; }
        .body-pb-nav { padding-bottom: calc(5rem + env(safe-area-inset-bottom)); }

        /* ミニプレーヤーのホバーエフェクト */
        .mini-player-hover:hover {
            border-color: #d4af37;
            box-shadow: 0 10px 25px -5px rgba(212, 175, 55, 0.2), 0 8px 10px -6px rgba(0, 0, 0, 0.5);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="antialiased min-h-screen bg-texture body-pb-nav lg:pb-0 relative">

    <!-- 全体コンテナ (ミニプレーヤー化の際に切り替える) -->
    <div id="full-screen-ui" class="transition-all duration-300">
        
        <!-- Navbar -->
        <nav class="bg-[rgba(255,253,249,0.95)] backdrop-blur border-b border-brand-200 fixed w-full z-40 top-0 h-16 shadow-sm">
            <div class="max-w-[1600px] w-full mx-auto px-4 sm:px-6 lg:px-8 h-full flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <a href="podcasts.html" class="text-brand-500 hover:text-brand-800 transition-colors flex items-center gap-2 text-sm font-bold tracking-widest group">
                        <div class="w-8 h-8 rounded-full bg-brand-50 border border-brand-200 flex items-center justify-center group-hover:bg-brand-100 transition-colors">
                            <i class="fa-solid fa-arrow-left"></i>
                        </div>
                        <span class="hidden sm:inline">一覧へ戻る</span>
                    </a>
                </div>

                <div class="flex items-center gap-4">
                    <!-- ミニプレーヤー化ボタン -->
                    <button onclick="toggleMiniPlayer()" class="text-[#a09080] hover:text-brand-800 transition-colors flex items-center gap-1.5 text-xs font-bold tracking-widest bg-brand-50 px-3 py-1.5 rounded-full border border-brand-200 shadow-sm" title="プレーヤーを縮小する">
                        <i class="fa-solid fa-compress"></i> <span class="hidden sm:inline">ミニプレーヤー</span>
                    </button>
                    
                    <div id="admin-actions" class="hidden gap-2 border-l border-brand-200 pl-4 ml-1">
                        <button onclick="editPodcast()" class="text-xs bg-[#fffdf9] text-brand-700 px-3 py-1.5 border border-brand-300 rounded-sm font-bold hover:bg-brand-50 transition-colors shadow-sm tracking-widest"><i class="fa-solid fa-pen mr-1"></i>編集</button>
                        <button onclick="deletePodcast()" class="text-xs bg-red-50 text-red-600 px-3 py-1.5 border border-red-200 rounded-sm font-bold hover:bg-red-100 transition-colors shadow-sm tracking-widest"><i class="fa-solid fa-trash mr-1"></i>削除</button>
                    </div>
                </div>
            </div>
        </nav>

        <main class="w-full max-w-[1600px] mx-auto pt-24 px-4 sm:px-6 lg:px-8 flex flex-col lg:flex-row gap-8 lg:gap-10 xl:gap-12">
            
            <!-- Left: Player & Info -->
            <div class="flex-1 min-w-0">
                
                <!-- Player Area -->
                <div id="player-container" class="w-full bg-[#1a110f] sm:rounded-md overflow-hidden shadow-2xl border border-brand-300 relative flex flex-col justify-center items-center p-6 sm:p-10 mb-6 group">
                    <img id="podcast-large-thumb" src="" class="absolute inset-0 w-full h-full object-cover opacity-20 blur-xl scale-110 pointer-events-none" onerror="this.src='https://via.placeholder.com/640?text=NOAH+CAST'">
                    
                    <!-- Thumbnail for direct audio -->
                    <img id="podcast-center-thumb" src="" class="w-40 h-40 sm:w-64 sm:h-64 object-cover rounded-md shadow-2xl border border-[#5c4a3d] mb-8 relative z-10 hidden" onerror="this.src='https://via.placeholder.com/640?text=NOAH+CAST'">
                    
                    <!-- Direct Audio Player -->
                    <audio id="direct-audio-player" controls class="w-full max-w-2xl relative z-10 hidden shadow-lg rounded-full"></audio>
                    
                    <!-- Embed Iframe Player -->
                    <div id="embed-container" class="w-full max-w-3xl relative z-10 hidden">
                        <iframe id="embed-iframe" src="" class="w-full h-40 sm:h-60 rounded-md shadow-xl" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
                    </div>

                    <div id="loading-player" class="absolute inset-0 flex items-center justify-center text-[#d4af37] z-20">
                        <i class="fa-solid fa-spinner fa-spin text-4xl opacity-80"></i>
                    </div>
                </div>

                <div class="pt-2">
                    <div id="podcast-tags" class="flex flex-wrap gap-2 mb-3"></div>
                    
                    <h1 id="podcast-title" class="text-2xl sm:text-3xl font-bold text-brand-900 leading-tight mb-5 font-serif tracking-wide">読み込み中...</h1>
                    
                    <!-- ★修正: 投稿者と、再生時間等のメタ情報を完全に分離したデザイン -->
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 pb-4 sm:pb-6 mb-4 sm:mb-6 border-b border-brand-200">
                        
                        <!-- 投稿者リンクボックス (アイコン＋名前のみ) -->
                        <a id="author-link" href="#" class="flex items-center gap-3 sm:gap-4 group cursor-pointer bg-[#fffdf9] pl-1 pr-4 sm:pl-2 sm:pr-6 py-1 sm:py-1.5 rounded-full border border-brand-200 shadow-sm hover:shadow-md transition-all hover:border-[#b8860b] min-w-0">
                            <img id="author-icon" src="https://via.placeholder.com/48" class="w-10 h-10 sm:w-12 sm:h-12 rounded-full border-2 border-[#fffdf9] shadow-sm object-cover group-hover:scale-105 transition-transform flex-shrink-0 ml-0.5" onerror="this.src='https://via.placeholder.com/48?text=U'">
                            <p id="author-name" class="font-bold text-brand-900 group-hover:text-[#b8860b] transition-colors text-sm sm:text-base flex items-center gap-1.5 truncate tracking-widest font-serif">
                                名無し <i class="fa-solid fa-circle-check text-[10px] sm:text-xs text-[#d4af37]"></i>
                            </p>
                        </a>

                        <!-- 日付とファイルの長さ (独立したバッジデザイン) -->
                        <div class="flex items-center gap-4 text-xs font-mono text-brand-500 bg-brand-50 px-4 py-2.5 rounded-sm border border-brand-200 shadow-inner shrink-0">
                            <span class="flex items-center gap-1.5 tracking-wider"><i class="fa-regular fa-calendar-days text-[#8b6a4f]"></i> <span id="podcast-date">----/--/--</span></span>
                            <span class="w-px h-3 bg-brand-300"></span>
                            <span class="flex items-center gap-1.5 tracking-wider"><i class="fa-solid fa-headphones text-[#8b6a4f]"></i> <span id="podcast-duration">--:--</span></span>
                        </div>

                    </div>

                    <!-- Action Buttons -->
                    <div class="flex items-center gap-3 mb-8">
                        <button onclick="toggleLike()" id="btn-like" class="action-btn flex items-center gap-2 bg-[#fffdf9] border border-brand-200 px-5 py-2.5 rounded-full text-sm font-bold text-brand-700 hover:bg-brand-50 hover:border-[#b8860b] shadow-sm tracking-widest">
                            <i class="fa-regular fa-heart text-lg" id="icon-like"></i> <span id="like-count" class="min-w-[1rem] text-center">0</span>
                        </button>
                        <button onclick="sharePodcast()" class="action-btn flex items-center gap-2 bg-[#fffdf9] border border-brand-200 px-5 py-2.5 rounded-full text-sm font-bold text-brand-700 hover:bg-brand-50 hover:border-[#b8860b] shadow-sm tracking-widest">
                            <i class="fa-solid fa-share-nodes text-lg text-brand-400"></i> シェア
                        </button>
                    </div>

                    <!-- Description -->
                    <div class="mb-12 bg-[#fffdf9] border border-brand-200 rounded-sm p-6 sm:p-8 shadow-sm relative">
                        <h3 class="text-lg font-bold text-brand-900 mb-6 flex items-center font-serif tracking-widest border-b border-brand-100 pb-4">
                            <div class="w-8 h-8 rounded-full bg-brand-50 flex items-center justify-center border border-brand-200 text-brand-400 shadow-inner mr-3 flex-shrink-0">
                                <i class="fa-solid fa-align-left text-xs"></i>
                            </div>
                            エピソードの概要
                        </h3>
                        <div id="podcast-desc" class="prose prose-stone max-w-none text-brand-700 leading-relaxed text-sm sm:text-base"></div>
                    </div>

                    <!-- Comments -->
                    <div id="comments-section" class="mb-12 bg-[#fffdf9] border border-brand-200 rounded-sm p-6 sm:p-8 shadow-sm">
                        <h3 class="text-xl font-bold text-brand-900 mb-8 flex items-center font-serif tracking-widest border-b border-brand-100 pb-4">
                            <i class="fa-regular fa-comments mr-3 text-brand-400 text-2xl"></i>コメント <span id="comment-count" class="text-base font-normal text-brand-500 ml-2">(0)</span>
                        </h3>
                        
                        <div id="comment-form-area" class="flex gap-4 mb-10 items-start">
                            <img id="my-icon" src="https://via.placeholder.com/40" class="w-10 h-10 sm:w-12 sm:h-12 rounded-full border border-brand-200 shadow-sm object-cover" onerror="this.src='https://via.placeholder.com/40?text=U'">
                            <div class="flex-1 bg-brand-50 p-1 rounded-sm border border-brand-200 focus-within:border-[#b8860b] focus-within:ring-1 focus-within:ring-[#b8860b] transition-all shadow-inner">
                                <textarea id="comment-input" rows="2" class="w-full bg-transparent resize-none text-sm p-3 outline-none transition-colors text-brand-800 placeholder-brand-400" placeholder="エピソードの感想や質問をコメントしてみましょう..."></textarea>
                                <div class="flex justify-between items-center p-2 border-t border-brand-200/50 bg-[#fffdf9]">
                                    <label class="flex items-center gap-2 text-[10px] sm:text-xs font-bold text-brand-600 cursor-pointer group px-2 py-1 hover:bg-brand-50 rounded-sm transition-colors">
                                        <input type="checkbox" id="comment-private" class="rounded border-brand-300 text-brand-600 focus:ring-brand-500">
                                        <i class="fa-solid fa-lock text-brand-400 group-hover:text-brand-600 transition-colors"></i> 投稿者にのみ公開する
                                    </label>
                                    <button onclick="postComment()" id="btn-submit-comment" class="bg-[#3e2723] hover:bg-[#2a1a17] text-[#d4af37] px-6 py-2 rounded-sm text-xs font-bold transition-colors shadow-md disabled:opacity-50 tracking-widest border border-[#b8860b]">送信</button>
                                </div>
                            </div>
                        </div>

                        <div id="comments-list" class="space-y-6">
                            <div class="text-center text-brand-400 text-sm py-8"><i class="fa-solid fa-spinner fa-spin mr-2"></i>読み込み中...</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Related -->
            <div class="w-full lg:w-[320px] xl:w-[400px] flex-shrink-0">
                <h3 class="font-bold text-brand-800 mb-5 tracking-widest text-sm border-b border-brand-200 pb-2 flex items-center"><i class="fa-solid fa-podcast mr-2 text-[#b8860b]"></i>新着のCAST</h3>
                <div id="related-podcasts" class="flex flex-col gap-4">
                    <!-- JSで挿入 -->
                </div>
            </div>

        </main>
    </div> <!-- end full-screen-ui -->

    <!-- ★修正: ミニプレーヤー UI -->
    <!-- 縮小時は画面右下に固定。クリックで元のフルスクリーンに戻る -->
    <div id="mini-player-ui" class="hidden fixed bottom-4 right-4 sm:bottom-8 sm:right-8 w-[calc(100%-2rem)] sm:w-80 bg-[#1a110f] rounded-md shadow-2xl border border-[#5c4a3d] z-[8000] p-3 cursor-pointer mini-player-hover transition-all duration-300" onclick="toggleMiniPlayer()">
        <div class="flex items-center gap-3 sm:gap-4 relative z-10">
            <img id="mini-thumb" src="https://via.placeholder.com/150" class="w-14 h-14 rounded-sm object-cover border border-[#3e2723] shadow-md flex-shrink-0">
            <div class="flex-1 min-w-0">
                <p class="text-[9px] text-[#d4af37] font-bold tracking-widest mb-0.5 flex items-center gap-1"><i class="fa-solid fa-podcast"></i> 再生中</p>
                <!-- ★修正: タイトルと名前のみ。日付・時間は非表示 -->
                <p id="mini-title" class="text-sm font-bold text-[#f7f5f0] truncate font-serif tracking-wide leading-snug">タイトル</p>
                <p id="mini-author" class="text-[10px] text-[#a09080] truncate mt-1 tracking-widest font-bold">名無し</p>
            </div>
            
            <!-- 再生画面を閉じる（一覧へ戻る）ボタン -->
            <button onclick="event.stopPropagation(); window.location.href='podcasts.html';" class="w-8 h-8 rounded-full bg-[#3e2723] hover:bg-red-600 text-white transition-colors flex items-center justify-center border border-[#5c4a3d] shrink-0 shadow-md" title="再生を終了して閉じる">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="notification" class="fixed top-24 left-1/2 transform -translate-x-1/2 z-[9000] hidden transition-all duration-300 translate-y-20">
        <div class="bg-[#3e2723] text-[#f7f5f0] px-6 py-3 rounded-sm shadow-2xl flex items-center gap-3 backdrop-blur-md bg-opacity-95 border border-[#8b6a4f]"><i class="fa-solid fa-check text-[#d4af37] text-lg"></i><span id="notif-message" class="text-sm font-bold tracking-widest font-serif"></span></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, setDoc, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBVDZJhL9sMzVknD5tNomLWF-0z0jPU3i0", authDomain: "brainbridge-4b8ac.firebaseapp.com", projectId: "brainbridge-4b8ac", storageBucket: "brainbridge-4b8ac.firebasestorage.app", messagingSenderId: "803209683213", appId: "1:803209683213:web:b62d13784fa2bbbb9f5044" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'default-app-id';

        const urlParams = new URLSearchParams(window.location.search);
        const podcastId = urlParams.get('pid');

        if (!podcastId) { window.location.href = 'podcasts.html'; }

        let currentUser = null;
        let myProfile = null;
        let podcastData = null;
        let isAdmin = false;
        let isLiked = false;
        let commentsUnsubscribe = null;
        let likesUnsubscribe = null;
        
        let isMiniPlayerActive = false; // ミニプレーヤー状態フラグ

        const isAdminMock = localStorage.getItem('isAdminMock') === 'true';
        const DEFAULT_ICON = 'https://via.placeholder.com/150/f7f5f0/c8b9a6?text=U';

        window.handleAuthAction = () => {
            if (currentUser || isAdminMock) {
                if (isAdminMock) localStorage.removeItem('isAdminMock');
                signOut(auth);
                window.location.reload(); 
            } else {
                window.location.href = 'login.html';
            }
        };

        // --- ミニプレーヤー切替関数 ---
        window.toggleMiniPlayer = () => {
            const fullUi = document.getElementById('full-screen-ui');
            const miniUi = document.getElementById('mini-player-ui');
            
            isMiniPlayerActive = !isMiniPlayerActive;
            
            if (isMiniPlayerActive) {
                fullUi.classList.add('hidden');
                miniUi.classList.remove('hidden');
                document.body.style.overflow = ''; // 背景のスクロールを許可
                
                // 情報をミニプレーヤーに同期
                if (podcastData) {
                    document.getElementById('mini-title').textContent = podcastData.title || 'タイトルなし';
                    document.getElementById('mini-author').textContent = podcastData.authorName || '名無し';
                    document.getElementById('mini-thumb').src = podcastData.thumbnailUrl || 'https://via.placeholder.com/150?text=NOAH';
                }
                
                // Note: iframeなどがある場合、hiddenにすると一部ブラウザで再生が止まる可能性があります。
                // 完全にバックグラウンド再生させる場合は、iframeを画面外（top: -9999pxなど）に飛ばす手法も有効ですが、
                // 今回はシンプルなクラス付け替え(hidden)で対応しています。
                
            } else {
                fullUi.classList.remove('hidden');
                miniUi.classList.add('hidden');
                document.body.style.overflow = 'hidden'; // オプション: フルスクリーン時スクロール制御
                setTimeout(() => { document.body.style.overflow = ''; }, 10);
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (isAdminMock) {
                currentUser = { uid: 'test_admin_uid' };
                isAdmin = true;
                myProfile = { name: '管理者', photoURL: DEFAULT_ICON };
                document.getElementById('my-icon').src = myProfile.photoURL;
                loadPodcastData();
                loadRelated();
                return;
            }

            if (user && !user.isAnonymous) {
                currentUser = user;
                try {
                    const snap = await getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data'));
                    if (snap.exists()) {
                        myProfile = snap.data();
                        document.getElementById('my-icon').src = myProfile.photoURL || DEFAULT_ICON;
                        if (myProfile.userId === 'admin') isAdmin = true;
                    }
                } catch(e) {}
            } else {
                document.getElementById('comment-form-area').innerHTML = '<div class="w-full text-center py-4 bg-brand-50 border border-brand-200 rounded-sm text-sm font-bold text-brand-600 tracking-widest">コメントを投稿するには乗船（ログイン）してください。</div>';
            }
            loadPodcastData();
            loadRelated();
        });

        function formatText(text) {
            if (!text) return '';
            let rawHtml = '';
            try {
                if (window.marked) rawHtml = window.marked.parse(text, { breaks: true });
                else rawHtml = text.replace(/\n/g, '<br>');
            } catch (e) { rawHtml = text.replace(/\n/g, '<br>'); }
            return window.DOMPurify.sanitize(rawHtml);
        }

        // ファイルの長さを 分:秒 形式にフォーマット
        function formatDuration(seconds) {
            if (!seconds || isNaN(seconds)) return '--:--';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0'+s : s}`;
        }

        async function loadPodcastData() {
            try {
                const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'podcasts', podcastId));
                if (snap.exists()) {
                    podcastData = snap.data();
                    
                    document.getElementById('podcast-title').textContent = podcastData.title || 'タイトルなし';
                    document.getElementById('author-link').href = `user_contents.html?uid=${podcastData.authorId}`;
                    document.getElementById('author-name').innerHTML = `${podcastData.authorName || '名無し'} <i class="fa-solid fa-circle-check text-[10px] sm:text-xs text-[#d4af37]"></i>`;
                    document.getElementById('author-icon').src = podcastData.authorIcon || DEFAULT_ICON;

                    // メタ情報 (日付・長さ)
                    const date = new Date(podcastData.createdAt || podcastData.updatedAt || Date.now());
                    document.getElementById('podcast-date').textContent = `${date.getFullYear()}/${String(date.getMonth()+1).padStart(2,'0')}/${String(date.getDate()).padStart(2,'0')}`;
                    document.getElementById('podcast-duration').textContent = formatDuration(podcastData.duration);

                    // プレイヤーの表示分岐
                    const thumbUrl = podcastData.thumbnailUrl || 'https://images.unsplash.com/photo-1590602847861-f357a9332bbc?q=80&w=640&auto=format&fit=crop';
                    document.getElementById('podcast-large-thumb').src = thumbUrl;

                    document.getElementById('loading-player').classList.add('hidden');

                    if (podcastData.isEmbed) {
                        const iframe = document.getElementById('embed-iframe');
                        iframe.src = podcastData.audioUrl;
                        document.getElementById('embed-container').classList.remove('hidden');
                    } else if (podcastData.audioUrl) {
                        const centerThumb = document.getElementById('podcast-center-thumb');
                        centerThumb.src = thumbUrl;
                        centerThumb.classList.remove('hidden');
                        
                        const audio = document.getElementById('direct-audio-player');
                        audio.src = podcastData.audioUrl;
                        audio.classList.remove('hidden');
                    } else {
                        // 音声データがない（アーカイブ枠など）
                        document.getElementById('embed-container').classList.remove('hidden');
                        document.getElementById('embed-container').innerHTML = `<div class="w-full h-40 sm:h-60 rounded-md bg-black/50 border border-[#5c4a3d] flex flex-col items-center justify-center text-[#a09080] font-bold tracking-widest"><i class="fa-solid fa-microphone-slash text-3xl mb-3"></i>音声データは準備中です</div>`;
                    }

                    // Description & Note Embed
                    const descContainer = document.getElementById('podcast-desc');
                    descContainer.innerHTML = formatText(podcastData.description || '概要はありません。');

                    if (podcastData.relatedArticleUrl) {
                        const url = podcastData.relatedArticleUrl;
                        const noteMatch = url.match(/note\.com\/.*?n\/(n[a-zA-Z0-9]+)/) || url.match(/note\.com\/embed\/notes\/(n[a-zA-Z0-9]+)/);
                        
                        let articleHtml = '';
                        if (noteMatch && noteMatch[1]) {
                            articleHtml = `
                                <div class="mt-10 pt-8 border-t border-brand-100">
                                    <h3 class="text-base font-bold text-brand-900 mb-5 flex items-center font-serif tracking-widest">
                                        <div class="w-7 h-7 rounded-full bg-brand-50 flex items-center justify-center border border-brand-200 text-brand-400 shadow-inner mr-3 flex-shrink-0">
                                            <i class="fa-solid fa-link text-xs"></i>
                                        </div>
                                        関連記事
                                    </h3>
                                    <iframe class="w-full max-w-full rounded-sm border border-brand-200 shadow-sm" src="https://note.com/embed/notes/${noteMatch[1]}" style="border: 0; display: block; padding: 0px; margin: 0px; width: 100%;" height="400"></iframe>
                                </div>
                            `;
                        } else {
                            articleHtml = `
                                <div class="mt-10 pt-8 border-t border-brand-100">
                                    <h3 class="text-base font-bold text-brand-900 mb-5 flex items-center font-serif tracking-widest">
                                        <div class="w-7 h-7 rounded-full bg-brand-50 flex items-center justify-center border border-brand-200 text-brand-400 shadow-inner mr-3 flex-shrink-0">
                                            <i class="fa-solid fa-link text-xs"></i>
                                        </div>
                                        関連記事
                                    </h3>
                                    <a href="${url}" target="_blank" class="block p-4 bg-brand-50 border border-brand-200 rounded-sm hover:border-[#b8860b] transition-colors text-sm text-brand-700 font-bold truncate shadow-sm">
                                        <i class="fa-solid fa-arrow-up-right-from-square mr-2 text-[#8b6a4f]"></i>${url}
                                    </a>
                                </div>
                            `;
                        }
                        descContainer.insertAdjacentHTML('beforeend', articleHtml);
                    }
                    
                    const tagsEl = document.getElementById('podcast-tags');
                    tagsEl.innerHTML = '';
                    if (podcastData.tags) {
                        podcastData.tags.forEach(tag => {
                            tagsEl.innerHTML += `<span class="bg-brand-50 border border-brand-200 text-[#b8860b] px-3 py-1 rounded-sm text-xs font-bold tracking-widest shadow-sm">#${tag}</span>`;
                        });
                    }

                    if (podcastData.allowComments === false) {
                        document.getElementById('comments-section').innerHTML = '<div class="text-center py-6 text-brand-400 text-sm tracking-widest border border-dashed border-brand-200 bg-brand-50 rounded-sm"><i class="fa-solid fa-comment-slash mr-2"></i>コメントはオフになっています</div>';
                    } else {
                        listenComments();
                    }
                    
                    listenLikes();

                    if ((currentUser && currentUser.uid === podcastData.authorId) || isAdmin) {
                        document.getElementById('admin-actions').classList.remove('hidden');
                        document.getElementById('admin-actions').classList.add('flex');
                    }

                } else {
                    document.querySelector('main').innerHTML = '<div class="text-center py-20 text-brand-500 font-bold tracking-widest bg-[#fffdf9] border border-brand-200 rounded-sm mt-10 w-full shadow-sm">エピソードが存在しないか、削除されました。</div>';
                }
            } catch (e) {
                console.error(e);
                document.querySelector('main').innerHTML = '<div class="text-center py-20 text-red-500 font-bold tracking-widest w-full">エラーが発生しました。</div>';
            }
        }

        // --- 匿名化対応付きの参加者情報取得 ---
        function getParticipantInfo() {
            let safeName = myProfile ? (myProfile.name || myProfile.userId) : '名無し';
            let safeIcon = myProfile ? myProfile.photoURL : null;

            if (!isAdminMock) {
                const isPublicSetting = myProfile && myProfile.profilePublic === 'true';
                const isPaidMember = myProfile && myProfile.membershipRank !== 'arrival';
                const canPublish = isPaidMember || isAdmin;
                
                if (!(isPublicSetting && canPublish)) {
                    if (!window.anonymousName) {
                        window.anonymousName = 'listener' + Math.floor(Math.random() * 10000);
                    }
                    safeName = window.anonymousName;
                    safeIcon = DEFAULT_ICON;
                }
            }
            return { safeName, safeIcon };
        }

        // --- Comments ---
        function listenComments() {
            if (isAdminMock) {
                document.getElementById('comments-list').innerHTML = '<div class="text-center py-6 text-brand-400 text-sm tracking-widest">モック環境ではコメントは表示されません</div>';
                return;
            }
            
            const commentsRef = collection(db, 'artifacts', appId, 'public', 'data', 'podcasts', podcastId, 'comments');
            const q = query(commentsRef, orderBy('createdAt', 'desc'));
            
            commentsUnsubscribe = onSnapshot(q, (snapshot) => {
                document.getElementById('comment-count').textContent = `(${snapshot.size})`;
                const list = document.getElementById('comments-list');
                
                if (snapshot.empty) {
                    list.innerHTML = '<div class="text-center py-10 text-brand-400 text-sm tracking-widest border border-dashed border-brand-200 bg-brand-50 rounded-sm">まだコメントはありません。<br>最初の感想を伝えてみましょう！</div>';
                    return;
                }
                
                let html = '';
                snapshot.forEach(docSnap => {
                    const c = docSnap.data();
                    const d = c.createdAt ? new Date(c.createdAt.toMillis()) : new Date();
                    const dateStr = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                    
                    let delBtn = '';
                    if (isAdmin || (currentUser && currentUser.uid === c.userId) || (currentUser && currentUser.uid === podcastData.authorId)) {
                        delBtn = `<button onclick="deleteComment('${docSnap.id}')" class="text-red-400 hover:text-red-600 text-sm transition-colors ml-4"><i class="fa-solid fa-trash"></i></button>`;
                    }

                    let textHtml = `<p class="text-sm text-brand-700 leading-relaxed whitespace-pre-wrap">${c.text}</p>`;
                    let bgClass = "bg-brand-50 border-brand-100";
                    
                    if (c.isPrivate) {
                        const isOwner = currentUser && currentUser.uid === c.userId;
                        const isAuthor = currentUser && currentUser.uid === podcastData.authorId;
                        
                        if (isAdmin || isOwner || isAuthor) {
                            bgClass = "bg-[#fffdf9] border-[#b8860b] border-2";
                            textHtml = `
                                <div class="mb-2 text-[10px] sm:text-xs text-[#b8860b] font-bold tracking-widest flex items-center gap-1 border-b border-brand-200 pb-1 w-fit"><i class="fa-solid fa-lock"></i> 投稿者にのみ公開されています</div>
                                <p class="text-sm text-brand-900 leading-relaxed whitespace-pre-wrap">${c.text}</p>
                            `;
                        } else {
                            textHtml = `<div class="py-2 text-xs sm:text-sm text-brand-400 italic flex items-center gap-2 tracking-widest font-bold"><i class="fa-solid fa-lock"></i> このコメントは投稿者のみ公開されています</div>`;
                        }
                    }

                    html += `
                    <div class="flex gap-4 group">
                        <img src="${c.userIcon || DEFAULT_ICON}" class="w-10 h-10 sm:w-12 sm:h-12 rounded-full border border-brand-200 object-cover flex-shrink-0 shadow-sm mt-1" onerror="this.src='${DEFAULT_ICON}'">
                        <div class="flex-1 min-w-0">
                            <div class="${bgClass} border p-4 rounded-sm rounded-tl-none shadow-sm relative">
                                <div class="flex justify-between items-start mb-2">
                                    <div class="flex items-center gap-3">
                                        <span class="font-bold text-brand-900 text-sm tracking-widest">${c.userName || '名無し'}</span>
                                        <span class="text-[10px] text-brand-400 font-mono">${dateStr}</span>
                                    </div>
                                    ${delBtn}
                                </div>
                                ${textHtml}
                            </div>
                        </div>
                    </div>
                    `;
                });
                list.innerHTML = html;
            });
        }

        window.postComment = async () => {
            if (!currentUser) return alert('コメントするにはログインが必要です');
            const input = document.getElementById('comment-input');
            const text = input.value.trim();
            if (!text) return;
            
            const isPrivate = document.getElementById('comment-private').checked;
            const btn = document.getElementById('btn-submit-comment');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            btn.disabled = true;

            try {
                if (!isAdminMock) {
                    const { safeName, safeIcon } = getParticipantInfo();
                    
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'podcasts', podcastId, 'comments'), {
                        userId: currentUser.uid,
                        userName: safeName,
                        userIcon: safeIcon,
                        text: text,
                        isPrivate: isPrivate,
                        createdAt: serverTimestamp()
                    });
                }
                input.value = '';
                document.getElementById('comment-private').checked = false;
            } catch(e) {
                console.error(e);
                alert("コメントの送信に失敗しました");
            } finally {
                btn.innerHTML = '送信';
                btn.disabled = false;
            }
        };

        window.deleteComment = async (cid) => {
            if(!confirm("コメントを削除しますか？")) return;
            try {
                if (!isAdminMock) {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'podcasts', podcastId, 'comments', cid));
                }
            } catch(e) { console.error(e); alert("削除に失敗しました"); }
        };

        // --- Likes ---
        function listenLikes() {
            if (isAdminMock) return;
            const likesRef = collection(db, 'artifacts', appId, 'public', 'data', 'podcasts', podcastId, 'likes');
            
            likesUnsubscribe = onSnapshot(likesRef, (snapshot) => {
                document.getElementById('like-count').textContent = snapshot.size;
                
                if (currentUser) {
                    const myLike = snapshot.docs.find(d => d.id === currentUser.uid);
                    isLiked = !!myLike;
                    const btn = document.getElementById('btn-like');
                    const icon = document.getElementById('icon-like');
                    if (isLiked) {
                        icon.classList.remove('fa-regular', 'text-brand-400');
                        icon.classList.add('fa-solid', 'text-red-500');
                        btn.classList.add('border-red-200', 'bg-red-50');
                    } else {
                        icon.classList.remove('fa-solid', 'text-red-500');
                        icon.classList.add('fa-regular', 'text-brand-400');
                        btn.classList.remove('border-red-200', 'bg-red-50');
                    }
                }
            });
        }

        window.toggleLike = async () => {
            if (!currentUser) return alert("いいねするにはログインが必要です");
            if (isAdminMock) return alert("【テスト】いいねしました");

            try {
                const likeRef = doc(db, 'artifacts', appId, 'public', 'data', 'podcasts', podcastId, 'likes', currentUser.uid);
                if (isLiked) {
                    await deleteDoc(likeRef);
                } else {
                    await setDoc(likeRef, { timestamp: serverTimestamp() });
                }
            } catch(e) { console.error(e); }
        };

        // --- Actions ---
        window.sharePodcast = () => {
            const url = window.location.href;
            const textArea = document.createElement("textarea");
            textArea.value = url;
            textArea.style.position = "fixed";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                const notif = document.getElementById('notification');
                document.getElementById('notif-message').textContent = 'URLをコピーしました！';
                notif.classList.remove('hidden', 'translate-y-20');
                setTimeout(() => notif.classList.add('translate-y-20'), 3000);
                setTimeout(() => notif.classList.add('hidden'), 3300);
            } catch (err) {
                alert('コピーに失敗しました。\n' + url);
            }
            document.body.removeChild(textArea);
        };

        window.editPodcast = () => {
            window.location.href = `podcast_post.html?pid=${podcastId}`;
        };

        window.deletePodcast = async () => {
            if(!confirm("本当にこのエピソードを削除しますか？\n※この操作は元に戻せません。")) return;
            if(isAdminMock) {
                alert("【テスト】削除しました");
                window.location.href = 'podcasts.html';
                return;
            }
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'podcasts', podcastId));
                alert("エピソードを削除しました");
                window.location.href = 'podcasts.html';
            } catch(e) {
                console.error(e);
                alert("削除に失敗しました");
            }
        };

        async function loadRelated() {
            try {
                const pRef = collection(db, 'artifacts', appId, 'public', 'data', 'podcasts');
                const snap = await getDocs(pRef);
                const pods = [];
                snap.forEach(d => { if(d.id !== podcastId) pods.push({id:d.id, ...d.data()}); });
                pods.sort((a,b) => new Date(b.createdAt||b.updatedAt) - new Date(a.createdAt||a.updatedAt));
                
                let html = '';
                pods.slice(0, 5).forEach(p => {
                    const date = new Date(p.createdAt||p.updatedAt);
                    const thumbUrl = p.thumbnailUrl || 'https://images.unsplash.com/photo-1590602847861-f357a9332bbc?q=80&w=640&auto=format&fit=crop';
                    
                    html += `
                    <a href="podcast_detail.html?pid=${p.id}" class="flex gap-3 group cursor-pointer bg-[#fffdf9] p-3 rounded-md border border-brand-200 hover:border-[#b8860b]/50 hover:shadow-md transition-all">
                        <div class="w-20 h-20 bg-[#1a110f] rounded-md overflow-hidden flex-shrink-0 relative border border-brand-100 shadow-inner">
                            <img src="${thumbUrl}" class="w-full h-full object-cover opacity-90 transition-transform group-hover:scale-110 duration-500">
                            <div class="absolute inset-0 bg-black/10 group-hover:bg-black/30 transition-colors flex items-center justify-center"><i class="fa-solid fa-play text-white/90 text-lg shadow-sm"></i></div>
                        </div>
                        <div class="flex-1 min-w-0 flex flex-col justify-center py-0.5">
                            <h4 class="text-sm font-bold text-brand-900 leading-snug line-clamp-2 mb-1.5 group-hover:text-[#b8860b] transition-colors font-serif">${p.title || 'タイトルなし'}</h4>
                            <p class="text-[10px] text-brand-500 truncate mb-1">${p.authorName||'名無し'}</p>
                            <div class="flex items-center justify-between mt-auto">
                                <span class="text-[9px] text-brand-400 font-mono tracking-widest">${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()}</span>
                            </div>
                        </div>
                    </a>
                    `;
                });
                document.getElementById('related-podcasts').innerHTML = html;
            } catch(e){}
        }

        window.addEventListener('unload', () => {
            if(commentsUnsubscribe) commentsUnsubscribe();
            if(likesUnsubscribe) likesUnsubscribe();
        });
    </script>
</body>
</html>
