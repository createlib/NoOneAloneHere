<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="img/icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { serif: ['Noto Serif JP', 'serif'] },
                    colors: { brand: { 50: '#f7f5f0', 100: '#e8dfd1', 200: '#dcd4c6', 300: '#c8b9a6', 400: '#a09080', 500: '#8b6a4f', 600: '#725b3f', 700: '#5c4a3d', 800: '#4a3b32', 900: '#3e2723' } }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Serif JP', serif; background-color: #f7f5f0; color: #4a3b32; }
        .bg-texture { background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E"); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .tab-btn { transition: all 0.2s; }
        .tab-btn.active { border-bottom-color: #b8860b; color: #b8860b; }
        
        .bottom-nav-fixed {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background-color: #fffdf9; border-top: 1px solid #e8dfd1;
            z-index: 50; height: 4rem; height: calc(4rem + env(safe-area-inset-bottom));
            padding-bottom: env(safe-area-inset-bottom);
        }
        .bottom-nav-content { height: 4rem; display: flex; justify-content: space-around; align-items: center; width: 100%; }
        .body-pb-nav { padding-bottom: calc(5rem + env(safe-area-inset-bottom)); }

        /* ====== ライブ配信 (SIGNAL CAST) 用のスタイル ====== */
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }
        .live-ring {
            border-color: #d4af37 !important;
            animation: pulse-ring 2s infinite;
        }
        @keyframes ripple {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.6); }
            70% { box-shadow: 0 0 0 15px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }
        .speaking-ripple {
            animation: ripple 1.2s infinite;
            border-color: #d4af37 !important;
        }
        .dark-scrollbar::-webkit-scrollbar { width: 6px; }
        .dark-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .dark-scrollbar::-webkit-scrollbar-thumb { background-color: #5c4a3d; border-radius: 10px; }
        
        input[type="radio"]:checked + div, input[type="checkbox"]:checked + div {
            background-color: #3e2723; color: #d4af37; border-color: #b8860b;
        }
    </style>
</head>
<body class="antialiased min-h-screen bg-texture body-pb-nav lg:pb-0">

    <!-- Navbar -->

            <div class="flex items-center gap-4">
                <a href="javascript:history.back()" class="text-brand-500 hover:text-brand-800 transition-colors flex items-center gap-2 text-sm font-bold tracking-widest mr-2">
                    <i class="fa-solid fa-arrow-left"></i> <span class="hidden sm:inline">戻る</span>
                </a>
                <a href="home.html" class="text-xl font-black text-brand-900 tracking-widest flex items-center gap-2 font-serif">
                    <span class="bg-brand-900 text-brand-50 w-8 h-8 flex items-center justify-center rounded-sm text-sm"><i class="fa-solid fa-photo-film text-[#d4af37]"></i></span>
                    <span class="hidden sm:inline">MEDIA LOG</span>
                </a>
            </div>
            
            <div class="flex items-center gap-3 h-full">
                <div class="hidden lg:flex items-center gap-6 mr-4 h-full">
                    <a href="home.html" class="text-brand-400 hover:text-brand-600 transition-colors flex items-center gap-2 font-bold text-sm tracking-wide"><i class="fa-solid fa-ship"></i> 航海</a>
                    <a href="events.html" class="text-brand-400 hover:text-brand-600 transition-colors flex items-center gap-2 font-bold text-sm tracking-wide"><i class="fa-solid fa-hourglass-half"></i> イベント</a>
                    <a href="search.html" class="text-brand-400 hover:text-brand-600 transition-colors flex items-center gap-2 font-bold text-sm tracking-wide"><i class="fa-solid fa-compass"></i> さがす</a>
                    
                    <div class="relative group h-full flex items-center">
                        <button class="text-[#b8860b] transition-colors flex items-center gap-2 font-bold text-sm tracking-wide focus:outline-none">
                            <i class="fa-solid fa-photo-film"></i> メディア
                        </button>
                        <div class="absolute top-[calc(100%-0.5rem)] left-1/2 transform -translate-x-1/2 w-48 bg-[#fffdf9] border border-brand-200 shadow-xl rounded-sm hidden group-hover:block transition-opacity">
                            <a href="videos.html" class="block px-4 py-3 text-sm font-bold text-brand-400 hover:bg-brand-50 hover:text-brand-700 border-b border-brand-100 transition-colors tracking-widest"><i class="fa-solid fa-film mr-2 text-brand-500"></i>THEATER</a>
                            <a href="podcasts.html" class="block px-4 py-3 text-sm font-bold text-brand-400 hover:bg-brand-50 hover:text-brand-700 transition-colors tracking-widest"><i class="fa-solid fa-podcast mr-2 text-[#b8860b]"></i>CAST</a>
                        </div>
                    </div>

                    <a href="user.html" class="text-brand-400 hover:text-brand-600 transition-colors flex items-center gap-2 font-bold text-sm tracking-wide"><i class="fa-solid fa-user"></i> マイページ</a>
                </div>

                <a href="notifications.html" class="auth-required p-2 text-brand-300 hover:text-brand-600 transition-colors relative" title="通知">
                    <i class="fa-regular fa-bell text-xl"></i>
                    <span class="hidden absolute top-1.5 right-1.5 h-2.5 w-2.5 bg-[#8b6a4f] rounded-full border-2 border-[#fffdf9]" id="nav-badge"></span>
                </a>
                
                <button onclick="location.reload()" class="p-2 text-brand-300 hover:text-brand-600 transition-colors" title="更新"><i class="fa-solid fa-rotate-right"></i></button>

                <div class="h-6 w-px bg-brand-200 mx-1 hidden lg:block"></div>
                <button onclick="handleAuthAction()" class="hidden lg:flex text-sm font-bold text-brand-400 hover:text-brand-800 transition-colors flex items-center gap-2">
                    <span class="hidden sm:inline tracking-widest" id="nav-auth-text">下船する</span>
                    <i class="fa-solid fa-right-from-bracket text-lg" id="nav-auth-icon"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Bottom Nav (SP) -->
    <nav class="lg:hidden bottom-nav-fixed shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <div class="bottom-nav-content">
            <a href="home.html" class="flex flex-col items-center justify-center w-full h-full text-brand-400 hover:text-brand-600 transition-colors">
                <i class="fa-solid fa-ship text-xl mb-1"></i>
                <span class="text-[10px] font-medium tracking-widest">航海</span>
            </a>
            <a href="events.html" class="flex flex-col items-center justify-center w-full h-full text-brand-400 hover:text-brand-600 transition-colors">
                <i class="fa-solid fa-hourglass-half text-xl mb-1"></i>
                <span class="text-[10px] font-medium tracking-widest">イベント</span>
            </a>
            <a href="search.html" class="flex flex-col items-center justify-center w-full h-full text-brand-400 hover:text-brand-600 transition-colors">
                <i class="fa-solid fa-compass text-xl mb-1"></i>
                <span class="text-[10px] font-medium tracking-widest">さがす</span>
            </a>
            <a href="javascript:void(0)" onclick="toggleTheaterMenu()" class="flex flex-col items-center justify-center w-full h-full text-[#b8860b] border-t-2 border-[#b8860b] pt-[2px] transition-colors">
                <i class="fa-solid fa-photo-film text-xl mb-1"></i>
                <span class="text-[10px] font-bold tracking-widest">メディア</span>
            </a>
            <a href="user.html" class="auth-required flex flex-col items-center justify-center w-full h-full text-brand-400 hover:text-brand-600 transition-colors">
                <i class="fa-solid fa-user text-xl mb-1"></i>
                <span class="text-[10px] font-medium tracking-widest">マイページ</span>
            </a>
        </div>
    </nav>

    <!-- SP用 メディア選択ポップアップ -->
    <div id="sp-theater-menu" class="hidden fixed inset-0 z-[6000] bg-[#2a1a17]/60 backdrop-blur-sm flex items-end justify-center">
        <div class="absolute inset-0" onclick="toggleTheaterMenu()"></div>
        <div class="bg-[#fffdf9] bg-texture w-full rounded-t-xl p-6 transform transition-transform translate-y-full relative shadow-[0_-10px_40px_rgba(0,0,0,0.1)]" id="sp-theater-menu-content">
            <div class="flex justify-between items-center mb-4 border-b border-brand-200 pb-3">
                <h3 class="font-bold text-brand-900 font-serif tracking-widest flex items-center"><i class="fa-solid fa-photo-film text-brand-500 mr-2"></i>メディアを選択</h3>
                <button onclick="toggleTheaterMenu()" class="text-brand-400 hover:text-brand-700 bg-brand-50 rounded-sm w-8 h-8 flex items-center justify-center transition-colors border border-brand-200 shadow-sm"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="space-y-3">
                <a href="videos.html" class="flex items-center gap-4 p-4 border border-brand-200 rounded-sm hover:bg-brand-50 transition-colors shadow-sm bg-white">
                    <div class="w-12 h-12 bg-brand-100 text-brand-600 rounded-full flex items-center justify-center text-lg"><i class="fa-solid fa-film"></i></div>
                    <div>
                        <h4 class="font-bold text-brand-900 tracking-widest text-base font-serif">NOAH THEATER</h4>
                        <p class="text-[10px] text-brand-500 mt-1 font-bold">動画で想いや活動の軌跡を共有</p>
                    </div>
                </a>
                <a href="podcasts.html" class="flex items-center gap-4 p-4 border border-[#b8860b] bg-brand-50 rounded-sm shadow-sm">
                    <div class="w-12 h-12 bg-[#3e2723] text-[#d4af37] rounded-full flex items-center justify-center text-lg"><i class="fa-solid fa-podcast"></i></div>
                    <div>
                        <h4 class="font-bold text-brand-900 tracking-widest text-base font-serif">NOAH CAST</h4>
                        <p class="text-[10px] text-[#b8860b] mt-1 font-bold">音声で深い考えや対話を配信</p>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="w-full max-w-[1600px] mx-auto pt-20 px-4 sm:px-6 lg:px-8">
        
        <!-- User Info Header -->
        <div class="py-10 flex flex-col items-center text-center relative bg-[#fffdf9] shadow-sm border border-brand-200 rounded-sm mb-8 overflow-hidden mt-6 max-w-4xl mx-auto">
            <div class="absolute top-0 left-0 w-8 h-8 border-t border-l border-brand-500 z-10 m-2"></div>
            <div class="absolute bottom-0 right-0 w-8 h-8 border-b border-r border-brand-500 z-10 m-2"></div>
            <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,rgba(139,106,79,0.05)_0%,transparent_70%)] pointer-events-none"></div>
            
            <div class="relative z-10 mb-4 cursor-pointer group" onclick="attemptJoinLive()">
                <div id="header-icon-ring" class="w-24 h-24 sm:w-32 sm:h-32 rounded-full border-4 border-[#fffdf9] shadow-md bg-brand-100 flex items-center justify-center overflow-hidden transition-all duration-300 relative">
                    <img id="header-icon" src="https://via.placeholder.com/150" class="w-full h-full object-cover group-hover:scale-105 transition-transform" onerror="this.src='https://via.placeholder.com/150?text=U'">
                    <!-- ライブ中オーバーレイ -->
                    <div id="live-overlay" class="hidden absolute inset-0 bg-black/40 flex items-center justify-center transition-opacity">
                        <i class="fa-solid fa-headphones text-white text-3xl"></i>
                    </div>
                </div>
                <div id="live-badge" class="hidden absolute -bottom-3 left-1/2 transform -translate-x-1/2 bg-[#d4af37] text-[#2a1a17] px-3 py-1 rounded-sm text-[10px] font-bold tracking-widest border border-[#b8860b] shadow-md z-20 flex items-center gap-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-red-600 animate-pulse"></span> LIVE配信中
                </div>
            </div>

            <h1 id="header-name" class="text-2xl md:text-3xl font-bold font-serif text-brand-900 tracking-widest mb-1 relative z-10 flex items-center gap-2 mt-2">
                <span id="user-name"><i class="fa-solid fa-spinner fa-spin"></i></span>
                <i class="fa-solid fa-circle-check text-sm text-[#d4af37]" title="NOAH認証"></i>
            </h1>
            <p class="text-sm text-brand-500 tracking-widest relative z-10 font-mono mb-2" id="user-id">@...</p>
            <p class="text-xs text-brand-600 tracking-widest relative z-10 mb-5 font-bold" id="user-job"></p>
            
            <div class="mt-2 flex flex-col gap-3 relative z-10 w-full sm:w-auto px-4 sm:px-0">
                <!-- SIGNAL CAST ルーム作成ボタン (JSで条件表示) -->
                <button id="btn-create-room" onclick="openCreateRoomModal()" class="hidden w-full px-6 py-3.5 bg-gradient-to-r from-[#d4af37] to-[#b8860b] text-[#2a1a17] border border-[#996515] rounded-sm text-sm font-bold hover:shadow-lg transition-all tracking-widest items-center justify-center gap-2 transform hover:-translate-y-0.5">
                    <i class="fa-solid fa-satellite-dish animate-pulse"></i> SIGNAL CAST を配信する
                </button>
                
                <a id="btn-profile" href="#" class="w-full px-6 py-2.5 bg-[#3e2723] text-[#d4af37] border border-[#b8860b] rounded-sm text-xs font-bold hover:bg-[#2a1a17] transition-all shadow-md tracking-widest flex items-center justify-center gap-2">
                    <i class="fa-solid fa-user"></i> 航海録(プロフィール)を見る
                </a>
            </div>
        </div>

        <!-- Content Tabs -->
        <div class="mb-6 border-b border-brand-200">
            <div class="flex gap-6 overflow-x-auto no-scrollbar max-w-4xl mx-auto px-1">
                <button onclick="switchTab('videos')" id="tab-videos" class="tab-btn active pb-3 border-b-[3px] border-[#b8860b] text-[#b8860b] text-sm tracking-widest font-bold whitespace-nowrap">
                    <i class="fa-solid fa-film mr-1"></i> 投稿動画
                </button>
                <button onclick="switchTab('podcasts')" id="tab-podcasts" class="tab-btn pb-3 border-b-[3px] border-transparent text-brand-400 hover:text-brand-600 text-sm tracking-widest font-bold whitespace-nowrap">
                    <i class="fa-solid fa-podcast mr-1"></i> 投稿音声
                </button>
                <!-- お気に入りタブは本人が見ている場合のみ表示 -->
                <button onclick="switchTab('liked-videos')" id="tab-liked-videos" class="hidden tab-btn pb-3 border-b-[3px] border-transparent text-brand-400 hover:text-brand-600 text-sm tracking-widest font-bold whitespace-nowrap relative">
                    <i class="fa-regular fa-heart mr-1"></i> お気に入り(動画) <i class="fa-solid fa-lock text-[8px] absolute top-0 -right-2 text-brand-300"></i>
                </button>
                <button onclick="switchTab('liked-podcasts')" id="tab-liked-podcasts" class="hidden tab-btn pb-3 border-b-[3px] border-transparent text-brand-400 hover:text-brand-600 text-sm tracking-widest font-bold whitespace-nowrap relative">
                    <i class="fa-regular fa-heart mr-1"></i> お気に入り(音声) <i class="fa-solid fa-lock text-[8px] absolute top-0 -right-2 text-brand-300"></i>
                </button>
            </div>
        </div>

        <!-- Content Grid -->
        <div id="content-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6 pb-12">
            <div class="col-span-full text-center py-12 text-brand-400"><i class="fa-solid fa-spinner fa-spin mr-2"></i>コンテンツを読み込み中...</div>
        </div>
    </main>

    <!-- ========================================== -->
    <!-- SIGNAL CAST (Live Room) Modals             -->
    <!-- ========================================== -->

    <!-- ルーム作成モーダル -->
    <div id="create-room-modal" class="hidden fixed inset-0 z-[6000] bg-[#2a1a17]/80 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-[#fffdf9] bg-texture w-full max-w-2xl max-h-[90vh] rounded-sm shadow-2xl flex flex-col border border-brand-300">
            <div class="p-5 border-b border-brand-200 flex justify-between items-center bg-[#fffdf9] shrink-0">
                <h3 class="font-bold text-lg text-brand-900 font-serif tracking-widest flex items-center gap-2">
                    <i class="fa-solid fa-satellite-dish text-[#b8860b]"></i> SIGNAL CAST 設定
                </h3>
                <button onclick="closeCreateRoomModal()" class="text-brand-400 hover:text-brand-700 bg-brand-50 w-8 h-8 rounded-sm flex items-center justify-center transition-colors"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="p-6 overflow-y-auto flex-1 custom-scrollbar space-y-6">
                
                <div>
                    <label class="block text-xs font-bold text-brand-800 mb-1.5 tracking-widest">配信タイトル <span class="text-red-500">*</span></label>
                    <input type="text" id="room-title" class="w-full border-brand-200 rounded-sm p-3 bg-white text-sm" placeholder="今夜のテーマや雑談内容" required>
                </div>

                <div>
                    <label class="block text-xs font-bold text-brand-800 mb-1.5 tracking-widest">概要・トピック</label>
                    <textarea id="room-desc" rows="3" class="w-full border-brand-200 rounded-sm p-3 bg-white text-sm leading-relaxed" placeholder="話す内容やリスナーへのメッセージ"></textarea>
                </div>

                <div>
                    <label class="block text-xs font-bold text-brand-800 mb-1.5 tracking-widest">ゲスト <span class="text-[10px] text-brand-400 font-normal ml-1">(予定している登壇者)</span></label>
                    <input type="text" id="room-guests" class="w-full border-brand-200 rounded-sm p-3 bg-white text-sm" placeholder="例: @user_id, 〇〇さん">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-brand-800 mb-2 tracking-widest">公開範囲 <span class="text-red-500">*</span></label>
                        <select id="room-privacy" class="w-full border-brand-200 rounded-sm p-3 bg-white text-sm font-bold text-brand-700">
                            <option value="public">🌍 公開（SETTLER以上）</option>
                            <option value="followers">👥 フォロワー限定</option>
                            <option value="invite">🔒 招待制（クローズド）</option>
                            <option value="community">🏢 コミュニティ限定</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-brand-800 mb-2 tracking-widest">ルーム種別 <span class="text-red-500">*</span></label>
                        <select id="room-type" class="w-full border-brand-200 rounded-sm p-3 bg-white text-sm font-bold text-brand-700">
                            <option value="talk">通常トーク</option>
                            <option value="panel">パネルディスカッション</option>
                            <option value="interview">インタビュー形式</option>
                            <option value="music">音楽・ライブ形式</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-brand-800 mb-2 tracking-widest">カテゴリ・タグ</label>
                    <div class="flex flex-wrap gap-2">
                        <label class="cursor-pointer"><input type="checkbox" value="ビジネス" class="room-tag-cb hidden"><div class="px-3 py-1 border border-brand-200 text-[10px] font-bold text-brand-600 rounded-sm tracking-widest hover:bg-brand-50 transition-all bg-white shadow-sm">ビジネス</div></label>
                        <label class="cursor-pointer"><input type="checkbox" value="テック" class="room-tag-cb hidden"><div class="px-3 py-1 border border-brand-200 text-[10px] font-bold text-brand-600 rounded-sm tracking-widest hover:bg-brand-50 transition-all bg-white shadow-sm">テック</div></label>
                        <label class="cursor-pointer"><input type="checkbox" value="恋愛" class="room-tag-cb hidden"><div class="px-3 py-1 border border-brand-200 text-[10px] font-bold text-brand-600 rounded-sm tracking-widest hover:bg-brand-50 transition-all bg-white shadow-sm">恋愛</div></label>
                        <label class="cursor-pointer"><input type="checkbox" value="自己成長" class="room-tag-cb hidden"><div class="px-3 py-1 border border-brand-200 text-[10px] font-bold text-brand-600 rounded-sm tracking-widest hover:bg-brand-50 transition-all bg-white shadow-sm">自己成長</div></label>
                        <label class="cursor-pointer"><input type="checkbox" value="投資" class="room-tag-cb hidden"><div class="px-3 py-1 border border-brand-200 text-[10px] font-bold text-brand-600 rounded-sm tracking-widest hover:bg-brand-50 transition-all bg-white shadow-sm">投資</div></label>
                    </div>
                </div>

                <div class="bg-brand-50 p-4 border border-brand-200 rounded-sm">
                    <label class="block text-xs font-bold text-brand-800 mb-3 tracking-widest">アーカイブ設定</label>
                    <div class="flex gap-6">
                        <label class="flex items-center gap-2 cursor-pointer text-sm font-bold text-brand-700 bg-white border border-brand-200 px-4 py-2 rounded-sm shadow-sm">
                            <input type="radio" name="roomRecord" value="true" class="text-[#b8860b] focus:ring-[#b8860b]"> 録音して残す
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer text-sm font-bold text-brand-700 bg-white border border-brand-200 px-4 py-2 rounded-sm shadow-sm">
                            <input type="radio" name="roomRecord" value="false" checked class="text-[#b8860b] focus:ring-[#b8860b]"> 録音しない
                        </label>
                    </div>
                    <p class="text-[10px] text-brand-500 mt-2">「録音して残す」を選択すると、配信終了後に自動でポッドキャストとして公開されます。</p>
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-brand-800 mb-2 tracking-widest">サムネイル (任意)</label>
                    <input type="file" id="room-thumb" accept="image/*" class="w-full text-xs text-brand-600 file:mr-4 file:py-2 file:px-4 file:rounded-sm file:border-0 file:text-[10px] file:font-bold file:bg-brand-100 file:text-brand-800 bg-brand-50 border border-brand-200 p-2 rounded-sm">
                </div>

            </div>
            
            <div class="p-4 border-t border-brand-200 bg-[#f7f5f0] shrink-0">
                <button onclick="startLiveCast()" id="btn-start-cast" class="w-full py-4 bg-gradient-to-r from-[#3e2723] to-[#2a1a17] text-[#d4af37] font-bold rounded-sm shadow-xl tracking-widest border border-[#b8860b] flex items-center justify-center gap-2 transform hover:-translate-y-0.5 transition-all">
                    <i class="fa-solid fa-satellite-dish animate-pulse"></i> 配信を START する
                </button>
            </div>
        </div>
    </div>

    <!-- ライブ配信画面 (全画面モーダル) -->
    <div id="live-cast-modal" class="hidden fixed inset-0 z-[7000] bg-[#1a110f] flex flex-col text-[#f7f5f0] font-sans">
        
        <!-- Header -->
        <div class="flex justify-between items-center bg-[#2a1a17] p-3 sm:p-4 border-b border-[#5c4a3d] shrink-0 shadow-md">
            <div class="flex items-center gap-3 min-w-0">
                <div class="bg-red-600 text-white px-2 py-0.5 rounded-sm text-[9px] font-bold tracking-widest flex items-center gap-1 animate-pulse">
                    <i class="fa-solid fa-satellite-dish"></i> LIVE
                </div>
                <h2 id="live-header-title" class="font-bold text-sm sm:text-base tracking-widest truncate">ルームタイトル</h2>
            </div>
            <div class="flex items-center gap-4 shrink-0">
                <div class="flex items-center gap-1.5 bg-black/40 px-3 py-1.5 rounded-full border border-[#5c4a3d]">
                    <i class="fa-solid fa-headphones text-[#b8860b] text-xs"></i>
                    <span id="live-listener-count" class="text-xs font-bold font-mono">0</span>
                </div>
                <button onclick="leaveLiveRoom()" class="w-8 h-8 rounded-full bg-[#3e2723] hover:bg-red-600 transition-colors flex items-center justify-center border border-[#5c4a3d]">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
        </div>

        <!-- Main Body -->
        <div class="flex-1 flex flex-col lg:flex-row overflow-hidden relative">
            
            <!-- スピーカーエリア (左側) -->
            <div class="flex-1 p-4 sm:p-8 overflow-y-auto dark-scrollbar relative">
                <!-- 背景の波紋装飾 -->
                <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(212,175,55,0.05)_0%,transparent_60%)] pointer-events-none"></div>
                
                <div id="speakers-grid" class="flex flex-wrap justify-center gap-6 sm:gap-10 relative z-10 max-w-4xl mx-auto">
                    <!-- JSでスピーカーのアイコンが挿入されます -->
                </div>
            </div>

            <!-- 右側パネル (コメント / リスナーリスト) -->
            <div class="w-full lg:w-80 bg-[#2a1a17] flex flex-col border-t lg:border-t-0 lg:border-l border-[#5c4a3d] shrink-0 h-[45vh] lg:h-auto">
                <!-- Tabs -->
                <div class="flex border-b border-[#5c4a3d] shrink-0">
                    <button onclick="switchLiveTab('comments')" id="tab-live-comments" class="flex-1 p-3 text-xs font-bold tracking-widest border-b-2 border-[#d4af37] text-[#d4af37] transition-colors">コメント</button>
                    <!-- ホスト/スピーカー用 リスナータブ -->
                    <button onclick="switchLiveTab('listeners')" id="tab-live-listeners" class="flex-1 p-3 text-xs font-bold tracking-widest border-b-2 border-transparent text-[#a09080] hover:text-[#dcd4c6] transition-colors hidden">リスナー管理</button>
                </div>

                <!-- Comments Area -->
                <div id="area-live-comments" class="flex-1 flex flex-col overflow-hidden">
                    <div id="live-comments-list" class="flex-1 overflow-y-auto p-4 space-y-3 dark-scrollbar">
                        <div class="text-center py-4 text-[#725b3f] text-xs tracking-widest">ここにコメントが表示されます</div>
                    </div>
                    <!-- Comment Input -->
                    <div class="p-3 bg-[#1a110f] border-t border-[#5c4a3d] shrink-0">
                        <form onsubmit="sendLiveComment(event)" class="flex gap-2 relative">
                            <input type="text" id="live-comment-input" class="flex-1 bg-[#2a1a17] text-[#f7f5f0] text-sm p-3 pr-10 rounded-sm border border-[#5c4a3d] focus:border-[#d4af37] focus:ring-1 focus:ring-[#d4af37] transition-all placeholder-[#725b3f]" placeholder="コメントを送信..." required>
                            <button type="submit" class="absolute right-2 top-1/2 transform -translate-y-1/2 text-[#d4af37] hover:text-white transition-colors p-2">
                                <i class="fa-solid fa-paper-plane"></i>
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Listeners Area (ホスト用) -->
                <div id="area-live-listeners" class="hidden flex-1 flex flex-col overflow-hidden">
                    <div class="p-3 bg-[#1a110f] border-b border-[#5c4a3d] shrink-0 flex justify-between items-center">
                        <span class="text-[10px] text-[#a09080] tracking-widest">登壇リクエスト</span>
                        <span id="req-count" class="bg-red-600 text-white text-[9px] px-1.5 py-0.5 rounded-sm font-bold">0</span>
                    </div>
                    <div id="live-listeners-list" class="flex-1 overflow-y-auto p-2 space-y-1 dark-scrollbar">
                        <!-- JSで挿入 -->
                    </div>
                </div>

            </div>
        </div>

        <!-- 自分のアクションバー (ボトム固定) -->
        <div class="bg-[#1a110f] border-t border-[#5c4a3d] p-3 sm:p-4 shrink-0 flex justify-center items-center gap-4 relative z-20">
            <!-- リスナー用: 登壇リクエストボタン -->
            <button id="btn-raise-hand" onclick="toggleHandRaise()" class="hidden px-6 py-3 bg-[#3e2723] text-[#d4af37] border border-[#b8860b] rounded-full text-xs font-bold tracking-widest hover:bg-[#2a1a17] transition-colors shadow-md">
                <i class="fa-solid fa-hand mr-2"></i> 登壇をリクエスト
            </button>
            
            <!-- スピーカー用: マイク＆降壇ボタン -->
            <button id="btn-mic" onclick="toggleMic()" class="hidden w-14 h-14 rounded-full bg-[#d4af37] text-[#1a110f] flex items-center justify-center text-xl shadow-[0_0_15px_rgba(212,175,55,0.4)] hover:scale-105 transition-transform">
                <i class="fa-solid fa-microphone" id="icon-mic"></i>
            </button>
            <button id="btn-leave-stage" onclick="leaveStage()" class="hidden px-4 py-2 bg-transparent text-[#a09080] border border-[#5c4a3d] rounded-full text-xs font-bold tracking-widest hover:text-[#f7f5f0] hover:bg-[#3e2723] transition-colors">
                降壇する
            </button>
            <button id="btn-end-cast" onclick="endLiveCast()" class="hidden px-4 py-2 bg-red-900/50 text-red-400 border border-red-800 rounded-full text-xs font-bold tracking-widest hover:bg-red-800 hover:text-white transition-colors ml-4">
                配信を終了
            </button>
        </div>
    </div>

    <!-- Notification -->
    <div id="notification" class="fixed top-24 left-1/2 transform -translate-x-1/2 z-[8000] hidden transition-all duration-300 translate-y-20">
        <div class="bg-[#3e2723] text-[#f7f5f0] px-6 py-3 rounded-sm shadow-2xl flex items-center gap-3 backdrop-blur-md bg-opacity-95 border border-[#8b6a4f]"><i class="fa-solid fa-check text-[#d4af37] text-lg"></i><span id="notif-message" class="text-sm font-bold tracking-widest font-serif"></span></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, getDoc, query, where, setDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-storage.js";

        const firebaseConfig = { apiKey: "AIzaSyBVDZJhL9sMzVknD5tNomLWF-0z0jPU3i0", authDomain: "brainbridge-4b8ac.firebaseapp.com", projectId: "brainbridge-4b8ac", storageBucket: "brainbridge-4b8ac.firebasestorage.app", messagingSenderId: "803209683213", appId: "1:803209683213:web:b62d13784fa2bbbb9f5044" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const appId = 'default-app-id';

        const urlParams = new URLSearchParams(window.location.search);
        const urlTargetUid = urlParams.get('uid');

        if (!urlTargetUid) {
            alert('ユーザーが指定されていません');
            window.location.href = 'home.html';
        }

        const isAdminMock = localStorage.getItem('isAdminMock') === 'true';
        let currentUser = null;
        let myProfile = null;
        let myRank = 'arrival';
        let isAdmin = false;
        
        let currentTab = 'videos';

        // 状態保持用データ
        let targetUserData = null;
        let myVideos = [];
        let myPodcasts = [];
        let likedVideos = [];
        let likedPodcasts = [];

        // ====== ライブ配信状態管理 ======
        let currentRoomId = null; 
        let currentRole = 'none'; // 'host', 'speaker', 'listener', 'none'
        let roomUnsubscribe = null;
        let partsUnsubscribe = null;
        let commentsUnsubscribe = null;
        let isHandRaised = false;

        // Web Audio API によるマイク波形検知用
        let audioContext = null;
        let analyser = null;
        let microphone = null;
        let isMicActive = false;
        let micInterval = null;

        onAuthStateChanged(auth, async (user) => {
            if (isAdminMock) {
                currentUser = { uid: 'test_admin_uid' };
                isAdmin = true;
                myRank = 'covenant';
                myProfile = { name: '管理者', userId: 'admin', photoURL: 'https://via.placeholder.com/150' };
                if (urlTargetUid === 'test_admin_uid') {
                    document.getElementById('tab-liked-videos').classList.remove('hidden');
                    document.getElementById('tab-liked-podcasts').classList.remove('hidden');
                }
                await loadUserInfo();
                loadMyContents();
                checkLiveStatus();
                return;
            }

            if (user && !user.isAnonymous) {
                currentUser = user;
                if (currentUser.uid === urlTargetUid) {
                    document.getElementById('tab-liked-videos').classList.remove('hidden');
                    document.getElementById('tab-liked-podcasts').classList.remove('hidden');
                }
                try {
                    const snap = await getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data'));
                    if (snap.exists()) {
                        myProfile = snap.data();
                        myRank = myProfile.membershipRank || 'arrival';
                        if (myProfile.userId === 'admin') isAdmin = true;
                    }
                } catch(e){}
                updateNavForAuth(true);
            } else {
                updateNavForAuth(false);
            }
            await loadUserInfo();
            loadMyContents();
            checkLiveStatus();
        });

        window.handleAuthAction = () => {
            if (currentUser || isAdminMock) {
                if (isAdminMock) localStorage.removeItem('isAdminMock');
                signOut(auth);
                window.location.reload(); 
            } else {
                window.location.href = 'login.html';
            }
        };

        window.toggleTheaterMenu = () => {
            const menu = document.getElementById('sp-theater-menu');
            const content = document.getElementById('sp-theater-menu-content');
            if (menu.classList.contains('hidden')) {
                menu.classList.remove('hidden');
                setTimeout(() => content.classList.remove('translate-y-full'), 10);
            } else {
                content.classList.add('translate-y-full');
                setTimeout(() => menu.classList.add('hidden'), 300);
            }
        };

        function updateNavForAuth(isLoggedIn) {
            document.querySelectorAll('.auth-required').forEach(el => el.style.display = isLoggedIn ? '' : 'none');
            const authText = document.getElementById('nav-auth-text');
            const authIcon = document.getElementById('nav-auth-icon');
            if (authText && authIcon) {
                if (isLoggedIn) {
                    authText.textContent = '下船する';
                    authIcon.className = 'fa-solid fa-right-from-bracket text-lg';
                } else {
                    authText.textContent = '乗船する';
                    authIcon.className = 'fa-solid fa-right-to-bracket text-lg';
                }
            }
        }

        async function loadUserInfo() {
            try {
                if (isAdminMock && urlTargetUid === 'test_admin_uid') {
                    targetUserData = { name: 'NOAH 運営', userId: 'admin', jobTitle: 'NOAH運営', photoURL: 'https://via.placeholder.com/150' };
                } else {
                    const userDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', urlTargetUid));
                    if (userDoc.exists()) {
                        targetUserData = userDoc.data();
                    } else {
                        targetUserData = { name: '退会したユーザー', userId: urlTargetUid };
                    }
                }
                
                document.getElementById('user-name').textContent = targetUserData.name || targetUserData.userId || '名無し';
                document.getElementById('user-id').textContent = '@' + (targetUserData.userId || urlTargetUid);
                document.getElementById('user-job').textContent = targetUserData.jobTitle || '';
                if (targetUserData.photoURL) document.getElementById('header-icon').src = targetUserData.photoURL;
                
                document.getElementById('author-profile-link').href = `user.html?uid=${urlTargetUid}`;
                document.getElementById('btn-profile').href = `user.html?uid=${urlTargetUid}`;

                // 配信作成ボタンの表示判定 (本人のページ かつ GUARDIAN以上)
                const canHost = (myRank === 'guardian' || myRank === 'covenant' || isAdmin);
                if (currentUser && currentUser.uid === urlTargetUid && canHost) {
                    document.getElementById('btn-create-room').classList.remove('hidden');
                }
            } catch (e) {
                console.error("User fetch error", e);
            }
        }

        // ==============================================================
        // ライブ配信 (SIGNAL CAST) 関連のロジック
        // ==============================================================

        // --- 1. ルームの監視（アイコンのエフェクト） ---
        function checkLiveStatus() {
            if (isAdminMock) return; // モックはスキップ
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'live_rooms', urlTargetUid);
            
            onSnapshot(roomRef, (snap) => {
                const ring = document.getElementById('header-icon-ring');
                const badge = document.getElementById('live-badge');
                const overlay = document.getElementById('live-overlay');
                const btnCreate = document.getElementById('btn-create-room');

                if (snap.exists() && snap.data().status === 'live') {
                    // 配信中
                    ring.classList.add('live-ring', 'cursor-pointer');
                    badge.classList.remove('hidden');
                    overlay.classList.remove('hidden');
                    
                    // ホスト自身ならボタンを「配信ルームに戻る」に変更
                    if (currentUser && currentUser.uid === urlTargetUid) {
                        if(btnCreate) {
                            btnCreate.innerHTML = '<i class="fa-solid fa-satellite-dish animate-pulse"></i> 配信ルームに戻る';
                            btnCreate.onclick = () => joinLiveRoom(urlTargetUid);
                        }
                    }
                    
                    // クリックで入室
                    document.getElementById('author-profile-link').onclick = (e) => {
                        e.preventDefault();
                        joinLiveRoom(urlTargetUid);
                    };
                } else {
                    // 配信していない
                    ring.classList.remove('live-ring', 'cursor-pointer');
                    badge.classList.add('hidden');
                    overlay.classList.add('hidden');
                    
                    if (currentUser && currentUser.uid === urlTargetUid && (myRank === 'guardian' || myRank === 'covenant' || isAdmin)) {
                        if(btnCreate) {
                            btnCreate.innerHTML = '<i class="fa-solid fa-satellite-dish animate-pulse"></i> SIGNAL CAST を配信する';
                            btnCreate.onclick = openCreateRoomModal;
                        }
                    }
                    // 元のリンク動作に戻す
                    document.getElementById('author-profile-link').onclick = null;
                }
            });
        }

        // --- 2. ルーム作成 ---
        window.openCreateRoomModal = () => {
            if (!currentUser) return alert('ログインが必要です');
            document.getElementById('create-room-modal').classList.remove('hidden');
        };
        window.closeCreateRoomModal = () => {
            document.getElementById('create-room-modal').classList.add('hidden');
        };

        window.startLiveCast = async () => {
            if (!currentUser) return;
            const title = getVal('room-title');
            if(!title) return alert("タイトルは必須です");

            const btn = document.getElementById('btn-start-cast');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 準備中...';
            btn.disabled = true;

            try {
                // サムネイルアップロード(任意)
                let thumbUrl = null;
                const fileEl = document.getElementById('room-thumb');
                if (fileEl && fileEl.files[0] && !isAdminMock) {
                    const snap = await uploadBytes(ref(storage, `live_thumbs/${currentUser.uid}/${Date.now()}_${fileEl.files[0].name}`), fileEl.files[0]);
                    thumbUrl = await getDownloadURL(snap.ref);
                }

                const checkedTags = Array.from(document.querySelectorAll('.room-tag-cb:checked')).map(cb => cb.value);
                const isRecord = document.querySelector('input[name="roomRecord"]:checked').value === 'true';

                const roomData = {
                    hostId: currentUser.uid,
                    hostName: myProfile.name || myProfile.userId,
                    hostIcon: myProfile.photoURL || null,
                    title: title,
                    desc: getVal('room-desc'),
                    guestsStr: getVal('room-guests'),
                    privacy: getVal('room-privacy'),
                    type: getVal('room-type'),
                    tags: checkedTags,
                    isRecord: isRecord,
                    thumbUrl: thumbUrl,
                    status: 'live',
                    startedAt: serverTimestamp()
                };

                if (isAdminMock) {
                    alert('【テスト】配信を開始しました');
                    closeCreateRoomModal();
                    joinLiveRoom(currentUser.uid); // モックで入室
                    return;
                }

                // 1. ルーム作成
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'live_rooms', currentUser.uid);
                await setDoc(roomRef, roomData);

                // 2. 自身をホストとして参加者サブコレクションに登録
                const partRef = doc(db, 'artifacts', appId, 'public', 'data', 'live_rooms', currentUser.uid, 'participants', currentUser.uid);
                await setDoc(partRef, {
                    uid: currentUser.uid,
                    name: myProfile.name || myProfile.userId,
                    icon: myProfile.photoURL || null,
                    role: 'host',
                    isSpeaking: false,
                    isMuted: false,
                    joinedAt: serverTimestamp()
                });

                closeCreateRoomModal();
                joinLiveRoom(currentUser.uid); // 入室へ

            } catch (e) {
                console.error(e);
                alert('配信の開始に失敗しました。');
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-satellite-dish animate-pulse"></i> 配信を START する';
                btn.disabled = false;
            }
        };

        // --- 3. ルーム入室・監視 ---
        window.joinLiveRoom = async (hostUid) => {
            if (!currentUser && !isAdminMock) {
                if(confirm('視聴するにはログインが必要です。ログインしますか？')) window.location.href = 'login.html';
                return;
            }

            // 権限チェック (リスナーはSETTLER以上)
            if (myRank === 'arrival' && !isAdmin && !isAdminMock) {
                alert('ライブ配信の視聴・参加は SETTLER 以上の会員限定です。');
                return;
            }

            currentRoomId = hostUid;
            document.getElementById('live-cast-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // 背景スクロール禁止

            if (isAdminMock) {
                document.getElementById('live-header-title').textContent = "テスト配信ルーム";
                setupMockLiveUI();
                return;
            }

            // 自分がホストか判定
            if (currentUser.uid === hostUid) {
                currentRole = 'host';
            } else {
                currentRole = 'listener';
                // リスナーとしてDBに登録
                const partRef = doc(db, 'artifacts', appId, 'public', 'data', 'live_rooms', hostUid, 'participants', currentUser.uid);
                await setDoc(partRef, {
                    uid: currentUser.uid,
                    name: myProfile.name || myProfile.userId,
                    icon: myProfile.photoURL || null,
                    role: 'listener',
                    handRaised: false,
                    joinedAt: serverTimestamp()
                }, { merge: true });
            }

            // ルーム情報の監視
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'live_rooms', hostUid);
            roomUnsubscribe = onSnapshot(roomRef, (snap) => {
                if (!snap.exists() || snap.data().status !== 'live') {
                    alert('この配信は終了しました。');
                    leaveLiveRoom();
                    return;
                }
                const data = snap.data();
                document.getElementById('live-header-title').textContent = data.title || '配信中';
            });

            // 参加者リストの監視
            const partsRef = collection(db, 'artifacts', appId, 'public', 'data', 'live_rooms', hostUid, 'participants');
            partsUnsubscribe = onSnapshot(partsRef, (snap) => {
                let speakers = [];
                let listeners = [];
                let myData = null;

                snap.forEach(docSnap => {
                    const p = docSnap.data();
                    if (p.uid === currentUser.uid) myData = p;
                    if (p.role === 'host' || p.role === 'speaker') speakers.push(p);
                    if (p.role === 'listener') listeners.push(p);
                });

                // 自分のロールが更新されたかチェック（ホストに承認された等）
                if (myData) {
                    currentRole = myData.role;
                    isHandRaised = myData.handRaised || false;
                }
                
                updateLiveUI(speakers, listeners);
            });

            // コメントの監視
            const commentsRef = collection(db, 'artifacts', appId, 'public', 'data', 'live_rooms', hostUid, 'comments');
            const q = query(commentsRef, orderBy('timestamp', 'asc'), limit(50));
            commentsUnsubscribe = onSnapshot(q, (snap) => {
                const list = document.getElementById('live-comments-list');
                list.innerHTML = '';
                snap.forEach(docSnap => {
                    const c = docSnap.data();
                    const isMe = c.uid === currentUser.uid;
                    const align = isMe ? 'justify-end' : 'justify-start';
                    const bg = isMe ? 'bg-[#3e2723] text-[#d4af37]' : 'bg-[#f7f5f0] text-[#3e2723]';
                    
                    list.innerHTML += `
                        <div class="flex ${align} w-full mb-3">
                            ${!isMe ? `<img src="${c.icon||'https://via.placeholder.com/30'}" class="w-6 h-6 rounded-full mr-2 self-end object-cover">` : ''}
                            <div class="max-w-[80%]">
                                ${!isMe ? `<p class="text-[8px] text-[#a09080] mb-0.5 ml-1">${c.name}</p>` : ''}
                                <div class="${bg} px-3 py-2 rounded-sm text-xs leading-relaxed break-words shadow-sm">${c.text}</div>
                            </div>
                        </div>
                    `;
                });
                list.scrollTop = list.scrollHeight;
            });
        };

        // --- 4. ライブUIの更新 ---
        function updateLiveUI(speakers, listeners) {
            // リスナー数
            document.getElementById('live-listener-count').textContent = listeners.length;
            
            // スピーカーグリッドの描画
            const grid = document.getElementById('speakers-grid');
            grid.innerHTML = speakers.map(s => {
                // 発声中かどうかのエフェクトクラス
                const ringClass = s.isSpeaking ? 'speaking-ripple' : '';

        // --- 6. Web Audio API によるマイク波形検知 ---
        async function startMicAnalysis() {
            if (isMicActive) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);
                analyser.fftSize = 256;
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                isMicActive = true;
                
                let lastUpdateTime = 0;
                
                function analyze() {
                    if(!isMicActive) return;
                    analyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for(let i=0; i<bufferLength; i++) sum += dataArray[i];
                    let avg = sum / bufferLength;
                    
                    // 音量が一定以上ならUIにエフェクト (ローカル描画用)
                    const mySpeakerEl = document.getElementById(`speaker-${currentUser.uid}`);
                    const isMuted = document.getElementById('icon-mic')?.classList.contains('fa-microphone-slash');
                    
                    const isTalkingNow = avg > 15 && !isMuted;
                    
                    if(mySpeakerEl) {
                        if(isTalkingNow) mySpeakerEl.classList.add('speaking-ripple');
                        else mySpeakerEl.classList.remove('speaking-ripple');
                    }

                    // Firestoreの更新頻度を抑える (約1秒に1回)
                    const now = Date.now();
                    if (now - lastUpdateTime > 1000 && !isAdminMock && currentRoomId && currentRole !== 'listener') {
                        updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'live_rooms', currentRoomId, 'participants', currentUser.uid), {
                            isSpeaking: isTalkingNow
                        }).catch(e=>{});
                        lastUpdateTime = now;
                    }
                    
                    micInterval = requestAnimationFrame(analyze);
                }
                analyze();
            } catch(e) {
                console.warn("マイクへのアクセスが拒否されました。波形エフェクトは無効になります。", e);
            }
        }

        function stopMicAnalysis() {
            isMicActive = false;
            if(micInterval) cancelAnimationFrame(micInterval);
            if(microphone) microphone.disconnect();
            if(audioContext) audioContext.close();
            // DBの状態リセット
            if(!isAdminMock && currentUser && currentRoomId && currentRole !== 'listener') {
                updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'live_rooms', currentRoomId, 'participants', currentUser.uid), { isSpeaking: false }).catch(e=>{});
            }
        }

                            <img src="${thumbUrl}" class="w-full h-full object-cover opacity-90 group-hover:scale-105 transition-transform duration-500">
                            <div class="absolute inset-0 flex items-center justify-center bg-black/10 group-hover:bg-black/30 transition-colors">
                                <i class="fa-solid fa-play text-white/90 text-xl shadow-sm drop-shadow-md group-hover:scale-110 transition-transform"></i>
                            </div>
                        </div>
                        <div class="flex-1 min-w-0 flex flex-col justify-center h-14 sm:h-16">
                            <h3 class="text-sm sm:text-base font-bold text-brand-900 leading-snug line-clamp-2 font-serif group-hover:text-[#b8860b] transition-colors m-0 tracking-wide">${p.title || 'タイトルなし'}</h3>
                        </div>
                    </div>
                    
                    <p class="text-[11px] sm:text-xs text-brand-500 line-clamp-2 leading-relaxed mb-4 flex-1 tracking-wide">${plainDesc}</p>
                    
                    <div class="flex flex-wrap items-center justify-between gap-2 mt-auto pt-3 border-t border-brand-100/70">
                        <div class="flex items-center gap-1.5 min-w-0 pr-2">
                            <img src="${p.authorIcon || 'https://via.placeholder.com/24'}" class="w-5 h-5 rounded-full border border-brand-200 object-cover flex-shrink-0 shadow-sm" onerror="this.src='https://via.placeholder.com/24?text=U'">
                            <span class="text-[10px] text-brand-700 truncate font-bold tracking-widest">${p.authorName || '名無し'}</span>
                            ${durationHtml}
                        </div>
                        <div class="flex items-center gap-2 shrink-0">
                            <div class="flex gap-1">${tagsHtml}</div>
                            <span class="text-[9px] text-brand-400 font-mono tracking-widest">${dateStr}</span>
                        </div>
                    </div>
                </a>
                `;
            });
            container.innerHTML = html;
        }

        window.addEventListener('unload', () => {
            if(roomUnsubscribe) roomUnsubscribe();
            if(partsUnsubscribe) partsUnsubscribe();
            if(commentsUnsubscribe) commentsUnsubscribe();
            stopMicAnalysis();
        });
    </script>
</body>
</html>
